<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ トップ</title>
    <style>
        /* 全体の背景とフォントの設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* コンテナ全体の幅制限 */
        .container {
            width: 100%;
            max-width: 500px;
        }

        /* タイトルのデザイン（グラデーション文字とネオン効果） */
        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: linear-gradient(45deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            padding-bottom: 15px;
        }

        /* タイトルの下の装飾線 */
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #38bdf8, #c084fc);
            border-radius: 2px;
        }

        /* リストのスタイル除去 */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 16px;
            perspective: 1000px; /* 3D効果の準備 */
        }

        /* リンクボタンのサイバーモダンなデザイン */
        a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px); /* 背景をぼかす（高級感） */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* 右側に矢印（＞）を自動で追加 */
        a::after {
            content: '→';
            font-size: 1.2rem;
            color: #64748b;
            transition: transform 0.4s, color 0.4s;
        }

        /* タップ・ホバーしたときの極上アニメーション */
        a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.2), 0 8px 10px -6px rgba(56, 189, 248, 0.2);
        }

        /* ホバー時に矢印を動かす */
        a:hover::after {
            color: #38bdf8;
            transform: translateX(4px);
        }

        /* スマホでタップした瞬間のフィードバック */
        a:active {
            transform: translateY(-1px) scale(0.99);
            background: rgba(255, 255, 255, 0.12);
        }

        /* YouTubeチャンネル登録セクション */
        .subscribe-section {
            width: 100%;
            margin-bottom: 36px;
            text-align: center;
        }

        .subscribe-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 14px;
            letter-spacing: 0.05em;
        }

        /* 赤いグロー（脈動）アニメーション */
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 4px 20px -2px rgba(255, 0, 51, 0.45), 0 0 0 0 rgba(255, 0, 51, 0.35);
            }
            50% {
                box-shadow: 0 4px 30px -2px rgba(255, 0, 51, 0.65), 0 0 0 8px rgba(255, 0, 51, 0);
            }
        }

        .subscribe-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #ff0033 0%, #cc0029 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.03em;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: pulse-glow 2.4s ease-in-out infinite;
        }

        .subscribe-btn:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.1);
        }

        .subscribe-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .subscribe-btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>作成したページ一覧</h1>

        <div class="subscribe-section" id="subscribe-section">
            <p class="subscribe-label">応援よろしくお願いします！チャンネル登録することでゲームが出てきます。</p>
            <a class="subscribe-btn" id="subscribe-btn" href="https://www.youtube.com/@%E3%82%AD%E3%82%BB%E3%83%8EchXeno" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                チャンネル登録する
            </a>
        </div>

        <div class="divider" id="divider" style="display: none;"></div>

        <ul id="page-list" style="display: none;">
            <li><a href="tetris.html">Block Slime puzzle</a></li>
            </ul>
    </div>

    <script>
        (function () {
            var STORAGE_KEY = 'subscribed_channel_xeno';
            var subscribeBtn = document.getElementById('subscribe-btn');
            var subscribeSection = document.getElementById('subscribe-section');
            var divider = document.getElementById('divider');
            var list = document.getElementById('page-list');

            function revealList() {
                divider.style.display = '';
                list.style.display = '';
            }

            // すでに登録ボタンを押したことがある場合は、リロードしても即表示
            if (localStorage.getItem(STORAGE_KEY) === 'true') {
                revealList();
            }

            subscribeBtn.addEventListener('click', function () {
                localStorage.setItem(STORAGE_KEY, 'true');
                revealList();
            });
        })();
    </script>

</body>
</html>
