                                smesh.rotation.set(0.1, sign * 0.5, sign * -0.1);
                            }
                            group.add(smesh);
                            return;
                        } else if (prop.tool === 'bow') {
                            mesh.position.set(sign * 0.3, -0.28 + sneakY, -0.5);
                            mesh.rotation.set(0.0, sign * -0.3, sign * -0.3);
                            mesh.scale.set(1.0, 1.2, 1.0);
                        } else if (prop.tool === 'fishing_rod') {
                            mesh.position.set(sign * 0.28, -0.20 + sneakY, -0.48);
                            mesh.rotation.set(-0.3, sign * -0.25, sign * -0.5);
                            mesh.scale.set(1.0, 1.1, 1.0);
                        } else if (prop.tool === 'flint_steel') {
                            mesh.position.set(sign * 0.3, -0.28 + sneakY, -0.48);
                            mesh.rotation.set(0.2, sign * -0.3, sign * -0.4);
                            mesh.scale.set(0.9, 0.9, 0.9);
                        } else if (prop.tool === 'hoe') {
                            // クワ：柄が下、頭が上右
                            mesh.position.set(sign * 0.26, -0.18 + sneakY, -0.46);
                            mesh.rotation.set(-0.5, sign * 0.2, sign * -0.65);
                            mesh.scale.set(1.0, 1.2, 1.0);
                        } else if (prop.tool === 'pick' || prop.tool === 'axe') {
                            // つるはし・斧：正しい角度で持つ（刃が前上方向）
                            mesh.position.set(sign * 0.26, -0.20 + sneakY, -0.48);
                            mesh.rotation.set(-0.4, sign * 0.15, sign * -0.6);
                            mesh.scale.set(1.0, 1.15, 1.0);
                        } else if (prop.tool === 'shovel') {
                            // シャベル：垂直気味に持つ
                            mesh.position.set(sign * 0.24, -0.18 + sneakY, -0.46);
                            mesh.rotation.set(-0.3, sign * 0.1, sign * -0.55);
                            mesh.scale.set(1.0, 1.15, 1.0);
                        } else {
                            mesh.position.set(sign * 0.3, -0.25 + sneakY, -0.5);
                            mesh.rotation.set(0.1, sign * -0.35, sign * -0.55);
                            mesh.scale.set(1.0, 1.1, 1.0);
                        }
                    } else {
                        mesh.position.set(sign * 0.32, -0.3 + sneakY, -0.52);
                        mesh.rotation.set(0.1, sign * -0.4, sign * -0.3);
                        mesh.scale.set(0.85, 0.85, 0.85);
                    }
                    group.add(mesh);
                    return;
                }

                const baseX = sign * 0.36;
                const baseZ = -0.56;
                const rotY = isOffhand ? 0.6 : -0.6;

                if (id === BLOCKS.OAK_STAIR || id === BLOCKS.COBBLE_STAIR || id === BLOCKS.STAIR || id === BLOCKS.BIRCH_STAIR || id === BLOCKS.ACACIA_STAIR || id === BLOCKS.JUNGLE_STAIR) {
                    const mat = mkMat(tex);
                    const g1 = new THREE.BoxGeometry(0.3*S, 0.15*S, 0.3*S); 
                    const g2 = new THREE.BoxGeometry(0.3*S, 0.15*S, 0.15*S); 
                    const m1 = new THREE.Mesh(g1, mat);
                    const m2 = new THREE.Mesh(g2, mat.clone());
                    m1.position.set(baseX, -0.33 + sneakY, baseZ);
                    m2.position.set(baseX, -0.18 + sneakY, baseZ - 0.075);
                    m1.rotation.set(0.3, rotY, 0.1); m2.rotation.copy(m1.rotation);
                    m1.renderOrder = 999; m2.renderOrder = 999;
                    group.add(m1); group.add(m2);
                    return;
                }

                if (id === BLOCKS.BED) {
                    const geo = new THREE.BoxGeometry(0.3*S, 0.1*S, 0.3*S);
                    const mesh = new THREE.Mesh(geo, mkMat(tex));
                    mesh.position.set(baseX, -0.35 + sneakY, baseZ);
                    mesh.rotation.set(0.3, rotY, 0.1);
                    mesh.renderOrder = 999;
                    group.add(mesh);
                    return;
                }

                if (id === BLOCKS.DOOR || id === BLOCKS.IRON_DOOR || id === BLOCKS.BIRCH_DOOR || id === BLOCKS.ACACIA_DOOR || id === BLOCKS.JUNGLE_DOOR) {
                    const croppedTex = this._cropTexture(tex, 0, 0, 16, 8);
                    const geo = new THREE.BoxGeometry(0.04*S, 0.32*S, 0.25*S);
                    const mesh = new THREE.Mesh(geo, mkMat(croppedTex));
                    mesh.position.set(baseX, -0.22 + sneakY, baseZ);
                    mesh.rotation.set(0.1, rotY, 0.1);
                    mesh.renderOrder = 999;
                    group.add(mesh);
                    return;
                }

                if (id === BLOCKS.GLASS_PANE) {
                    const geo = new THREE.BoxGeometry(0.04*S, 0.3*S, 0.3*S);
                    const mesh = new THREE.Mesh(geo, mkMat(tex));
                    mesh.position.set(baseX, -0.3 + sneakY, baseZ);
                    mesh.rotation.set(0.3, rotY, 0.1);
                    mesh.renderOrder = 999;
                    group.add(mesh);
                    return;
                }

                if (id === BLOCKS.TORCH) {
                    const flameT = this._cropTexture(tex, 6, 5, 4, 3);  
                    const stickT = this._cropTexture(tex, 7, 8, 2, 8); 
                    const g1 = new THREE.BoxGeometry(0.05*S, 0.22*S, 0.05*S);
                    const g2 = new THREE.BoxGeometry(0.08*S, 0.08*S, 0.08*S);
                    const m1 = new THREE.Mesh(g1, mkMat(stickT));
                    const m2 = new THREE.Mesh(g2, mkMat(flameT));
                    m1.position.set(baseX, -0.3 + sneakY, baseZ);
                    m2.position.set(baseX, -0.15 + sneakY, baseZ);
                    m1.rotation.set(0.1, rotY, 0.1); m2.rotation.copy(m1.rotation);
                    m1.renderOrder = 999; m2.renderOrder = 999;
                    group.add(m1); group.add(m2);
                    return;
                }

                if (id === BLOCKS.GRASS) {
                    const mats = [
                        new THREE.MeshLambertMaterial({ map: getTexture('1_side'), transparent: false }),
                        new THREE.MeshLambertMaterial({ map: getTexture('1_side'), transparent: false }),
                        new THREE.MeshLambertMaterial({ map: getTexture('1_top'), transparent: false }),
                        new THREE.MeshLambertMaterial({ map: getTexture(BLOCKS.DIRT), transparent: false }),
                        new THREE.MeshLambertMaterial({ map: getTexture('1_side'), transparent: false }),
                        new THREE.MeshLambertMaterial({ map: getTexture('1_side'), transparent: false }),
                    ];
                    const geo = new THREE.BoxGeometry(0.3*S, 0.3*S, 0.3*S);
                    const mesh = new THREE.Mesh(geo, mats);
                    mesh.position.set(baseX, -0.3 + sneakY, baseZ);
                    mesh.rotation.set(0.3, rotY, 0.1);
                    mesh.renderOrder = 999;
                    group.add(mesh);
                    return;
                }

                if (id === BLOCKS.WOOD || id === BLOCKS.BIRCH_LOG || id === BLOCKS.JUNGLE_LOG || id === BLOCKS.ACACIA_LOG) {
                    let topTex = '4_top';
                    if(id === BLOCKS.BIRCH_LOG) topTex = '76_top';
                    if(id === BLOCKS.JUNGLE_LOG) topTex = '78_top';
                    if(id === BLOCKS.ACACIA_LOG) topTex = '80_top';
                    const mats = [
                        new THREE.MeshLambertMaterial({ map: tex }),
                        new THREE.MeshLambertMaterial({ map: tex }),
                        new THREE.MeshLambertMaterial({ map: getTexture(topTex) }),
                        new THREE.MeshLambertMaterial({ map: getTexture(topTex) }),
                        new THREE.MeshLambertMaterial({ map: tex }),
                        new THREE.MeshLambertMaterial({ map: tex }),
                    ];
                    const geo = new THREE.BoxGeometry(0.3*S, 0.3*S, 0.3*S);
                    const mesh = new THREE.Mesh(geo, mats);
                    mesh.position.set(baseX, -0.3 + sneakY, baseZ);
                    mesh.rotation.set(0.3, rotY, 0.1);
                    mesh.renderOrder = 999;
                    group.add(mesh);
                    return;
                }

                const geo = new THREE.BoxGeometry(0.3*S, 0.3*S, 0.3*S);
                const mesh = new THREE.Mesh(geo, mkMat(tex));
                mesh.position.set(baseX, -0.3 + sneakY, baseZ);
                mesh.rotation.set(0.3, rotY, 0.1);
                mesh.renderOrder = 999;
                group.add(mesh);
            }

            _updateHandMesh() {
                const activeItem = this.ui.inv[this.ui.hotbarIdx];
                const activeId = activeItem ? activeItem.id : -1;
                const offItem = this.ui.inv[79];
                const offId = offItem ? offItem.id : -1;
                const isShield = offId > 0 && PROPS[offId] && PROPS[offId].tool === 'shield';

                const stateKey = `${activeId}_${offId}_${this.isSneaking ? 1 : 0}`;
                if (this._lastHandStateKey !== stateKey) {
                    this._lastHandStateKey = stateKey;
                    this._buildHandGroup(this.handGroup, activeId, this.isSneaking, false);
                    this._buildHandGroup(this.offhandGroup, offId, this.isSneaking, true);
                }

                // 手振りアニメーション（掘る/攻撃）
                if (this._isSwinging) {
                    this._swingProgress += 0.15;
                    if (this._swingProgress >= 1.0) {
                        this._swingProgress = 0;
                        this._isSwinging = false;
                        this.handGroup.rotation.set(0, 0, 0);
                    } else {
                        // 0→0.5: 振り下ろし, 0.5→1.0: 戻し
                        const t = this._swingProgress;
                        const angle = t < 0.5
                            ? -Math.PI * 0.7 * (t / 0.5)          // 振り下ろし
                            : -Math.PI * 0.7 * (1.0 - (t - 0.5) / 0.5); // 戻し
                        this.handGroup.rotation.x = angle;
                    }
                } else if (this.keys['Mouse0'] && this.miningTarget) {
                    // 掘り続けているときの揺れ
                    const t = performance.now() * 0.008;
                    this.handGroup.rotation.x = Math.sin(t) * 0.3 - 0.2;
                } else {
                    this.handGroup.rotation.x = 0;
                }

                const shieldOverlay = document.getElementById('shield-overlay');
                if (shieldOverlay) {
                    shieldOverlay.style.display = (isShield && this.isSneaking) ? 'block' : 'none';
                }
            }

            _bindEvents() {
                document.addEventListener('keydown', e => {
                    if (e.code === 'KeyZ') {
                        app.cameraMode = ((app.cameraMode || 0) + 1) % 3;
                        return;
                    }
                    if (this.health <= 0) return;
                    if (this.controls.isLocked || this.ui.isOpen) {
                        if (e.code === 'KeyE') this.ui.toggleInv();
                        if (e.code === 'KeyF') {
                            const main = this.ui.inv[this.ui.hotbarIdx];
                            const off = this.ui.inv[79];
                            this.ui.inv[this.ui.hotbarIdx] = off;
                            this.ui.inv[79] = main;
                            this._lastHandStateKey = null; 
                            this.ui.render();
                        }
                        if (e.code >= 'Digit1' && e.code <= 'Digit9') this.ui.setHotbar(parseInt(e.key)-1);
                        
                        if (this.ui.isOpen) return;
                        
                        const now = performance.now();
                        if (e.code === 'Space' && !this.keys['Space']) {
                            if (now - this.lastKeyUp.space < 250 && this.mode === 'creative') {
                                this.isFlying = !this.isFlying; if(this.isFlying) this.vel.y = 0;
                            }
                        }
                        if (e.code === 'KeyW' && !this.keys['KeyW']) {
                            if (now - this.lastKeyUp.w < 250 && this.hunger > 6) this.isDashing = true;
                        }
                        this.keys[e.code] = true;
                    }
                });
                
                document.addEventListener('keyup', e => {
                    this.keys[e.code] = false;
                    const now = performance.now();
                    if(e.code === 'KeyW') { this.lastKeyUp.w = now; this.isDashing = false; }
                    if(e.code === 'Space') this.lastKeyUp.space = now;
                });

                window.addEventListener('mousedown', e => {
                    if(this.health <= 0) return;
                    if(this.controls.isLocked && !this.ui.isOpen) this.keys[`Mouse${e.button}`] = true;
                });
                window.addEventListener('mouseup', e => this.keys[`Mouse${e.button}`] = false);

                window.addEventListener('wheel', e => {
                    if (!this.controls.isLocked || this.ui.isOpen) return;
                    const dir = e.deltaY > 0 ? 1 : -1;
                    this.ui.hotbarIdx = (this.ui.hotbarIdx + dir + 9) % 9;
                    this._lastHandStateKey = null;
                    this.ui.render();
                }, { passive: true });
            }

            calculateArmor() {
                let totalArmor = 0;
                for(let i=80; i<=83; i++) {
                    const item = this.ui.inv[i];
                    if(item && PROPS[item.id] && PROPS[item.id].armor) {
                        totalArmor += PROPS[item.id].armor;
                    }
                }
                this.armor = totalArmor;
                return totalArmor;
            }

            loadStats(worldId) {
                const saved = JSON.parse(localStorage.getItem(`voxel_world_${worldId}_stats`) || 'null');
                if (saved) {
                    this.health = saved.health; this.hunger = saved.hunger; this.breath = saved.breath || 20;
                    this.camera.position.set(saved.x, saved.y, saved.z);
                    this._physY = saved.y;
                    this.controls.getObject().rotation.x = saved.rotX || 0;
                    this.controls.getObject().rotation.y = saved.rotY || 0;
                } else {
                    this.health = 20; this.hunger = 20; this.breath = 20;
                    this.spawn(true); 
                }
                if(this.health <= 0) this.health = 20; 
                this.calculateArmor();
                this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                this.fallHighestY = this.camera.position.y;
            }

            saveStats() {
                if(!this.world.worldId) return;
                localStorage.setItem(`voxel_world_${this.world.worldId}_stats`, JSON.stringify({ 
                    health: this.health, hunger: this.hunger, breath: this.breath,
                    x: this.camera.position.x, y: this.camera.position.y, z: this.camera.position.z,
                    rotX: this.controls.getObject().rotation.x, rotY: this.controls.getObject().rotation.y
                }));
            }

            spawn(isFirstTime = false) {
                const isNether = app && app.dimension === 'nether';
                // ネザーの場合はベドロック天井（y=121〜127）より下からスキャン開始
                const scanTopY = isNether ? 118 : CHUNK_HEIGHT;
                let maxY = 0;
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        let y = scanTopY;
                        while(y > 0 && this.world.getBlockRaw(x, y, z) === BLOCKS.AIR) y--;
                        if(y > maxY) maxY = y;
                    }
                }
                this.camera.position.set(0.5, maxY + 1 + CAM_H, 0.5); 
                this._physY = maxY + 1 + CAM_H;
                this.vel.set(0,0,0);
                this.fallHighestY = this.camera.position.y;
                this.health = 20; this.hunger = 20; this.breath = 20; this.exhaustion = 0;
                this.calculateArmor();
                this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                if(!isFirstTime) this.saveStats();
                document.getElementById('pause-menu').style.display = 'none';
            }

            _fireGhastBall(player, world) {
                const gOrigin = this.pos.clone().add(new THREE.Vector3(0, 0.5, 0));
                const gTarget = player.camera.position.clone();
                const gDir = new THREE.Vector3().subVectors(gTarget, gOrigin).normalize();
                const ballGeo = new THREE.SphereGeometry(0.4, 6, 6);
                const ballMat = new THREE.MeshLambertMaterial({ color: 0xff6600, emissive: new THREE.Color(0xff3300) });
                const ballMesh = new THREE.Mesh(ballGeo, ballMat);
                ballMesh.position.copy(gOrigin);
                if (app && app.scene) app.scene.add(ballMesh);
                const gVel = gDir.clone().multiplyScalar(12);
                let gLife = 0;
                const tickBall = () => {
                    gLife += 0.016;
                    ballMesh.position.addScaledVector(gVel, 0.016);
                    ballMesh.rotation.y += 0.12;
                    const gbx = Math.floor(ballMesh.position.x), gby = Math.floor(ballMesh.position.y), gbz = Math.floor(ballMesh.position.z);
                    const gbid = world ? world.getBlock(gbx, gby, gbz) : 0;
                    const hitBlock = gbid && gbid !== BLOCKS.AIR && PROPS[gbid] && PROPS[gbid].isSolid !== false && !PROPS[gbid].isLiquid;
                    const hitPlayer = ballMesh.position.distanceTo(player.camera.position) < 1.4;
                    if (hitBlock || hitPlayer || gLife > 5.0) {
                        if (app && app.scene) app.scene.remove(ballMesh);
                        ballGeo.dispose(); ballMat.dispose();
                        if (hitPlayer) player.takeDamage(12, gDir.clone());
                        if (hitBlock && world) {
                            for(let ex=-1;ex<=1;ex++) for(let ey=-1;ey<=1;ey++) for(let ez=-1;ez<=1;ez++) {
                                const b = world.getBlock(gbx+ex, gby+ey, gbz+ez);
                                if (b && b !== BLOCKS.AIR && b !== BLOCKS.OBSIDIAN && PROPS[b] && PROPS[b].hard >= 0) world.setBlock(gbx+ex, gby+ey, gbz+ez, BLOCKS.AIR);
                            }
                        }
                        if (hitPlayer || hitBlock) {
                            const ov = document.getElementById('damage-overlay');
                            if(ov){ov.style.background='rgba(255,100,0,0.5)';ov.style.opacity='1';setTimeout(()=>{ov.style.opacity='0';setTimeout(()=>ov.style.background='rgba(255,0,0,0.4)',200);},400);}
                        }
                        return;
                    }
                    requestAnimationFrame(tickBall);
                };
                requestAnimationFrame(tickBall);
            }

            takeDamage(amount, attackDir = null) {
                if (this.mode !== 'survival' || this.health <= 0) return;
                
                const offHand = this.ui.inv[79];
                if (offHand && PROPS[offHand.id] && PROPS[offHand.id].tool === 'shield' && this.isSneaking) {
                    let isFrontal = true;
                    if (attackDir) {
                        const facingDir = new THREE.Vector3();
                        this.camera.getWorldDirection(facingDir);
                        facingDir.y = 0; facingDir.normalize();
                        attackDir = attackDir.clone(); attackDir.y = 0; attackDir.normalize();
                        isFrontal = facingDir.dot(attackDir) < 0.3;
                    }
                    if (isFrontal) {
                        if(offHand.dur === undefined) offHand.dur = PROPS[offHand.id].maxDur;
                        offHand.dur -= 1;
                        if(offHand.dur <= 0) { this.ui.inv[79] = null; this.ui.render(); }
                        return; 
                    }
                    // 非正面からの攻撃はシールドで防げない
                }

                const armorVal = this.calculateArmor();
                if(armorVal > 0) {
                    const reduction = armorVal * 0.04;
                    amount = amount * (1 - reduction);
                    for(let i=80; i<=83; i++) {
                        if(this.ui.inv[i] && !this.ui.inv[i].ghost) {
                            if(this.ui.inv[i].dur === undefined) this.ui.inv[i].dur = PROPS[this.ui.inv[i].id].maxDur;
                            this.ui.inv[i].dur -= Math.max(1, Math.floor(amount / 4));
                            if(this.ui.inv[i].dur <= 0) this.ui.inv[i] = null;
                        }
                    }
                    this.ui.render();
                }
                
                this.health -= Math.max(1, Math.floor(amount));
                SoundManager.playHurt();
                
                // バグ修正: プレイヤーへのノックバックを実装
                if (attackDir) {
                    this._kbVelX = (this._kbVelX || 0) + attackDir.x * 6.0;
                    this._kbVelZ = (this._kbVelZ || 0) + attackDir.z * 6.0;
                    if (!this.isFlying) this.vel.y = Math.max(this.vel.y, 4.5);
                }
                
                const overlay = document.getElementById('damage-overlay');
                overlay.style.opacity = '1';
                setTimeout(() => overlay.style.opacity = '0', 200);

                if (this.health <= 0) {
                    this.health = 0;
                    SoundManager.playDeath();
                    this.controls.unlock();
                    document.getElementById('pause-menu').style.display = 'flex';
                    document.getElementById('pause-title').innerText = "YOU DIED";
                    document.getElementById('pause-title').style.color = "#ff4444";
                    document.getElementById('resume-btn').style.display = 'none';
                    document.getElementById('respawn-btn').style.display = 'block';
                }
                this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                this.saveStats();
            }

            addExhaustion(amount) {
                if (this.mode !== 'survival') return;
                this.exhaustion += amount;
                if (this.exhaustion >= 4.0) {
                    this.exhaustion -= 4.0;
                    this.hunger = Math.max(0, this.hunger - 1);
                    if(this.hunger <= 6) this.isDashing = false;
                    this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                    this.saveStats();
                }
            }

            processStatusTicks(delta, headInWater) {
                if(this.mode !== 'survival' || this.health <= 0) return;
                this.tickTimer += delta;
                
                // ウィザー効果（ウィザースケルトンに攻撃されると体力が徐々に減る）
                if (this.witherTimer > 0) {
                    this.witherTimer -= delta;
                    this._witherDmgTimer = (this._witherDmgTimer || 0) + delta;
                    if (this._witherDmgTimer >= 2.0) {
                        this._witherDmgTimer = 0;
                        this.takeDamage(1);
                        // 画面を暗く
                        const ov = document.getElementById('damage-overlay');
                        if (ov) { ov.style.background='rgba(30,0,40,0.3)'; ov.style.opacity='1'; setTimeout(()=>{ov.style.opacity='0'; setTimeout(()=>{ if(ov.style.background.includes('30,0,40')) ov.style.background='rgba(255,0,0,0.4)'; }, 300); }, 200); }
                    }
                } else { this.witherTimer = 0; this._witherDmgTimer = 0; }

                // 毒効果（ケイブスパイダーに攻撃されると継続ダメージ）
                if (this._poisonTimer > 0) {
                    this._poisonTimer -= delta;
                    this._poisonDmgTimer = (this._poisonDmgTimer || 0) + delta;
                    if (this._poisonDmgTimer >= 1.5) {
                        this._poisonDmgTimer = 0;
                        if (this.health > 1) { // 毒では死なない
                            this.takeDamage(1);
                            const ov = document.getElementById('damage-overlay');
                            if (ov) { ov.style.background='rgba(80,180,0,0.3)'; ov.style.opacity='1'; setTimeout(()=>{ov.style.opacity='0'; setTimeout(()=>ov.style.background='rgba(255,0,0,0.4)',200);},200); }
                        }
                    }
                } else { this._poisonTimer = 0; this._poisonDmgTimer = 0; }
                
                if (this.tickTimer >= 4.0) {
                    this.tickTimer = 0;
                    if (this.hunger >= 18 && this.health < 20) {
                        this.health++;
                        this.addExhaustion(6.0); 
                        this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                    }
                }
                
                if (this.hunger === 0) {
                    this.hungerTickTimer += delta;
                    if (this.hungerTickTimer >= 4.0) { 
                        this.hungerTickTimer = 0;
                        this.takeDamage(1);
                    }
                } else {
                    this.hungerTickTimer = 0;
                }

                if (headInWater) {
                    this.breath -= delta * 1.5;
                    if (this.breath <= 0) {
                        this.breath = 0;
                        if (Math.floor(performance.now() / 1000) % 2 === 0) {
                            if (!this.drownTick) { this.takeDamage(1); this.drownTick = true; }
                        } else { this.drownTick = false; }
                    }
                } else {
                    this.breath += delta * 10;
                    if (this.breath > this.maxBreath) this.breath = this.maxBreath;
                }
                this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
            }

            getAABB(pos) {
                return {
                    minX: Math.floor(pos.x - PLAYER_W/2 + 0.5),
                    maxX: Math.ceil(pos.x + PLAYER_W/2 + 0.5) - 1,
                    minY: Math.floor(pos.y - CAM_H + 0.5),
                    maxY: Math.ceil(pos.y - CAM_H + PLAYER_H + 0.5) - 1,
                    minZ: Math.floor(pos.z - PLAYER_D/2 + 0.5),
                    maxZ: Math.ceil(pos.z + PLAYER_D/2 + 0.5) - 1
                };
            }

            checkCollision(pos) {
                const box = this.getAABB(pos);
                const pMinX = pos.x - PLAYER_W/2, pMaxX = pos.x + PLAYER_W/2;
                const pMinY = pos.y - CAM_H,       pMaxY = pos.y - CAM_H + PLAYER_H;
                const pMinZ = pos.z - PLAYER_D/2,  pMaxZ = pos.z + PLAYER_D/2;

                for(let y = box.minY; y <= box.maxY; y++) {
                    for(let x = box.minX; x <= box.maxX; x++) {
                        for(let z = box.minZ; z <= box.maxZ; z++) {
                            const b = this.world.getBlock(x, y, z);
                            if (!b || b === BLOCKS.AIR) continue;
                            const bp = PROPS[b];
                            if (!bp || bp.isLiquid || bp.isSolid === false) continue;

                            if (b === BLOCKS.TORCH) continue;

                            if ((b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR) && this.world.isDoorOpen(x, y, z)) continue;

                            if (b === BLOCKS.GLASS_PANE) {
                                const HT = 0.0625;
                                if (pMaxX > x-0.5 && pMinX < x+0.5 &&
                                    pMaxY > y-0.5 && pMinY < y+0.5 &&
                                    pMaxZ > z-HT  && pMinZ < z+HT) return true;
                                continue;
                            }

                            if (b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR) {
                                const HT = 0.0625;
                                const facing = this.world.getDoorFacing(x, y, z);
                                if (facing === 'z') {
                                    if (pMaxX > x-0.5 && pMinX < x+0.5 &&
                                        pMaxY > y-0.5 && pMinY < y+0.5 &&
                                        pMaxZ > z-HT  && pMinZ < z+HT) return true;
                                } else {
                                    if (pMaxX > x-HT  && pMinX < x+HT &&
                                        pMaxY > y-0.5 && pMinY < y+0.5 &&
                                        pMaxZ > z-0.5 && pMinZ < z+0.5) return true;
                                }
                                continue;
                            }

                            if (b === BLOCKS.BED || b === BLOCKS.BED_HEAD) {
                                if (pMaxX > x-0.5 && pMinX < x+0.5 &&
                                    pMaxY > y-0.5 && pMinY < y-0.5+0.5625 &&
                                    pMaxZ > z-0.5 && pMinZ < z+0.5) return true;
                                continue;
                            }

                            if (b === BLOCKS.OAK_STAIR || b === BLOCKS.COBBLE_STAIR || b === BLOCKS.STAIR || b === BLOCKS.BIRCH_STAIR || b === BLOCKS.ACACIA_STAIR || b === BLOCKS.JUNGLE_STAIR) {
                                if (pMaxX > x-0.5 && pMinX < x+0.5 && pMaxY > y-0.5 && pMinY < y && pMaxZ > z-0.5 && pMinZ < z+0.5) return true;
                                if (pMaxX > x-0.5 && pMinX < x+0.5 && pMaxY > y && pMinY < y+0.5 && pMaxZ > z-0.5 && pMinZ < z) return true;
                                continue;
                            }

                            // ハーフブロック（下付き）
                            if (b === BLOCKS.STONE_SLAB || b === BLOCKS.PLANK_SLAB || b === BLOCKS.COBBLE_SLAB) {
                                if (pMaxX > x-0.5 && pMinX < x+0.5 &&
                                    pMaxY > y-0.5 && pMinY < y &&
                                    pMaxZ > z-0.5 && pMinZ < z+0.5) return true;
                                continue;
                            }

                            if (pMaxX > x-0.5 && pMinX < x+0.5 &&
                                pMaxY > y-0.5 && pMinY < y+0.5 &&
                                pMaxZ > z-0.5 && pMinZ < z+0.5) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            update(delta) {
                if(this.health <= 0) return;
                
                document.getElementById('debug-stats').innerHTML = `X: ${this.camera.position.x.toFixed(2)}<br>Y: ${(this.camera.position.y - CAM_H - Y_OFFSET).toFixed(2)}<br>Z: ${this.camera.position.z.toFixed(2)}<br>FPS: ${Math.round(1/delta)}`;
                const sneakEl = document.getElementById('sneak-indicator');
                if (sneakEl) sneakEl.style.display = this.isSneaking ? 'block' : 'none';
                const biomeInfo = this.world.getBiomeData(Math.floor(this.camera.position.x), Math.floor(this.camera.position.z));
                document.getElementById('biome-text').innerText = biomeInfo.type;

                if(this.combatCooldown > 0) this.combatCooldown -= delta;

                if(!this.controls.isLocked) {
                    this.keys['Mouse0'] = false; this.handleMining(delta); return;
                }

                const physY = this._physY;
                const headBlock = this.world.getBlock(Math.floor(this.camera.position.x), Math.floor(physY), Math.floor(this.camera.position.z));
                const footBlock = this.world.getBlock(Math.floor(this.camera.position.x), Math.floor(physY - CAM_H + 0.1), Math.floor(this.camera.position.z));
                const inWater = (headBlock === BLOCKS.WATER || footBlock === BLOCKS.WATER || headBlock === BLOCKS.LAVA || footBlock === BLOCKS.LAVA);
                const inLava = (headBlock === BLOCKS.LAVA || footBlock === BLOCKS.LAVA);
                const headInWater = (headBlock === BLOCKS.WATER);
                // クモの巣・竹の中では速度低下
                const inCobweb = (headBlock === BLOCKS.COBWEB || footBlock === BLOCKS.COBWEB);
                const inBamboo = (headBlock === BLOCKS.BAMBOO || footBlock === BLOCKS.BAMBOO);

                this.processStatusTicks(delta, headInWater);

                if (inLava) {
                    if (Math.floor(performance.now() / 500) % 2 === 0) {
                        if (!this.lavaTick) { this.takeDamage(4, new THREE.Vector3(0,0,0), true); this.lavaTick = true; }
                    } else { this.lavaTick = false; }
                    this.onFire = Math.max(this.onFire, 15); // 溶岩中は常に炎上
                } else {
                    // 溶岩の上に立っているときも燃える
                    const belowBlock = this.world.getBlock(Math.floor(this.camera.position.x), Math.floor(physY - CAM_H - 0.1), Math.floor(this.camera.position.z));
                    if (belowBlock === BLOCKS.LAVA && this.isGrounded) {
                        this.onFire = Math.max(this.onFire, 8);
                    }
                }
                // プレイヤーの炎上ダメージ
                if (this.onFire > 0) {
                    this.onFire -= delta;
                    if (Math.floor(performance.now() / 1000) !== this._lastFireTick) {
                        this._lastFireTick = Math.floor(performance.now() / 1000);
                        this.takeDamage(1, new THREE.Vector3(0,0,0), true);
                    }
                    // 画面を炎色に
                    const ov = document.getElementById('damage-overlay');
                    if (ov && this.onFire > 0) {
                        ov.style.background = 'rgba(255,100,0,0.25)';
                        ov.style.opacity = '1';
                    }
                } else if (this.onFire <= 0) {
                    this.onFire = 0;
                    const ov = document.getElementById('damage-overlay');
                    if (ov && ov.style.background.includes('255,100,0')) {
                        ov.style.opacity = '0';
                        setTimeout(() => { if (ov.style.background.includes('255,100,0')) ov.style.background = 'rgba(255,0,0,0.4)'; }, 400);
                    }
                    // 水に入ると消火
                    if (headBlock === BLOCKS.WATER || footBlock === BLOCKS.WATER) this.onFire = 0;
                }

                const prevSneaking = this.isSneaking;
                this.isSneaking = !this.isFlying && this.keys['ShiftLeft'] && !inWater;
                if (prevSneaking !== this.isSneaking) this._lastHandStateKey = null; 
                let speed = this.isDashing ? DASH_SPEED : (this.isSneaking ? WALK_SPEED * 0.3 : WALK_SPEED);
                if (inWater) speed *= 0.5;
                if (inLava) speed *= 0.5;
                if (inCobweb) { speed *= 0.1; this.vel.x *= 0.5; this.vel.z *= 0.5; } // クモの巣で大幅減速
                if (inBamboo) speed *= 0.8; // 竹の中でも少し遅くなる
                
                _vVel.set(0,0,0);
                if(this.keys['KeyW']) _vVel.z -= 1;
                if(this.keys['KeyS']) _vVel.z += 1;
                if(this.keys['KeyA']) _vVel.x -= 1;
                if(this.keys['KeyD']) _vVel.x += 1;
                if(_vVel.lengthSq() > 0) {
                    _vVel.normalize();
                    if(this.isGrounded && !inWater) this.addExhaustion(this.isDashing ? 0.01 * (delta/0.05) : 0.001 * (delta/0.05));
                }

                _vDir.copy(_vVel).applyQuaternion(this.camera.quaternion);
                _vDir.y = 0; 
                if(_vDir.lengthSq() > 0) _vDir.normalize();

                const currentMoveX = _vDir.x * speed;
                const currentMoveZ = _vDir.z * speed;

                if(this.isFlying) {
                    this.vel.y = 0;
                    if(this.keys['Space']) this.vel.y = speed;
                    if(this.keys['ShiftLeft']) this.vel.y = -speed;
                } else if (inWater) {
                    this.vel.y -= GRAVITY * 0.2 * delta; 
                    this.vel.y = Math.max(this.vel.y, -2.0);
                    if (this.keys['Space']) this.vel.y = 3.0;
                } else if (this._noGravity) {
                    this.vel.y = 0; // テレポート着地待ち中は重力OFF
                } else {
                    this.vel.y -= GRAVITY * delta; 
                    this.vel.y = Math.max(this.vel.y, TERMINAL_VELOCITY);
                }

                const originalPos = this.camera.position.clone();
                originalPos.y = this._physY; 
                let nextPos = originalPos.clone();

                nextPos.x += currentMoveX * delta;
                // バグ修正: プレイヤーのノックバック速度を適用・減衰
                if (this._kbVelX) {
                    nextPos.x += this._kbVelX * delta;
                    this._kbVelX *= 0.72; // 減衰
                    if (Math.abs(this._kbVelX) < 0.01) this._kbVelX = 0;
                }
                if(this.checkCollision(nextPos)) {
                    const stepUpX = nextPos.clone(); stepUpX.y += 0.6;
                    if (!this.checkCollision(stepUpX) && this.isGrounded) {
                        nextPos.y += 0.6; originalPos.y = nextPos.y;
                    } else { nextPos.x = originalPos.x; }
                } else { originalPos.x = nextPos.x; }

                nextPos.z += currentMoveZ * delta;
                if (this._kbVelZ) {
                    nextPos.z += this._kbVelZ * delta;
                    this._kbVelZ *= 0.72;
                    if (Math.abs(this._kbVelZ) < 0.01) this._kbVelZ = 0;
                }
                if(this.checkCollision(nextPos)) {
                    const stepUpZ = nextPos.clone(); stepUpZ.y += 0.6;
                    if (!this.checkCollision(stepUpZ) && this.isGrounded) {
                        nextPos.y += 0.6; originalPos.y = nextPos.y;
                    } else { nextPos.z = originalPos.z; }
                } else { originalPos.z = nextPos.z; }

                if (this.isSneaking && this.isGrounded) {
                    const feetY = Math.floor(nextPos.y - CAM_H);
                    const belowX = this.world.getBlock(Math.floor(nextPos.x), feetY - 1, Math.floor(originalPos.z));
                    if (belowX === BLOCKS.AIR || PROPS[belowX] && PROPS[belowX].isSolid === false) nextPos.x = originalPos.x;
                    const belowZ = this.world.getBlock(Math.floor(originalPos.x), feetY - 1, Math.floor(nextPos.z));
                    if (belowZ === BLOCKS.AIR || PROPS[belowZ] && PROPS[belowZ].isSolid === false) nextPos.z = originalPos.z;
                }

                nextPos.y += this.vel.y * delta;
                const wasGrounded = this.isGrounded;
                this.isGrounded = false;
                
                if(this.checkCollision(nextPos)) {
                    if (this.vel.y <= 0) {
                        this.isGrounded = true;
                        if (!wasGrounded && !this.isFlying && !inWater) {
                            const fallDist = this.fallHighestY - nextPos.y;
                            if (fallDist > 1.5) SoundManager.playLand();
                            if (fallDist > 3.0) this.takeDamage(Math.floor(fallDist - 3.0));
                            this.fallHighestY = nextPos.y;
                        }
                        if (this.keys['Space'] && !this.isFlying && !inWater && !this.isSneaking) {
                            this.vel.y = JUMP_VELOCITY;
                            this.isGrounded = false;
                            this.addExhaustion(this.isDashing ? 0.2 : 0.05);
                            SoundManager.playJump();
                        } else {
                            this.vel.y = 0;
                        }
                    } else {
                        this.vel.y = 0;
                    }
                    nextPos.y = originalPos.y; 
                }

                // 足音：移動中かつ地面にいるとき
                if (this.isGrounded && !this.isFlying && (_vVel.lengthSq() > 0)) {
                    const feetY = Math.floor(nextPos.y - CAM_H) - 1;
                    const underBlock = this.world.getBlock(Math.floor(nextPos.x), feetY, Math.floor(nextPos.z));
                    if (inWater) {
                        SoundManager.playFootstepWater();
                    } else if (underBlock === BLOCKS.GRASS || underBlock === BLOCKS.DIRT || underBlock === BLOCKS.FARMLAND || underBlock === BLOCKS.SAND) {
                        SoundManager.playFootstepGrass();
                    } else if (underBlock === BLOCKS.PLANK || underBlock === BLOCKS.BIRCH_PLANK || underBlock === BLOCKS.ACACIA_PLANK || underBlock === BLOCKS.JUNGLE_PLANK || underBlock === BLOCKS.DARK_OAK_PLANK || underBlock === BLOCKS.MANGROVE_PLANK || underBlock === BLOCKS.CHERRY_PLANK || underBlock === BLOCKS.WOOD || underBlock === BLOCKS.BIRCH_LOG || underBlock === BLOCKS.ACACIA_LOG || underBlock === BLOCKS.JUNGLE_LOG || underBlock === BLOCKS.DARK_OAK_LOG || underBlock === BLOCKS.MANGROVE_LOG || underBlock === BLOCKS.CHERRY_LOG || underBlock === BLOCKS.BAMBOO) {
                        SoundManager.playFootstepWood();
                    } else if (underBlock && PROPS[underBlock] && PROPS[underBlock].req === 'pick') {
                        SoundManager.playFootstepStone();
                    } else if (underBlock && underBlock !== BLOCKS.AIR) {
                        SoundManager.playFootstepGrass();
                    }
                }
                
                if (!this.isFlying && !inWater) {
                    if (!wasGrounded && this.isGrounded) {
                    } else if (this.vel.y < 0) {
                        this.fallHighestY = Math.max(this.fallHighestY, nextPos.y);
                    } else if (this.isGrounded) {
                        this.fallHighestY = nextPos.y;
                    }
                } else if (inWater) {
                    this.fallHighestY = nextPos.y;
                }

                this.camera.position.x = nextPos.x;
                this.camera.position.z = nextPos.z;
                this._physY = nextPos.y;
                this._physX = nextPos.x;
                this._physZ = nextPos.z;
                const sneakOff = this.isSneaking ? 0.3 : 0;
                this.camera.position.y = nextPos.y - sneakOff;
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, (this.isDashing && !inWater) ? 85 : 75, 0.1);
                this.camera.updateProjectionMatrix();

                if (this.camera.position.y < -15) this.takeDamage(20);

                this.handleInteraction(delta);
                this.updateDrops(delta);
                this._updateFishing(delta);
                this._updateTNT(delta);
                this._updatePortal(delta);
                this._updateHandMesh();
            }

            doSweepAttack() {
                if(this.combatCooldown > 0) return;
                const activeItem = this.ui.inv[this.ui.hotbarIdx];
                if (!activeItem || !PROPS[activeItem.id] || PROPS[activeItem.id].tool !== 'sword') return;
                SoundManager.playSword();
                
                const wep = PROPS[activeItem.id];
                this.combatCooldown = wep.cd;
                this.addExhaustion(0.1);
                
                const sweepGeo = new THREE.PlaneGeometry(2, 0.5);
                const sweepMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                const sweep = new THREE.Mesh(sweepGeo, sweepMat);
                
                const dir = new THREE.Vector3();
                this.camera.getWorldDirection(dir);
                sweep.position.copy(this.camera.position).add(dir.multiplyScalar(1.5));
                sweep.lookAt(this.camera.position);
                this.world.scene.add(sweep);
                
                let shrink = setInterval(() => {
                    sweep.scale.x -= 0.1; sweep.material.opacity -= 0.1;
                    if(sweep.material.opacity <= 0) { clearInterval(shrink); this.world.scene.remove(sweep); }
                }, 16);
            }

            handleInteraction(delta) {
                this.camera.updateMatrixWorld(); // 追加: 視点変更後も正しいカメラ行列を維持する
                this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
                const activeMeshes = Array.from(this.world.chunks.values()).flatMap(c => Object.values(c.meshes));
                const intersects = this.raycaster.intersectObjects(activeMeshes);

                let target = null, normal = null, blockId = 0;
                
                for(let inter of intersects) {
                    if (inter.distance < 5) {
                        if (inter.instanceId == null || !inter.object.isInstancedMesh) continue;
                        try {
                            inter.object.getMatrixAt(inter.instanceId, _mat);
                        } catch(e) { continue; }
                        const potentialTarget = new THREE.Vector3().setFromMatrixPosition(_mat);
                        potentialTarget.x = Math.round(potentialTarget.x);
                        potentialTarget.y = Math.round(potentialTarget.y);
                        potentialTarget.z = Math.round(potentialTarget.z);
                        
                        const sx = _mat.elements[0], sy = _mat.elements[5], sz = _mat.elements[10];
                        if (Math.abs(sx) < 0.01 && Math.abs(sy) < 0.01 && Math.abs(sz) < 0.01) continue;
                        let bId = this.world.getBlock(potentialTarget.x, potentialTarget.y, potentialTarget.z);
                        const heldItem = this.ui.inv[this.ui.hotbarIdx];
                        const holdingBucket = heldItem && heldItem.id === BLOCKS.BUCKET;
                        if (!bId || !PROPS[bId]) continue;
                        if (PROPS[bId].isLiquid && !holdingBucket) continue;
                        
                        if (bId === BLOCKS.AIR) {
                            let foundSpecial = false;
                            const rx = Math.round(potentialTarget.x), ry = Math.round(potentialTarget.y), rz = Math.round(potentialTarget.z);
                            for (let dy = 0; dy <= 1 && !foundSpecial; dy++) {
                                for (let ddx = -1; ddx <= 1 && !foundSpecial; ddx++) {
                                    for (let ddz = -1; ddz <= 1 && !foundSpecial; ddz++) {
                                        const nb = this.world.getBlock(rx+ddx, ry+dy, rz+ddz);
                                        if (nb === BLOCKS.DOOR || nb === BLOCKS.IRON_DOOR || nb === BLOCKS.BIRCH_DOOR || nb === BLOCKS.ACACIA_DOOR || nb === BLOCKS.JUNGLE_DOOR || nb === BLOCKS.BED || nb === BLOCKS.BED_HEAD) {
                                            potentialTarget.set(rx+ddx, ry+dy, rz+ddz);
                                            bId = nb; foundSpecial = true;
                                        }
                                    }
                                }
                            }
                            if (!foundSpecial) continue;
                        }
                        target = potentialTarget; normal = inter.face.normal; blockId = bId; break;
                    }
                }

                if (target) {
                    this.outlineMesh.position.copy(target);
                    this.outlineMesh.visible = true;
                } else {
                    this.outlineMesh.visible = false;
                }

                if (this.keys['Mouse0']) {
                    const shieldOff = this.ui.inv[79];
                    if (this.isSneaking && shieldOff && PROPS[shieldOff.id] && PROPS[shieldOff.id].tool === 'shield') {
                        this.keys['Mouse0'] = false;
                    }
                }
                if (this.keys['Mouse0']) {
                    const activeItem = this.ui.inv[this.ui.hotbarIdx];
                    const damage = (activeItem && PROPS[activeItem.id] && PROPS[activeItem.id].tool === 'sword') ? PROPS[activeItem.id].damage : 1;
                    
                    if (app.entityManager.raycastAttack(this.raycaster, damage, this.camera.position)) {
                        this.keys['Mouse0'] = false;
                        this._isSwinging = true; this._swingProgress = 0; // 攻撃アニメ
                        if(PROPS[activeItem?.id]?.tool === 'sword') this.doSweepAttack();
                        return;
                    }
                    
                    if (activeItem && PROPS[activeItem.id] && PROPS[activeItem.id].tool === 'sword') {
                        this.keys['Mouse0'] = false; 
                        this._isSwinging = true; this._swingProgress = 0;
                        this.doSweepAttack(); return;
                    }
                }

                if (this.keys['Mouse2'] && target && blockId === BLOCKS.CRAFT_TABLE) {
                    this.keys['Mouse2'] = false; this.ui.openCraftingTable(); return;
                }

                // 火打石と打ち金でTNT点火 / ネザーゲート点火
                if (this.keys['Mouse2']) {
                    const heldFire = this.ui.inv[this.ui.hotbarIdx];
                    if (heldFire && PROPS[heldFire.id] && PROPS[heldFire.id].tool === 'flint_steel') {
                        this.keys['Mouse2'] = false;
                        SoundManager.playFlintSteel();
                        if (target && blockId === BLOCKS.TNT) {
                            const fx = Math.floor(target.x), fy = Math.floor(target.y), fz = Math.floor(target.z);
                            this.world.setBlock(fx, fy, fz, BLOCKS.AIR);
                            this._spawnFuseTNT(fx, fy, fz);
                        }
                        // 黒曜石に当てた or 空中に向けた — どちらでもフレーム検索
                        {
                            const px = target ? Math.floor(target.x) : Math.floor(this.camera.position.x);
                            const py = target ? Math.floor(target.y) : Math.floor(this.camera.position.y - 1);
                            const pz = target ? Math.floor(target.z) : Math.floor(this.camera.position.z);
                            const portalFilled = this._tryFillPortal(px, py, pz);
                            if (portalFilled) {
                                const ov = document.getElementById('damage-overlay');
                                if(ov){ov.style.background='rgba(80,0,200,0.5)';ov.style.opacity='1';setTimeout(()=>{ov.style.opacity='0';setTimeout(()=>ov.style.background='rgba(255,0,0,0.4)',400);},600);}
                            }
                        }
                        if(heldFire.dur === undefined) heldFire.dur = PROPS[heldFire.id].maxDur;
                        heldFire.dur--;
                        if(heldFire.dur <= 0) this.ui.inv[this.ui.hotbarIdx] = null;
                        this.ui.render();
                        return;
                    }
                }

                const isDoorId = (id) => id === BLOCKS.DOOR || id === BLOCKS.IRON_DOOR || id === BLOCKS.BIRCH_DOOR || id === BLOCKS.ACACIA_DOOR || id === BLOCKS.JUNGLE_DOOR;
                if (this.keys['Mouse2'] && target && isDoorId(blockId)) {
                    this.keys['Mouse2'] = false;
                    SoundManager.playDoor();
                    this.world.toggleDoor(Math.floor(target.x), Math.floor(target.y), Math.floor(target.z));
                    return;
                }

                const heldItem = this.ui.inv[this.ui.hotbarIdx];
                if (this.keys['Mouse2'] && target && heldItem && PROPS[heldItem.id] && PROPS[heldItem.id].tool === 'hoe') {
                    if (blockId === BLOCKS.DIRT || blockId === BLOCKS.GRASS) {
                        this.keys['Mouse2'] = false;
                        this.world.setBlock(Math.floor(target.x), Math.floor(target.y), Math.floor(target.z), BLOCKS.FARMLAND);
                        if(heldItem.dur === undefined) heldItem.dur = PROPS[heldItem.id].maxDur;
                        heldItem.dur--;
                        if(heldItem.dur <= 0) { this.ui.inv[this.ui.hotbarIdx] = null; }
                        this.ui.render();
                        return;
                    }
                }

                if (this.keys['Mouse2'] && target && heldItem && heldItem.id === BLOCKS.WHEAT_SEEDS) {
                    if (blockId === BLOCKS.FARMLAND) {
                        const cropPos = target.clone().add(normal);
                        if (this.world.getBlock(cropPos.x, cropPos.y, cropPos.z) === BLOCKS.AIR) {
                            this.keys['Mouse2'] = false;
                            this.world.setBlock(Math.floor(cropPos.x), Math.floor(cropPos.y), Math.floor(cropPos.z), BLOCKS.WHEAT_SEEDS);
                            const posKey = `${Math.floor(cropPos.x)},${Math.floor(cropPos.y)},${Math.floor(cropPos.z)}`;
                            this.world.blockEntities.set(posKey, { isCrop: true, growth: 0, x: Math.floor(cropPos.x), y: Math.floor(cropPos.y), z: Math.floor(cropPos.z) });
                            this.ui.consumeActiveItem();
                            return;
                        }
                    }
                }

                if (this.keys['Mouse2'] && target && heldItem && heldItem.id === BLOCKS.CARROT) {
                    if (blockId === BLOCKS.FARMLAND) {
                        const cropPos = target.clone().add(normal);
                        if (this.world.getBlock(cropPos.x, cropPos.y, cropPos.z) === BLOCKS.AIR) {
                            this.keys['Mouse2'] = false;
                            this.world.setBlock(Math.floor(cropPos.x), Math.floor(cropPos.y), Math.floor(cropPos.z), BLOCKS.CARROT_STAGE1);
                            const posKey = `${Math.floor(cropPos.x)},${Math.floor(cropPos.y)},${Math.floor(cropPos.z)}`;
                            this.world.blockEntities.set(posKey, { isCrop: true, growth: 0, x: Math.floor(cropPos.x), y: Math.floor(cropPos.y), z: Math.floor(cropPos.z) });
                            this.ui.consumeActiveItem();
                            return;
                        }
                    }
                }

                if (this.keys['Mouse2'] && target && heldItem && heldItem.id === BLOCKS.POTATO) {
                    if (blockId === BLOCKS.FARMLAND) {
                        const cropPos = target.clone().add(normal);
                        if (this.world.getBlock(cropPos.x, cropPos.y, cropPos.z) === BLOCKS.AIR) {
                            this.keys['Mouse2'] = false;
                            this.world.setBlock(Math.floor(cropPos.x), Math.floor(cropPos.y), Math.floor(cropPos.z), BLOCKS.POTATO_STAGE1);
                            const posKey = `${Math.floor(cropPos.x)},${Math.floor(cropPos.y)},${Math.floor(cropPos.z)}`;
                            this.world.blockEntities.set(posKey, { isCrop: true, growth: 0, x: Math.floor(cropPos.x), y: Math.floor(cropPos.y), z: Math.floor(cropPos.z) });
                            this.ui.consumeActiveItem();
                            return;
                        }
                    }
                }

                const eatItem = this.ui.inv[this.ui.hotbarIdx];
                if (this.keys['Mouse2'] && eatItem && PROPS[eatItem.id] && PROPS[eatItem.id].foodValue && this.mode === 'survival') {
                    if (this.hunger < this.maxHunger || eatItem.id === BLOCKS.ROTTEN_FLESH) {
                        this.eatTimer += delta;
                        if (this.eatTimer >= 0.8) {
                            this.eatTimer = 0;
                            SoundManager.playEat();
                            this.hunger = Math.min(this.maxHunger, this.hunger + PROPS[eatItem.id].foodValue);
                            this.ui.consumeActiveItem();
                            this.ui.updateStatusBars(this.health, this.hunger, this.breath, this.armor);
                            this.keys['Mouse2'] = false;
                            if (eatItem.id === BLOCKS.ROTTEN_FLESH && Math.random() < 0.8) {
                                this.addExhaustion(10.0);
                            }
                        }
                        return; 
                    } else {
                        this.eatTimer = 0;
                    }
                } else {
                    this.eatTimer = 0;
                }

                this.handleMining(delta, target, blockId);

                if (this.keys['Mouse2'] && target) {
                    if (blockId === BLOCKS.FURNACE) {
                        this.keys['Mouse2'] = false; SoundManager.playFurnace(); this.ui.openFurnace(`${Math.floor(target.x)},${Math.floor(target.y)},${Math.floor(target.z)}`); return;
                    } else if (blockId === BLOCKS.CHEST) {
                        this.keys['Mouse2'] = false; SoundManager.playChest(); this.ui.openChest(`${Math.floor(target.x)},${Math.floor(target.y)},${Math.floor(target.z)}`); return;
                    } else if (blockId === BLOCKS.BARREL) {
                        this.keys['Mouse2'] = false; SoundManager.playChest(); this.ui.openChest(`${Math.floor(target.x)},${Math.floor(target.y)},${Math.floor(target.z)}`); return;
                    } else if (blockId === BLOCKS.SMOKER) {
                        this.keys['Mouse2'] = false; SoundManager.playFurnace(); this.ui.openFurnace(`${Math.floor(target.x)},${Math.floor(target.y)},${Math.floor(target.z)}`); return;
                    } else if (blockId === BLOCKS.BED || blockId === BLOCKS.BED_HEAD) {
                        this.keys['Mouse2'] = false;
                        if (app.timeOfDay > 0.45) {
                            const sleepOverlay = document.getElementById('sleep-overlay');
                            const sleepText = document.getElementById('sleep-text');
                            if (sleepOverlay) {
                                sleepOverlay.style.display = 'flex';
                                sleepOverlay.style.opacity = '0';
                                sleepText.style.opacity = '0';
                                requestAnimationFrame(() => {
                                    sleepOverlay.style.opacity = '1';
                                    sleepText.style.opacity = '1';
                                });
                                setTimeout(() => {
                                    app.timeOfDay = 0.02;
                                    app.entityManager.entities.filter(e => e.isHostile).forEach(e => {
                                        app.scene.remove(e.mesh);
                                        e.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
                                    });
                                    app.entityManager.entities = app.entityManager.entities.filter(e => !e.isHostile);
                                    setTimeout(() => {
                                        sleepOverlay.style.opacity = '0';
                                        sleepText.style.opacity = '0';
                                        setTimeout(() => { sleepOverlay.style.display = 'none'; }, 1100);
                                    }, 1500);
                                }, 1800);
                            } else {
                                app.timeOfDay = 0.02;
                                app.entityManager.entities.filter(e => e.isHostile).forEach(e => {
                                    app.scene.remove(e.mesh);
                                    e.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
                                });
                                app.entityManager.entities = app.entityManager.entities.filter(e => !e.isHostile);
                            }
                        }
                        return;
                    }
                }

                const heldBucket = this.ui.inv[this.ui.hotbarIdx];
                if (this.keys['Mouse2'] && heldBucket) {
                    if (heldBucket.id === BLOCKS.BUCKET && target) {
                        if (blockId === BLOCKS.WATER) {
                            this.keys['Mouse2'] = false;
                            this.world.setBlock(Math.floor(target.x), Math.floor(target.y), Math.floor(target.z), BLOCKS.AIR);
                            heldBucket.id = BLOCKS.WATER_BUCKET;
                            this.ui.render();
                            return;
                        } else if (blockId === BLOCKS.LAVA) {
                            this.keys['Mouse2'] = false;
                            this.world.setBlock(Math.floor(target.x), Math.floor(target.y), Math.floor(target.z), BLOCKS.AIR);
                            heldBucket.id = BLOCKS.LAVA_BUCKET;
                            this.ui.render();
                            return;
                        }
                    } else if (heldBucket.id === BLOCKS.WATER_BUCKET && target && normal) {
                        this.keys['Mouse2'] = false;
                        const wp = target.clone().add(normal);
                        this.world.setBlock(Math.floor(wp.x), Math.floor(wp.y), Math.floor(wp.z), BLOCKS.WATER);
                        heldBucket.id = BLOCKS.BUCKET;
                        this.ui.render();
                        return;
                    } else if (heldBucket.id === BLOCKS.LAVA_BUCKET && target && normal) {
                        this.keys['Mouse2'] = false;
                        const wp = target.clone().add(normal);
                        this.world.setBlock(Math.floor(wp.x), Math.floor(wp.y), Math.floor(wp.z), BLOCKS.LAVA);
                        heldBucket.id = BLOCKS.BUCKET;
                        this.ui.render();
                        return;
                    }
                }

                if (this.keys['Mouse2'] && this.keys['ShiftLeft'] && !this.isGrounded) {
                    const item = this.ui.inv[this.ui.hotbarIdx];
                    if (item && PROPS[item.id] && !PROPS[item.id].isItem && !PROPS[item.id].isDoor && (!item.ghost)) {
                        const bx = Math.floor(this.camera.position.x);
                        const by = Math.floor(this.camera.position.y - CAM_H) - 1;
                        const bz = Math.floor(this.camera.position.z);
                        if (this.world.getBlock(bx, by, bz) === BLOCKS.AIR) {
                            this.world.setBlock(bx, by, bz, item.id);
                            if(this.mode === 'survival') this.ui.consumeActiveItem();
                            this.keys['Mouse2'] = false;
                            return;
                        }
                    }
                }

                if (this.keys['Mouse2'] && !target) {
                    if (heldItem && heldItem.id === BLOCKS.ENDER_PEARL && !heldItem.ghost) {
                        this.keys['Mouse2'] = false;
                        // エンダーパールを投げる（テレポート）
                        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
                        const spawnPos = this.camera.position.clone().add(dir.clone().multiplyScalar(0.5));
                        // シンプルなレイキャストで着地点を探す
                        let tpX = this.camera.position.x + dir.x * 20;
                        let tpY = this.camera.position.y + dir.y * 20;
                        let tpZ = this.camera.position.z + dir.z * 20;
                        for (let t = 1; t < 40; t += 0.5) {
                            const tx2 = this.camera.position.x + dir.x * t;
                            const ty2 = this.camera.position.y + dir.y * t - 0.02 * t * t;
                            const tz2 = this.camera.position.z + dir.z * t;
                            const bid2 = this.world.getBlock(Math.floor(tx2), Math.floor(ty2), Math.floor(tz2));
                            if (bid2 && bid2 !== BLOCKS.AIR && PROPS[bid2] && PROPS[bid2].isSolid !== false) {
                                tpX = tx2; tpY = ty2 + 1.0; tpZ = tz2;
                                break;
                            }
                        }
                        this.camera.position.set(tpX, tpY + CAM_H, tpZ);
                        this._physY = tpY + CAM_H; // physYも更新
                        this.takeDamage(5); // テレポートダメージ
                        if (this.mode === 'survival') this.ui.consumeActiveItem();
                        return;
                    }
                    if (heldItem && PROPS[heldItem.id] && PROPS[heldItem.id].tool === 'fishing_rod' && (!heldItem.ghost)) {
                        this.keys['Mouse2'] = false;
                        this._startFishing();
                        return;
                    }
                    if (heldItem && PROPS[heldItem.id] && PROPS[heldItem.id].tool === 'bow' && (!heldItem.ghost)) {
                        this.keys['Mouse2'] = false;
                        const arrowSlot2 = this.ui.inv.slice(0, 36).findIndex(s => s && s.id === BLOCKS.ARROW && !s.ghost);
                        if (arrowSlot2 !== -1) {
                            this.ui.inv[arrowSlot2].count--;
                            if(this.ui.inv[arrowSlot2].count <= 0) this.ui.inv[arrowSlot2] = null;
                            this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
                            app.entityManager.raycastAttack(this.raycaster, 6, this.camera.position, false);
                            this._spawnArrow();
                            if(heldItem.dur === undefined) heldItem.dur = PROPS[heldItem.id].maxDur;
                            heldItem.dur--;
                            if(heldItem.dur <= 0) { this.ui.inv[this.ui.hotbarIdx] = null; }
                            this.ui.render();
                        }
                    }
                }

                if (this.keys['Mouse2'] && target && normal) {
                    this.keys['Mouse2'] = false;
                    const item = this.ui.inv[this.ui.hotbarIdx];
                    
                    if (item && item.ghost) return;

                    if (item && PROPS[item.id].tool === 'bow') {
                        const arrowSlot = this.ui.inv.slice(0, 36).findIndex(s => s && s.id === BLOCKS.ARROW && !s.ghost);
                        if (arrowSlot !== -1) {
                            this.ui.inv[arrowSlot].count--;
                            if(this.ui.inv[arrowSlot].count <= 0) this.ui.inv[arrowSlot] = null;
                            const arrowDamage = 6;
                            this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
                            app.entityManager.raycastAttack(this.raycaster, arrowDamage, this.camera.position, false);
                            this._spawnArrow();
                            SoundManager.playBowShoot();
                            if(item.dur === undefined) item.dur = PROPS[item.id].maxDur;
                            item.dur--;
                            if(item.dur <= 0) { this.ui.inv[this.ui.hotbarIdx] = null; }
                            this.ui.render();
                        }
                        return;
                    }
                    
                    if (item && PROPS[item.id] && !PROPS[item.id].isItem) {
                        const p = target.clone().add(normal);
                        _boxPlayer.setFromCenterAndSize(
                            new THREE.Vector3(this.camera.position.x, this.camera.position.y - CAM_H + PLAYER_H/2, this.camera.position.z),
                            new THREE.Vector3(PLAYER_W, PLAYER_H, PLAYER_D)
                        );
                        _boxBlock.setFromCenterAndSize(p, _scaleOne);
                        
                        if (!_boxPlayer.intersectsBox(_boxBlock)) {
                            SoundManager.playPlace();
                            if (PROPS[item.id].isDoor) {
                                const dir = new THREE.Vector3();
                                this.camera.getWorldDirection(dir);
                                const facing = Math.abs(dir.z) >= Math.abs(dir.x) ? 'z' : 'x';
                                const fx = Math.floor(p.x), fy = Math.floor(p.y), fz = Math.floor(p.z);
                                this.world.doorFacing.set(`${fx},${fy},${fz}`, facing);
                                this.world.setBlock(p.x, p.y, p.z, item.id);
                                this.world.setBlock(p.x, p.y + 1, p.z, item.id);
                                this.world.saveMods();
                            } else if (item.id === BLOCKS.BED) {
                                const dir = new THREE.Vector3();
                                this.camera.getWorldDirection(dir);
                                let dx = 0, dz = 0;
                                if (Math.abs(dir.z) >= Math.abs(dir.x)) {
                                    dz = dir.z > 0 ? 1 : -1;
                                } else {
                                    dx = dir.x > 0 ? 1 : -1;
                                }
                                const headPos = p.clone().add(new THREE.Vector3(dx, 0, dz));
                                if (this.world.getBlock(headPos.x, headPos.y, headPos.z) === BLOCKS.AIR) {
                                    this.world.setBlock(p.x, p.y, p.z, BLOCKS.BED);
                                    this.world.setBlock(headPos.x, headPos.y, headPos.z, BLOCKS.BED_HEAD);
                                    if(this.mode === 'survival') this.ui.consumeActiveItem();
                                }
                                return;
                            } else if (PROPS[item.id].isStair || item.id === BLOCKS.OAK_STAIR || item.id === BLOCKS.COBBLE_STAIR) {
                                const dir = new THREE.Vector3();
                                this.camera.getWorldDirection(dir);
                                dir.y = 0; dir.normalize();
                                let stairFacing = 'n';
                                if (Math.abs(dir.z) >= Math.abs(dir.x)) {
                                    stairFacing = dir.z > 0 ? 's' : 'n';
                                } else {
                                    stairFacing = dir.x > 0 ? 'e' : 'w';
                                }
                                const fx = Math.floor(p.x), fy = Math.floor(p.y), fz = Math.floor(p.z);
                                this.world.stairFacing.set(`${fx},${fy},${fz}`, stairFacing);
                                this.world.setBlock(p.x, p.y, p.z, item.id);
                                this.world.saveMods();
                            } else if (PROPS[item.id].isSlab) {
                                // スラブ：ブロックの下半分に設置
                                this.world.setBlock(p.x, p.y, p.z, item.id);
                                if(this.mode === 'survival') this.ui.consumeActiveItem();
                                return;
                            } else if (item.id === BLOCKS.SAPLING) {
                                // 苗木：草・土ブロックの上のみ設置可
                                const below = this.world.getBlock(p.x, p.y - 1, p.z);
                                if (below === BLOCKS.GRASS || below === BLOCKS.DIRT) {
                                    this.world.setBlock(p.x, p.y, p.z, BLOCKS.SAPLING);
                                    if(this.mode === 'survival') this.ui.consumeActiveItem();
                                }
                                return;
                            } else {
                                this.world.setBlock(p.x, p.y, p.z, item.id);
                            }
                            if(this.mode === 'survival') this.ui.consumeActiveItem();
                        }
                    }
                }
            }

            handleMining(delta, target = null, blockId = 0) {
                const uiProgress = document.getElementById('progress-container');
                const uiBar = document.getElementById('progress-bar');

                if (this.keys['Mouse0'] && target) {
                    if (this.mode === 'creative') {
                        this.breakBlock(target, blockId); this.keys['Mouse0'] = false; 
                        this._isSwinging = true; this._swingProgress = 0;
                    } else {
                        if (!this.miningTarget || !this.miningTarget.equals(target)) {
                            this.miningTarget = target.clone(); this.miningTime = 0;
                            this.crackMesh.position.copy(target); this.crackMesh.visible = true;
                            this._isSwinging = true; this._swingProgress = 0;
                        }
                        this.miningTime += delta;
                        SoundManager.playMining(blockId);
                        uiProgress.style.display = 'block';
                        
                        const activeItem = this.ui.inv[this.ui.hotbarIdx];
                        const blockProps = PROPS[blockId];
                        
                        let isCorrectTool = false;
                        let canDrop = false;
                        let toolEff = 1.0;
                        const toolTier = (activeItem && !activeItem.ghost && PROPS[activeItem.id]) ? (PROPS[activeItem.id].tier || 0) : 0;
                        const reqTier = blockProps.minTier || 0;

                        if (activeItem && !activeItem.ghost && PROPS[activeItem.id] && PROPS[activeItem.id].tool === blockProps.req) {
                            isCorrectTool = true;
                            toolEff = PROPS[activeItem.id].eff || 1.0;
                        } else if (!blockProps.req) {
                            isCorrectTool = true;
                        }

                        if (reqTier === 0) {
                            canDrop = true; 
                        } else if (activeItem && !activeItem.ghost && PROPS[activeItem.id] && PROPS[activeItem.id].tool === blockProps.req && toolTier >= reqTier) {
                            canDrop = true; 
                        }
                        
                        const reqTime = (isCorrectTool ? 1.5 : 5.0) * (blockProps.hard || 1.0) / toolEff;
                        const progress = this.miningTime / reqTime;

                        uiBar.style.width = Math.min(progress * 100, 100) + '%';

                        const crackStage = Math.floor(progress * 9); 
                        this.crackCtx.clearRect(0, 0, 16, 16);

                        if (crackStage > 0) {
                            this.crackCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                            const crackPixels = [
                                [[7,7], [8,8]],                                     
                                [[6,6], [9,9], [9,6], [6,9]],                       
                                [[7,5], [8,10], [5,7], [10,8]],                     
                                [[5,5], [10,10], [10,5], [5,10], [8,4], [7,11]],   
                                [[4,4], [11,11], [11,4], [4,11], [4,8], [11,7]],   
                                [[8,2], [7,13], [2,8], [13,7], [5,3], [10,12]],     
                                [[1,1], [14,14], [14,1], [1,14], [8,1], [7,14]],   
                                [[0,0], [15,15], [15,0], [0,15], [0,8], [15,7]],   
                                [[8,0], [7,15], [0,4], [15,11], [4,0], [11,15]]    
                            ];
                            for (let s = 0; s < crackStage; s++) {
                                if (crackPixels[s]) {
                                    crackPixels[s].forEach(([px, py]) => {
                                        this.crackCtx.fillRect(px, py, 1, 1);
                                    });
                                }
                            }
                        }
                        this.crackMesh.material.map.needsUpdate = true;
                        
                        if(this.miningTime >= reqTime) {
                            this.breakBlock(target, blockId, canDrop);
                            this.addExhaustion(0.005);
                            
                            if (activeItem && !activeItem.ghost && PROPS[activeItem.id].tool) {
                                if (activeItem.dur === undefined) activeItem.dur = PROPS[activeItem.id].maxDur || 59;
                                activeItem.dur--;
                                if (activeItem.dur <= 0) {
                                    this.ui.inv[this.ui.hotbarIdx] = null;
                                    this.ui.render();
                                }
                            }
                            
                            this.miningTarget = null; this.miningTime = 0; uiBar.style.width = '0%';
                            this.crackMesh.visible = false;
                        }
                    }
                } else {
                    this.miningTarget = null; this.miningTime = 0;
                    uiProgress.style.display = 'none'; uiBar.style.width = '0%';
                    this.crackMesh.visible = false;
                }
            }

            breakBlock(pos, id, canDrop = true) {
                this.world.hideBlockInstance(pos.x, pos.y, pos.z, id);
                SoundManager.playBreak(id);

                // チェストとかまどを破壊したとき中身をドロップ
                if (id === BLOCKS.CHEST || id === BLOCKS.FURNACE) {
                    const k = `${Math.floor(pos.x)},${Math.floor(pos.y)},${Math.floor(pos.z)}`;
                    const ent = this.world.blockEntities.get(k);
                    if (ent) {
