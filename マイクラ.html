        const COLORED_WOOL_IDS = [
            BLOCKS.WOOL, BLOCKS.WOOL_RED, BLOCKS.WOOL_BLUE, BLOCKS.WOOL_GREEN,
            BLOCKS.WOOL_YELLOW, BLOCKS.WOOL_BLACK, BLOCKS.WOOL_GRAY, BLOCKS.WOOL_CYAN,
            BLOCKS.WOOL_PURPLE, BLOCKS.WOOL_ORANGE, BLOCKS.WOOL_LIME, BLOCKS.WOOL_PINK,
            BLOCKS.WOOL_BROWN, BLOCKS.WOOL_LIGHT_BLUE, BLOCKS.WOOL_MAGENTA, BLOCKS.WOOL_SILVER
        ];
        const WOOL_COLORS_HEX = [
            0xeeeeee, 0xcc3333, 0x3355cc, 0x336633, 0xcccc33, 0x222222, 0x666666,
            0x33aaaa, 0x882299, 0xdd7733, 0x66cc33, 0xee88bb, 0x774422, 0x55aaee, 0xcc44cc, 0xaaaaaa
        ];
        // 羊の色の確率分布（白が多い）
        const SHEEP_COLOR_WEIGHTS = [70,5,5,3,5,3,3,2,2,3,2,2,2,2,2,3];
        function getRandomSheepColorIdx() {
            const total = SHEEP_COLOR_WEIGHTS.reduce((a,b)=>a+b,0);
            let r = Math.random() * total;
            for (let i=0; i<SHEEP_COLOR_WEIGHTS.length; i++) { r -= SHEEP_COLOR_WEIGHTS[i]; if (r <= 0) return i; }
            return 0;
        }

        // ============================================================
        // SoundManager - Web Audio API 効果音システム
        // ============================================================
        const SoundManager = (() => {
            let ctx = null;
            const getCtx = () => {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                return ctx;
            };

            function play(nodes) {
                const ac = getCtx();
                if (ac.state === 'suspended') ac.resume();
                nodes(ac);
            }

            // 基本的なサウンド生成ヘルパー
            function tone(freq, type, start, dur, vol, ac, dest, ramp = false) {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain); gain.connect(dest || ac.destination);
                osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime + start);
                gain.gain.setValueAtTime(vol, ac.currentTime + start);
                if (ramp) gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
                osc.start(ac.currentTime + start);
                osc.stop(ac.currentTime + start + dur);
            }

            function noise(dur, vol, filterFreq, ac) {
                const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                const src = ac.createBufferSource();
                src.buffer = buf;
                const flt = ac.createBiquadFilter();
                flt.type = 'bandpass'; flt.frequency.value = filterFreq;
                const gain = ac.createGain();
                gain.gain.setValueAtTime(vol, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
                src.connect(flt); flt.connect(gain); gain.connect(ac.destination);
                src.start(); src.stop(ac.currentTime + dur);
            }

            _createModel(color) {
                const mat = new THREE.MeshLambertMaterial({ color: color });
                const addPart = (w, h, d, x, y, z) => {
                    const g = new THREE.BoxGeometry(w, h, d);
                    const m = new THREE.Mesh(g, mat);
                    m.position.set(x, y, z);
                    this.mesh.add(m);
                    return m;
                };

                if (['ZOMBIE', 'SKELETON', 'VILLAGER'].includes(this.type)) {
                    addPart(0.4, 0.6, 0.2, 0, 0.4, 0); 
                    addPart(0.4, 0.4, 0.4, 0, 0.9, 0); 
                    const lLeg = addPart(0.15, 0.6, 0.15, -0.12, -0.2, 0); 
                    const rLeg = addPart(0.15, 0.6, 0.15, 0.12, -0.2, 0); 
                    const lArm = addPart(0.15, 0.6, 0.15, -0.28, 0.4, 0); 
                    const rArm = addPart(0.15, 0.6, 0.15, 0.28, 0.4, 0); 
                    if (this.type === 'ZOMBIE') { lArm.rotation.x = -Math.PI/2; rArm.rotation.x = -Math.PI/2; }
                    if (this.type === 'SKELETON') {
                        // Add bow held in right hand
                        const bowMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
                        const bowG = new THREE.BoxGeometry(0.06, 0.55, 0.06);
                        const bowMesh = new THREE.Mesh(bowG, bowMat);
                        bowMesh.position.set(0.0, -0.1, 0.12);
                        rArm.add(bowMesh);
                        const strMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });
                        const strG = new THREE.BoxGeometry(0.02, 0.5, 0.02);
                        const strMesh = new THREE.Mesh(strG, strMat);
                        strMesh.position.set(0.0, -0.1, 0.20);
                        rArm.add(strMesh);
                    }
                    this.limbs = [
                        { mesh: lLeg, axis: 'x', base: 0, phase: 0 },
                        { mesh: rLeg, axis: 'x', base: 0, phase: Math.PI },
                        { mesh: lArm, axis: 'x', base: this.type === 'ZOMBIE' ? -Math.PI/2 : 0, phase: Math.PI },
                        { mesh: rArm, axis: 'x', base: this.type === 'ZOMBIE' ? -Math.PI/2 : 0, phase: 0 },
                    ];
                } else if (this.type === 'PIG') {
                    addPart(0.6, 0.6, 1.0, 0, 0.2, 0); 
                    addPart(0.4, 0.4, 0.4, 0, 0.4, 0.5); 
                    const fl = addPart(0.2, 0.4, 0.2, -0.2, -0.3, 0.35); 
                    const fr = addPart(0.2, 0.4, 0.2, 0.2, -0.3, 0.35); 
                    const bl = addPart(0.2, 0.4, 0.2, -0.2, -0.3, -0.35); 
                    const br = addPart(0.2, 0.4, 0.2, 0.2, -0.3, -0.35); 
                    this.limbs = [
                        { mesh: fl, axis: 'x', base: 0, phase: 0 },
                        { mesh: fr, axis: 'x', base: 0, phase: Math.PI },
                        { mesh: bl, axis: 'x', base: 0, phase: Math.PI },
                        { mesh: br, axis: 'x', base: 0, phase: 0 },
                    ];

            updatePhysics(delta, world) {
                this.vel.x *= AIR_RESISTANCE; 
                this.vel.z *= AIR_RESISTANCE;

                // ===== 重力適用（バグ修正：以前は重力がMOBに適用されていなかった）=====
                if (!this._isFlying) {
                    this.vel.y -= GRAVITY * delta;
                    if (this.vel.y < TERMINAL_VELOCITY) this.vel.y = TERMINAL_VELOCITY;
                }

                if (this.type === 'CHICKEN' && this.vel.y < -0.02) this.vel.y = -0.02; 

                let nextX = this.pos.x + this.vel.x;
                let nextY = this.pos.y + this.vel.y;
                let nextZ = this.pos.z + this.vel.z;

                let colX = world.checkCollisionForEntity(nextX, this.pos.y, this.pos.z, this.w, this.h, this.d);
                let colZ = world.checkCollisionForEntity(this.pos.x, this.pos.y, nextZ, this.w, this.h, this.d);
                let colY = world.checkCollisionForEntity(this.pos.x, nextY, this.pos.z, this.w, this.h, this.d);

                if (this.kbTimer > 0) this.kbTimer -= delta;

                if ((colX || colZ) && this.onGround && this.kbTimer <= 0) {
                    let headClearance = !world.checkCollisionForEntity(this.pos.x, this.pos.y + 1.05 + this.h, this.pos.z, this.w, this.h, this.d);
                    if (headClearance) {
                        let canStep = false;
                        for (let s = 0.1; s <= STEP_HEIGHT; s += 0.1) {
                            if (!world.checkCollisionForEntity(nextX, this.pos.y + s, nextZ, this.w, this.h, this.d)) {
                                this.pos.y += s; 
                                canStep = true;
                                colX = false; colZ = false;
                                break;
                            }
                        }
                        if (!canStep && Math.random() < 0.1) this.vel.y = 0.4;
                    }
                }

                if (colX) this.vel.x = 0; else this.pos.x = nextX;
                if (colZ) this.vel.z = 0; else this.pos.z = nextZ;
                
                if (colY) {
                    if (this.vel.y < 0) { this.onGround = true; this.isGrounded = true; }
                    this.vel.y = 0;
                } else {
                    this.onGround = false;
                    this.isGrounded = false;
                    if (!this._isFlying) this.pos.y = nextY;
                    else this.pos.y = nextY; // 飛行系は自前でpos.yを更新
                }

                this.mesh.position.copy(this.pos);
                if (Math.abs(this.vel.x) > 0.0001 || Math.abs(this.vel.z) > 0.0001) {
                    this.mesh.rotation.y = Math.atan2(this.vel.x, this.vel.z);
                }

                const horizSpeed = Math.sqrt(this.vel.x * this.vel.x + this.vel.z * this.vel.z);
                if (horizSpeed > 0.0005) {
                    this.walkTimer += delta * 10; 
                    for (const limb of this.limbs) {
                        limb.mesh.rotation[limb.axis] = limb.base + Math.sin(this.walkTimer + limb.phase) * 0.8;
                    }
                } else {
                    for (const limb of this.limbs) {
                        limb.mesh.rotation[limb.axis] += (limb.base - limb.mesh.rotation[limb.axis]) * 0.15;
                    }
                }
            }

            updateAI(delta, player, ticks, world, ui) {
                this.stateTimer -= delta;
                // バグ修正: ノックバック中はAIによるvel上書きを防ぐ（飛行系は除外）
                if (this.kbTimer > 0 && !this._isFlying) {
                    this.vel.x *= 0.85;
                    this.vel.z *= 0.85;
                    return;
                }
                // スポーン無敵中は点滅
                this.mesh.traverse(c => { if (c.isMesh) c.visible = true; });
                const distToPlayer = this.pos.distanceTo(player.camera.position);
                const dx = player.camera.position.x - this.pos.x;
                const dz = player.camera.position.z - this.pos.z;

                if (this.state === 'PANIC') {
                    if (this.stateTimer <= 0) this.state = 'IDLE';
                    else {
                        const angle = Math.atan2(-dz, -dx); 
                        this.vel.x = Math.cos(angle) * this.speed * 2.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 2.5 * delta;
                    }
                    return;
                }

                if (!this.isHostile && ['PIG', 'COW', 'SHEEP'].includes(this.type)) {
                    const activeItem = ui.inv[ui.hotbarIdx];
                    if (activeItem && (activeItem.id === BLOCKS.WHEAT || activeItem.id === BLOCKS.CARROT) && distToPlayer < 10) {
                        this.state = 'FOLLOW';
                        if (distToPlayer > 2.5) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else {
                            this.vel.x = 0; this.vel.z = 0;
                        }
                        return;
                    }
                }

                if (this.type === 'CHICKEN') {
                    this.eggTimer -= delta;
                    if (this.eggTimer <= 0) {
                        player.spawnDrop(this.pos.clone(), BLOCKS.EGG, 1);
                        this.eggTimer = 300;
                    }
                }

                if (this.type === 'VILLAGER') {
                    const vDist = this.pos.distanceTo(this.origin);
                    const MAX_VILLAGER_RADIUS = 25;
                    if (vDist > MAX_VILLAGER_RADIUS) {
                        const angle = Math.atan2(this.origin.z - this.pos.z, this.origin.x - this.pos.x);
                        this.vel.x = Math.cos(angle) * this.speed * 2.0 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 2.0 * delta;
                        return;
                    } else if (ticks > 13000 && vDist > 2) { 
                        const angle = Math.atan2(this.origin.z - this.pos.z, this.origin.x - this.pos.x);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                        return;
                    }
                    // 夜は村に帰る
                    if (app.timeOfDay > 0.48 && vDist > 5) {
                        const angle = Math.atan2(this.origin.z - this.pos.z, this.origin.x - this.pos.x);
                        this.vel.x = Math.cos(angle) * this.speed * 1.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 1.5 * delta;
                        return;
                    }
                }

                // 猫のAI
                if (this.type === 'CAT') {
                    const catHomeDist = this.pos.distanceTo(this.origin);
                    if (catHomeDist > 20) {
                        const angle = Math.atan2(this.origin.z - this.pos.z, this.origin.x - this.pos.x);
                        this.vel.x = Math.cos(angle) * this.speed * 1.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 1.5 * delta;
                        return;
                    }
                    // プレイヤーが近づくと逃げる
                    if (distToPlayer < 4) {
                        const angle = Math.atan2(-dz, -dx);
                        this.vel.x = Math.cos(angle) * this.speed * 2.0 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 2.0 * delta;
                        return;
                    }
                }

                // 犬のAI
                if (this.type === 'DOG') {
                    // プレイヤーが近づくと近寄る（友好的）
                    if (distToPlayer < 8 && distToPlayer > 2) {
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * 0.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 0.5 * delta;
                        return;
                    }
                }

                // アイアンゴーレムのAI
                if (this.type === 'IRON_GOLEM') {
                    this.attackCd -= delta;
                    // 村の範囲（_villageX/_villageZが設定されていればそれを使用）
                    const homeX = this._villageX !== undefined ? this._villageX : this.origin.x;
                    const homeZ = this._villageZ !== undefined ? this._villageZ : this.origin.z;
                    const golemDistFromVillage = Math.sqrt((this.pos.x - homeX)**2 + (this.pos.z - homeZ)**2);
                    const GOLEM_MAX_RADIUS = 50; // 村から絶対に出ない半径

                    // 近くの敵モブを探して攻撃（ただし村範囲内のみ）
                    let nearestHostile = null;
                    let nearestDist = 14;
                    if (app.entityManager) {
                        for (const e of app.entityManager.entities) {
                            if (e.isHostile && e !== this) {
                                const eDistFromVillage = Math.sqrt((e.pos.x - homeX)**2 + (e.pos.z - homeZ)**2);
                                if (eDistFromVillage < GOLEM_MAX_RADIUS) {
                                    const d = e.pos.distanceTo(this.pos);
                                    if (d < nearestDist) { nearestDist = d; nearestHostile = e; }
                                }
                            }
                        }
                    }
                    if (nearestHostile) {
                        const eDx = nearestHostile.pos.x - this.pos.x;
                        const eDz = nearestHostile.pos.z - this.pos.z;
                        const angle = Math.atan2(eDz, eDx);
                        if (nearestDist > 2.5) {
                            // 追跡中も村から出ない
                            const nextX = this.pos.x + Math.cos(angle) * this.speed * delta;
                            const nextZ = this.pos.z + Math.sin(angle) * this.speed * delta;
                            const nextDist = Math.sqrt((nextX - homeX)**2 + (nextZ - homeZ)**2);
                            if (nextDist < GOLEM_MAX_RADIUS) {
                                this.vel.x = Math.cos(angle) * this.speed * delta;
                                this.vel.z = Math.sin(angle) * this.speed * delta;
                            }
                        } else {
                            this.vel.x = 0; this.vel.z = 0;
                            if (this.attackCd <= 0) {
                                const attackDir = new THREE.Vector3(eDx, 0, eDz).normalize();
                                nearestHostile.takeDamage(15, attackDir);
                                this.attackCd = 2.0;
                                if (this.limbs && this.limbs[2]) {
                                    this.limbs[2].mesh.rotation.x = -1.2;
                                    this.limbs[3].mesh.rotation.x = -1.2;
                                    setTimeout(() => {
                                        if(this.limbs[2]) { this.limbs[2].mesh.rotation.x = 0.3; this.limbs[3].mesh.rotation.x = -0.3; }
                                    }, 300);
                                }
                            }
                        }
                        return;
                    }
                    // 村の中心に近づきすぎたら外周を巡回、範囲外なら戻る
                    if (golemDistFromVillage > GOLEM_MAX_RADIUS - 2) {
                        const angle = Math.atan2(homeZ - this.pos.z, homeX - this.pos.x);
                        this.vel.x = Math.cos(angle) * this.speed * 1.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 1.5 * delta;
                        return;
                    }
                    if (golemDistFromVillage < 20) {
                        // 中心から外周方向へゆっくり移動（巡回）
                        const angle = Math.atan2(this.pos.z - homeZ, this.pos.x - homeX);
                        this.vel.x = Math.cos(angle + 0.5) * this.speed * 0.5 * delta;
                        this.vel.z = Math.sin(angle + 0.5) * this.speed * 0.5 * delta;
                        return;
                    }
                }

                // エンダーマンのAI
                if (this.type === 'ENDERMAN') {
                    this.attackCd -= delta;
                    this._teleportCd -= delta;
                    if (distToPlayer < 1.5 && this.attackCd <= 0) {
                        const dir = new THREE.Vector3(dx, 0, dz).normalize();
                        player.takeDamage(7, dir);
                        this.attackCd = 1.5;
                    }
                    if (distToPlayer < 12) {
                        // 攻撃モード：テレポートしながら近づく
                        if (this._teleportCd <= 0 && distToPlayer > 3) {
                            const tAngle = Math.atan2(dz, dx);
                            const tDist = 2 + Math.random() * 4;
                            const tx2 = player.camera.position.x - Math.cos(tAngle) * tDist;
                            const tz2 = player.camera.position.z - Math.sin(tAngle) * tDist;
                            let ty2 = 300;
                            while (ty2 > 0 && world.getBlock(Math.floor(tx2), ty2, Math.floor(tz2)) === BLOCKS.AIR) ty2--;
                            if (ty2 > 0) { this.pos.set(tx2, ty2 + 1, tz2); this.mesh.position.copy(this.pos); }
                            this._teleportCd = 2.0 + Math.random() * 2;
                        }
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                    }
                    return;
                }

                // 魔女のAI
                if (this.type === 'WITCH') {
                    this.attackCd -= delta;
                    if (distToPlayer < 12) {
                        if (distToPlayer > 6) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else {
                            // 範囲攻撃（ポーションを投げる）
                            this.vel.x = 0; this.vel.z = 0;
                            if (this.attackCd <= 0) {
                                player.takeDamage(4, new THREE.Vector3(dx, 0, dz).normalize());
                                this.attackCd = 2.5;
                                // ポーションエフェクト（画面を紫に）
                                const ov = document.getElementById('damage-overlay');
                                if (ov) { ov.style.background='rgba(128,0,200,0.4)'; ov.style.opacity='1'; setTimeout(()=>{ov.style.opacity='0'; setTimeout(()=>ov.style.background='rgba(255,0,0,0.4)',300);},400); }
                            }
                        }
                    }
                    return;
                }

                // スライムのAI
                if (this.type === 'SLIME') {
                    this.jumpCd -= delta;
                    this.attackCd = (this.attackCd || 0) - delta; // バグ修正: attackCdのデクリメント
                    if (this.jumpCd <= 0 && this.isGrounded) {
                        if (distToPlayer < 16) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * 0.8;
                            this.vel.z = Math.sin(angle) * this.speed * 0.8;
                        } else {
                            const angle = Math.random() * Math.PI * 2;
                            this.vel.x = Math.cos(angle) * this.speed * 0.4;
                            this.vel.z = Math.sin(angle) * this.speed * 0.4;
                        }
                        this.vel.y = 6.0 + this.w * 1.5;
                        this.jumpCd = 1.0 + Math.random() * 1.5;
                    }
                    if (distToPlayer < 1.2 + this.w && this.attackCd <= 0) {
                        const dir = new THREE.Vector3(dx, 0, dz).normalize();
                        player.takeDamage(Math.ceil(this.w * 3), dir);
                        this.attackCd = 1.5;
                    }
                    return;
                }

                // 馬のAI（臆病で逃げる）
                if (this.type === 'HORSE') {
                    if (distToPlayer < 5) {
                        const angle = Math.atan2(-dz, -dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                        return;
                    }
                }

                // ウサギのAI（ジャンプして逃げる）
                if (this.type === 'RABBIT') {
                    this.jumpCd -= delta;
                    if (this.jumpCd <= 0) {
                        const angle = distToPlayer < 6 ? Math.atan2(-dz, -dx) : (Math.random() * Math.PI * 2);
                        this.vel.x = Math.cos(angle) * this.speed * 0.6;
                        this.vel.z = Math.sin(angle) * this.speed * 0.6;
                        this.vel.y = 5.5;
                        this.jumpCd = 0.8 + Math.random() * 1.2;
                        return;
                    }
                    this.vel.x *= 0.7; this.vel.z *= 0.7;
                    return;
                }

                // ===== ネザーMOB AI =====

                // ゾンビピッグマンAI（中立→挑発で怒る）
                if (this.type === 'ZOMBIE_PIGMAN') {
                    this.attackCd -= delta;
                    if (!this._angered) {
                        // 中立状態：うろうろ
                        if (this.stateTimer <= 0) {
                            if (Math.random() < 0.5) { this.vel.x = 0; this.vel.z = 0; this.state = 'IDLE'; }
                            else { const a = Math.random()*Math.PI*2; this.vel.x = Math.cos(a)*this.speed*0.4*delta; this.vel.z = Math.sin(a)*this.speed*0.4*delta; this.state = 'WANDER'; }
                            this.stateTimer = 2 + Math.random() * 3;
                        }
                        return;
                    }
                    // 怒った状態：プレイヤーを追跡
                    if (distToPlayer < 1.8 && this.attackCd <= 0) {
                        player.takeDamage(8, new THREE.Vector3(dx,0,dz).normalize());
                        this.attackCd = 1.5;
                    }
                    if (distToPlayer > 1.5) {
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                    }
                    return;
                }

                // ガストAI（空中浮遊・遠距離火の玉）
                if (this.type === 'GHAST') {
                    this.attackCd -= delta;
                    this._isFlying = true;
                    // 高度維持
                    const targetY = player.camera.position.y + 8 + Math.sin(ticks * 0.02) * 3;
                    this.floatVel = (this.floatVel || 0) + (targetY - this.pos.y) * 0.008;
                    this.floatVel *= 0.9;
                    this.vel.y = this.floatVel;
                    this.mesh.position.y = this.pos.y;
                    if (distToPlayer < 40) {
                        // プレイヤーを追う
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * 0.3 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 0.3 * delta;
                        // 遠距離攻撃（火の玉）
                        if (this.attackCd <= 0 && distToPlayer < 30) {
                            this._fireGhastBall(player, world);
                            this.attackCd = 4.0 + Math.random() * 2;
                            // 攻撃前の叫び声エフェクト（メッシュを揺らす）
                            this.mesh.scale.setScalar(1.2);
                            setTimeout(() => { if(this.mesh) this.mesh.scale.setScalar(1.0); }, 500);
                        }
                    }
                    // 飛行系は物理のcolY判定をスキップするためvel.yをそのまま使う
                    return;
                }

                // ブレイズAI（浮遊・連射）
                if (this.type === 'BLAZE') {
                    this.attackCd -= delta;
                    this._isFlying = true;
                    const targetY2 = player.camera.position.y + 2 + Math.sin(ticks * 0.04) * 1.5;
                    this.floatVel = (this.floatVel || 0) + (targetY2 - this.pos.y) * 0.01;
                    this.floatVel *= 0.85;
                    this.vel.y = this.floatVel;
                    // 自転（視覚エフェクト）
                    this.mesh.rotation.y += delta * 2;
                    if (distToPlayer < 20) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 4) {
                            this.vel.x = Math.cos(angle) * this.speed * 0.5 * delta;
                            this.vel.z = Math.sin(angle) * this.speed * 0.5 * delta;
                        }
                        if (this.attackCd <= 0) {
                            player.takeDamage(5, new THREE.Vector3(dx,0,dz).normalize());
                            // 炎エフェクト
                            const ov = document.getElementById('damage-overlay');
                            if(ov){ov.style.background='rgba(255,100,0,0.35)';ov.style.opacity='1';setTimeout(()=>{ov.style.opacity='0';setTimeout(()=>ov.style.background='rgba(255,0,0,0.4)',200);},300);}
                            this.attackCd = 1.5 + Math.random();
                        }
                    }
                    // 飛行系は物理のcolY判定をスキップ
                    return;
                }

                // ウィザースケルトンAI（近接攻撃）
                if (this.type === 'WITHER_SKELETON') {
                    this.attackCd -= delta;
                    if (distToPlayer < 16) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.8) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(8, new THREE.Vector3(dx,0,dz).normalize());
                            // ウィザー効果（体力回復を阻害）
                            player.witherTimer = (player.witherTimer || 0) + 8;
                            this.attackCd = 1.2;
                        }
                    }
                    return;
                }

                // マグマキューブAI（ジャンプして攻撃）
                if (this.type === 'MAGMA_CUBE') {
                    this.jumpCd -= delta;
                    this.attackCd = (this.attackCd || 0) - delta; // バグ修正
                    if (this.jumpCd <= 0 && this.onGround) {
                        const angle = distToPlayer < 16 ? Math.atan2(dz, dx) : Math.random()*Math.PI*2;
                        this.vel.x = Math.cos(angle) * this.speed * 0.8;
                        this.vel.z = Math.sin(angle) * this.speed * 0.8;
                        this.vel.y = 6.0 + this.w * 1.5;
                        this.jumpCd = 1.0 + Math.random() * 1.5;
                    }
                    if (distToPlayer < 1.2 + this.w && this.attackCd <= 0) {
                        player.takeDamage(Math.ceil(this.w * 4), new THREE.Vector3(dx,0,dz).normalize());
                        this.attackCd = 1.5;
                    }
                    return;
                }

                // ===== 新MOB AI =====

                // ストライダーAI（溶岩上を歩く、消極的）
                if (this.type === 'STRIDER') {
                    if (distToPlayer < 4) {
                        const angle = Math.atan2(-dz, -dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                        return;
                    }
                }

                // ホグリンAI（積極的に攻撃）
                if (this.type === 'HOGLIN') {
                    this.attackCd -= delta;
                    if (distToPlayer < 16) {
                        if (distToPlayer > 2.0) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            const attackDir = new THREE.Vector3(dx, 0.5, dz).normalize();
                            player.takeDamage(5, attackDir);
                            this.attackCd = 1.2;
                        }
                        return;
                    }
                }

                // ピグリンAI（中立、金装備に反応）
                if (this.type === 'PIGLIN') {
                    this.attackCd -= delta;
                    if (!this._angered) {
                        if (this.stateTimer <= 0) {
                            if (Math.random() < 0.5) { this.vel.x = 0; this.vel.z = 0; }
                            else { const a = Math.random()*Math.PI*2; this.vel.x = Math.cos(a)*this.speed*0.4*delta; this.vel.z = Math.sin(a)*this.speed*0.4*delta; }
                            this.stateTimer = 2 + Math.random() * 3;
                        }
                        return;
                    }
                    if (distToPlayer < 2.0 && this.attackCd <= 0) {
                        player.takeDamage(5, new THREE.Vector3(dx,0,dz).normalize());
                        this.attackCd = 1.0;
                    }
                    if (distToPlayer > 1.5) {
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                    }
                    return;
                }

                // ファントムAI（夜空を飛んで急降下攻撃）
                if (this.type === 'PHANTOM') {
                    this.attackCd -= delta;
                    this._isFlying = true;
                    if (distToPlayer < 30) {
                        const angle = Math.atan2(dz, dx);
                        // 通常時: プレイヤー上空をサークル
                        if (this.attackCd > 0.8) {
                            const phantomTargetY = player.camera.position.y + 5 + Math.sin(ticks * 0.04) * 2;
                            this.floatVel = (this.floatVel || 0) + (phantomTargetY - this.pos.y) * 0.015;
                            this.floatVel = Math.max(-3, Math.min(3, this.floatVel * 0.9));
                            this.vel.y = this.floatVel;
                            this.vel.x = Math.cos(angle) * this.speed * 0.5 * delta;
                            this.vel.z = Math.sin(angle) * this.speed * 0.5 * delta;
                        } else {
                            // 急降下攻撃フェーズ
                            const diveDir = new THREE.Vector3(dx, player.camera.position.y - this.pos.y, dz).normalize();
                            this.vel.x = diveDir.x * this.speed * 1.5 * delta;
                            this.vel.z = diveDir.z * this.speed * 1.5 * delta;
                            this.vel.y = diveDir.y * this.speed * 1.5 * delta;
                        }
                        if (this.attackCd <= 0 && distToPlayer < 2.5) {
                            player.takeDamage(6, new THREE.Vector3(dx, 0, dz).normalize());
                            this.attackCd = 4.0; // 次の急降下まで4秒
                            // 急降下後は上昇
                            this.vel.y = 0.4;
                        }
                    } else {
                        // 遠い時は高度を維持しながら漂う
                        const idleY = player.camera.position.y + 8;
                        this.floatVel = (this.floatVel || 0) + (idleY - this.pos.y) * 0.01;
                        this.floatVel = Math.max(-2, Math.min(2, this.floatVel * 0.9));
                        this.vel.y = this.floatVel;
                    }
                    return;
                }

                // エンダーマイトAI（小さくて速い敵）
                if (this.type === 'ENDERMITE') {
                    this.attackCd -= delta;
                    if (distToPlayer < 20) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.0) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(2, new THREE.Vector3(dx,0,dz).normalize());
                            this.attackCd = 0.8;
                        }
                        return;
                    }
                    return; // バグ修正: 範囲外でもreturn
                }

                // ===== 新追加MOB AI v4 =====

                // ドラウンドAI（水中ゾンビ）
                if (this.type === 'DROWNED') {
                    this.attackCd -= delta;
                    if (distToPlayer < 16) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.8) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(3, new THREE.Vector3(dx,0,dz).normalize());
                            this.attackCd = 1.2;
                        }
                        return; // バグ修正: returnを追加
                    }
                    return;
                }

                // ハスクAI（砂漠ゾンビ・昼でも活動）
                if (this.type === 'HUSK') {
                    this.attackCd -= delta;
                    if (distToPlayer < 16) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.8) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(3, new THREE.Vector3(dx,0,dz).normalize());
                            if (player.hunger !== undefined) player.hunger = Math.max(0, player.hunger - 1);
                            this.attackCd = 1.5;
                        }
                        return;
                    }
                    return;
                }

                // ケイブスパイダーAI（毒攻撃）
                if (this.type === 'CAVE_SPIDER') {
                    this.attackCd -= delta;
                    this._poisonTimer = (this._poisonTimer || 0) - delta;
                    if (distToPlayer < 12) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.2) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(2, new THREE.Vector3(dx,0,dz).normalize());
                            player._poisonTimer = (player._poisonTimer || 0) + 6;
                            this.attackCd = 1.0;
                        }
                        return;
                    }
                    return;
                }

                // ミツバチAI（中立・刺激すると攻撃）
                if (this.type === 'BEE') {
                    this.attackCd -= delta;
                    // 羽のアニメーション
                    if (this._wings) {
                        const wFlap = Math.sin(ticks * 25) * 0.5; // 高速羽ばたき修正
                        this._wings[0].rotation.y = wFlap;
                        this._wings[1].rotation.y = -wFlap;
                    }
                    // 高度維持: 地面から1.5〜2.5ブロック上をホバリング
                    const groundY = Math.floor(this.pos.y - 0.3);
                    const beeTargetY = groundY + 2.0 + Math.sin(ticks * 1.5) * 0.3;
                    this.floatVel = (this.floatVel || 0) + (beeTargetY - this.pos.y) * 0.04;
                    this.floatVel = Math.max(-1.0, Math.min(1.0, this.floatVel * 0.92));
                    this.vel.y = this.floatVel;
                    if (!this._angered) {
                        // 中立：ランダムに飛び回る
                        if (this.stateTimer <= 0) {
                            const a2 = Math.random() * Math.PI * 2;
                            this._flyVelX = Math.cos(a2) * this.speed * 0.4 * delta;
                            this._flyVelZ = Math.sin(a2) * this.speed * 0.4 * delta;
                            this.stateTimer = 1.5 + Math.random() * 2.5;
                        }
                        this.vel.x = this._flyVelX || 0;
                        this.vel.z = this._flyVelZ || 0;
                        return;
                    }
                    if (distToPlayer < 20) {
                        const angle = Math.atan2(dz, dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                        if (distToPlayer < 1.5 && this.attackCd <= 0) {
                            player.takeDamage(2, new THREE.Vector3(dx,0,dz).normalize());
                            this.attackCd = 1.0;
                        }
                    } else {
                        this._angered = false; // 遠ざかったら怒りが冷める
                    }
                    return;
                }

                // キツネAI（素早く逃げる）
                if (this.type === 'FOX') {
                    this.jumpCd -= delta;
                    if (distToPlayer < 12) {
                        const angle = Math.atan2(-dz, -dx);
                        this.vel.x = Math.cos(angle) * this.speed * delta;
                        this.vel.z = Math.sin(angle) * this.speed * delta;
                        if (this.jumpCd <= 0 && this.onGround) {
                            this.vel.y = 0.22; // バグ修正: 旧6.0は飛びすぎ（entityはfps単位）
                            this.jumpCd = 0.8 + Math.random() * 1.0;
                        }
                        return;
                    } else {
                        // 遠い時はゆっくりうろつく
                        if (this.stateTimer <= 0) {
                            const a2 = Math.random() * Math.PI * 2;
                            this.vel.x = Math.cos(a2) * this.speed * 0.3 * delta;
                            this.vel.z = Math.sin(a2) * this.speed * 0.3 * delta;
                            this.stateTimer = 2 + Math.random() * 4;
                        }
                        return;
                    }
                }

                // ホッキョクグマAI（近づくと攻撃）
                if (this.type === 'POLAR_BEAR') {
                    this.attackCd -= delta;
                    if (distToPlayer < 8) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 2.0) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (this.attackCd <= 0) {
                            player.takeDamage(5, new THREE.Vector3(dx,0,dz).normalize());
                            this.attackCd = 1.5;
                        }
                        return;
                    } else {
                        if (this.stateTimer <= 0) {
                            const a2 = Math.random() * Math.PI * 2;
                            this.vel.x = Math.cos(a2) * this.speed * 0.4 * delta;
                            this.vel.z = Math.sin(a2) * this.speed * 0.4 * delta;
                            this.stateTimer = 3 + Math.random() * 3;
                        }
                        return;
                    }
                }

                // ストレイAI（雪スケルトン・遠距離攻撃）
                if (this.type === 'STRAY') {
                    this.attackCd -= delta;
                    if (distToPlayer < 16) {
                        const faceAngle = Math.atan2(dx, dz);
                        this.mesh.rotation.y = faceAngle;
                        if (distToPlayer > 8) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (distToPlayer < 5) {
                            const angle = Math.atan2(-dz, -dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else {
                            this.vel.x *= 0.8; this.vel.z *= 0.8;
                        }
                        if (this.attackCd <= 0) {
                            this._shootArrowAt(player, world);
                            this.attackCd = 3.0;
                        }
                        return;
                    }
                }

                // HUSK（砂漠ゾンビ）とWITHER_SKELETONは太陽で燃えない
                if (this.isUndead && this.type !== 'HUSK' && this.type !== 'WITHER_SKELETON' && app.timeOfDay > 0.05 && app.timeOfDay < 0.45) {
                    let skyVisible = true;
                    for (let y = Math.floor(this.pos.y + this.h + 1); y < CHUNK_HEIGHT; y++) {
                        if (world.getBlock(this.pos.x, y, this.pos.z) !== BLOCKS.AIR) {
                            skyVisible = false; break;
                        }
                    }
                    if (skyVisible) {
                        this.onFire = 2.0; 
                    }
                }

                if (this.onFire > 0) {
                    this.onFire -= delta;
                    if (ticks % 20 < 1) this.takeDamage(1, new THREE.Vector3(0,0,0), true);
                    if (this.type !== 'CREEPER') {
                        this.mesh.traverse(c => { if(c.material) c.material.emissive.setHex(0xff3300); });
                    }
                } else {
                    if (this.type !== 'CREEPER' || this.fuse <= 0) {
                        this.mesh.traverse(c => { if(c.material) c.material.emissive.setHex(0x000000); });
                    }
                }

                if (this.isHostile && player.health > 0 && player.mode === 'survival') {
                    const isNight = app.timeOfDay > 0.5;
                    if (!isNight && this.onFire <= 0) {
                        if (distToPlayer > 8) return; 
                    }

                    // 近くにいる敵モブの環境音（ランダム）
                    if (distToPlayer < 20 && Math.random() < 0.002) {
                        if (this.type === 'ZOMBIE') SoundManager.playZombieGroan();
                        else if (this.type === 'SKELETON') SoundManager.playSkeletonRattle();
                        else if (this.type === 'SPIDER') SoundManager.playSpiderHiss();
                    }

                    if (this.type === 'SPIDER' && distToPlayer < 16) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.5) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                            // クモは壁をよじ登れる（ジャンプで近似）
                            if (this.kbTimer <= 0 && Math.random() < 0.02) this.vel.y = 0.5;
                        } else {
                            this.vel.x = 0; this.vel.z = 0;
                        }
                        if (distToPlayer < 2.0 && this.stateTimer <= 0) {
                            const attackDir = new THREE.Vector3(dx, 0, dz).normalize();
                            player.takeDamage(3, attackDir);
                            this.stateTimer = 1.2;
                        }
                        return;
                    }
                    if (this.type === 'ZOMBIE' && distToPlayer < 16) {
                        const angle = Math.atan2(dz, dx);
                        if (distToPlayer > 1.8) {
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else {
                            this.vel.x = 0; this.vel.z = 0;
                        }
                        if (distToPlayer < 2.2 && this.stateTimer <= 0) {
                            const attackDir = new THREE.Vector3(dx, 0, dz).normalize();
                            player.takeDamage(3, attackDir);
                            this.stateTimer = 1.0;
                        }
                        return;
                    }
                    if (this.type === 'SKELETON' && distToPlayer < 16) {
                        // Face the player
                        const faceAngle = Math.atan2(dx, dz);
                        this.mesh.rotation.y = faceAngle;
                        if (distToPlayer > 8) {
                            const angle = Math.atan2(dz, dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else if (distToPlayer < 5) {
                            const angle = Math.atan2(-dz, -dx);
                            this.vel.x = Math.cos(angle) * this.speed * delta;
                            this.vel.z = Math.sin(angle) * this.speed * delta;
                        } else {
                            this.vel.x *= 0.8; this.vel.z *= 0.8;
                        }
                        this.attackCd -= delta;
                        if (this.attackCd <= 0) {
                            // 可視化された矢を発射
                            this._shootArrowAt(player, world);
                            this.attackCd = 2.5;
                            this._bowShot = 0;
                        }
                        // Bow raise animation
                        if (this.limbs && this.limbs[3]) {
                            const drawPhase = Math.max(0, 1.0 - this.attackCd);
                            const rArm = this.limbs[3].mesh;
                            rArm.rotation.x = -drawPhase * Math.PI * 0.7;
                            rArm.rotation.z = -drawPhase * 0.3;
                        }
                        return;
                    }
                    if (this.type === 'CREEPER' && distToPlayer < 16) {
                        if (distToPlayer < 4.0) {
                            this.fuse += delta;
                            // White flashing: blink faster as fuse progresses
                            const blinkRate = 2 + this.fuse * 3;
                            const isWhite = (Math.floor(ticks * blinkRate * 0.05) % 2 === 0);
                            this.mesh.traverse(c => {
                                if (c.isMesh && c.material) {
                                    c.material.color.setHex(isWhite ? 0xffffff : 0x55ff55);
                                    c.material.emissive.setHex(isWhite ? 0xaaaaaa : 0x000000);
                                }
                            });
                            this.mesh.scale.setScalar(1 + this.fuse * 0.15);
                            // Stop moving once close enough
                            if (distToPlayer > 2.5) {
                                const angle = Math.atan2(dz, dx);
                                this.vel.x = Math.cos(angle) * this.speed * delta;
                                this.vel.z = Math.sin(angle) * this.speed * delta;
                            } else {
                                this.vel.x = 0; this.vel.z = 0;
                            }
                            if (this.fuse >= 3.0) {
                                SoundManager.playExplosion();
                                const blastDamage = Math.floor(20 * (1 - distToPlayer / 5.0));
                                player.takeDamage(Math.max(8, blastDamage), new THREE.Vector3(dx, 0, dz).normalize());
                                const ov = document.getElementById('damage-overlay');
                                if (ov) { ov.style.background = 'rgba(255,200,0,0.6)'; ov.style.opacity = '1';
                                    setTimeout(() => { ov.style.opacity = '0'; setTimeout(() => ov.style.background = 'rgba(255,0,0,0.4)', 200); }, 300); }
                                // バグ修正: クリーパーがブロックを破壊する
                                if (player.mode !== 'creative') {
                                    const cx2 = Math.floor(this.pos.x), cy2 = Math.floor(this.pos.y), cz2 = Math.floor(this.pos.z);
                                    const blastR = 3;
                                    for (let bx2 = -blastR; bx2 <= blastR; bx2++) {
                                        for (let by2 = -blastR; by2 <= blastR; by2++) {
                                            for (let bz2 = -blastR; bz2 <= blastR; bz2++) {
                                                if (bx2*bx2+by2*by2+bz2*bz2 <= blastR*blastR) {
                                                    const bid = world.getBlock(cx2+bx2, cy2+by2, cz2+bz2);
                                                    if (bid && bid !== BLOCKS.AIR && PROPS[bid] && PROPS[bid].hard >= 0 && PROPS[bid].hard < 50) {
                                                        world.setBlock(cx2+bx2, cy2+by2, cz2+bz2, BLOCKS.AIR);
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                                this.health = 0; 
                            }
                        } else {
                            this.fuse = 0;
                            this.mesh.scale.setScalar(1.0);
                            // Reset color when not fuzing
                            this.mesh.traverse(c => { if (c.isMesh && c.material) { c.material.color.setHex(0x55ff55); c.material.emissive.setHex(0x000000); } });
                            const angle = Math.atan2(dz, dx);
                            if (distToPlayer > 4.5) {
                                this.vel.x = Math.cos(angle) * this.speed * delta;
                                this.vel.z = Math.sin(angle) * this.speed * delta;
                            }
                        }
                        return;
                    }
                }

                if (this.stateTimer <= 0) {
                    if (Math.random() < 0.5) {
                        this.state = 'IDLE';
                        this.vel.x = 0; this.vel.z = 0;
                    } else {
                        this.state = 'WANDER';
                        const angle = Math.random() * Math.PI * 2;
                        this.vel.x = Math.cos(angle) * this.speed * 0.5 * delta;
                        this.vel.z = Math.sin(angle) * this.speed * 0.5 * delta;
                    }
                    this.stateTimer = 2.0 + Math.random() * 3.0;
                }
            }

            _shootArrowAt(player, world) {
                const origin = this.pos.clone().add(new THREE.Vector3(0, 1.4, 0));
                const target = player.camera.position.clone();
                const dir = new THREE.Vector3().subVectors(target, origin).normalize();
                const arrowGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 4);
                const arrowMat = new THREE.MeshLambertMaterial({ color: 0x886633 });
                const arrowMesh = new THREE.Mesh(arrowGeo, arrowMat);
                // 矢の向きを飛行方向に合わせる
                arrowMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
                arrowMesh.position.copy(origin);
                if (app && app.scene) app.scene.add(arrowMesh);
                const vel = dir.clone().multiplyScalar(16);
                let life = 0;
                const playerDamaged = { hit: false };
                const tick = () => {
                    life += 0.016;
                    vel.y -= 9.8 * 0.016 * 0.5;
                    const nextPos = arrowMesh.position.clone().addScaledVector(vel, 0.016);
                    // ブロック衝突チェック
                    const bx = Math.floor(nextPos.x), by = Math.floor(nextPos.y), bz = Math.floor(nextPos.z);
                    const bid = world ? world.getBlock(bx, by, bz) : 0;
                    if (bid && bid !== BLOCKS.AIR && PROPS[bid] && PROPS[bid].isSolid !== false && !PROPS[bid].isLiquid) {
                        if (app && app.scene) app.scene.remove(arrowMesh);
                        arrowGeo.dispose(); arrowMat.dispose();
                        return;
                    }
                    arrowMesh.position.copy(nextPos);
                    // 矢の向きを速度に合わせる
                    const speed3 = vel.length();
                    if (speed3 > 0.1) arrowMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), vel.clone().normalize());
                    // プレイヤーへのヒット判定
                    if (!playerDamaged.hit) {
                        const distToPlayer = arrowMesh.position.distanceTo(player.camera.position);
                        if (distToPlayer < 0.8) {
                            playerDamaged.hit = true;
                            const attackDir = new THREE.Vector3().subVectors(player.camera.position, this.pos).normalize();
                            player.takeDamage(2, attackDir);
                            if (app && app.scene) app.scene.remove(arrowMesh);
                            arrowGeo.dispose(); arrowMat.dispose();
                            return;
                        }
                    }
                    if (life > 3.0) {
                        if (app && app.scene) app.scene.remove(arrowMesh);
                        arrowGeo.dispose(); arrowMat.dispose();
                        return;
                    }
                    requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            }

            takeDamage(amt, sourceDir, noKnockback = false) {
                this.health -= amt;
                SoundManager.playMobHit();
                if (!this.isHostile) {
                    this.state = 'PANIC';
                    this.stateTimer = 3.0;
                }
                // ピグリン・ゾンビピッグマンが攻撃されると怒る
                if (this.type === 'ZOMBIE_PIGMAN' || this.type === 'PIGLIN') {
                    this._angered = true;
                    this.isHostile = true;
                }
                // バグ修正: ミツバチが攻撃されると怒る
                if (this.type === 'BEE') {
                    this._angered = true;
                    this.isHostile = true;
                }
                if (!noKnockback) {
                    // バグ修正: ノックバック量を適正値に修正（旧: 3.0 は3ブロック/フレームで異常に強かった）
                    this.vel.x += sourceDir.x * 0.30;
                    this.vel.z += sourceDir.z * 0.30;
                    this.vel.y = Math.max(this.vel.y, 0.18); // 小さなホップ（旧: 4.0 は極端に高い）
                    this.kbTimer = 0.35;
                }

                const matMap = new Map();
                this.mesh.traverse(c => {
                    if (c.isMesh && c.material && !matMap.has(c.material)) {
                        matMap.set(c.material, c.material.color.getHex());
                    }
                });
                matMap.forEach((_, mat) => mat.color.setHex(0xff0000));
                setTimeout(() => {
                    if (this.health <= 0) return;
                    matMap.forEach((origHex, mat) => { if (mat) mat.color.setHex(origHex); });
                }, 200);
            }
        }

        class EntityManager {
            constructor(world, scene) {
                this.world = world; this.scene = scene;
                this.entities = [];
            }
            
            spawn(type, x, y, z) {
                const ent = new Entity(type, x, y, z);
                this.entities.push(ent);
                this.scene.add(ent.mesh);
            }

            update(delta, player, ticks, ui) {
                const isNightSpawn = app.timeOfDay > 0.5;
                if (isNightSpawn) {
                    if (Math.floor(ticks) % 7 === 0) {
                        this._trySpawnAroundPlayer(player);
                    }
                } else {
                    if (Math.floor(ticks) % 80 === 0) {
                        this._trySpawnAroundPlayer(player);
                    }
                }

                for (let i = this.entities.length - 1; i >= 0; i--) {
                    const e = this.entities[i];
                    e.updateAI(delta, player, ticks, this.world, ui);
                    e.updatePhysics(delta, this.world);

                    const distToPlayer = e.pos.distanceTo(player.camera.position);

                    // 32マス以遠の敵は30秒放置でランダム消滅
                    if (distToPlayer > 32 && e.isHostile) {
                        e._farTimer = (e._farTimer || 0) + delta;
                        if (e._farTimer > 30 && Math.random() < 0.01) { e.health = 0; }
                    } else {
                        e._farTimer = 0;
                    }

                    if (e.health <= 0 || e.pos.y < -20 || distToPlayer > 160) {
                        this.scene.remove(e.mesh);
                        e.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
                        
                        if (e.health <= 0) {
                            if (distToPlayer < 32) SoundManager.playMobDeath();
                            if(e.type === 'PIG') player.spawnDrop(e.pos, BLOCKS.RAW_PORK, 1 + Math.floor(Math.random()*2));
                            if(e.type === 'COW') { player.spawnDrop(e.pos, BLOCKS.RAW_BEEF, 1 + Math.floor(Math.random()*2)); player.spawnDrop(e.pos, BLOCKS.LEATHER, Math.floor(Math.random()*3)); }
                            if(e.type === 'CHICKEN') { player.spawnDrop(e.pos, BLOCKS.RAW_CHICKEN, 1); player.spawnDrop(e.pos, BLOCKS.FEATHER, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'SHEEP') { const woolId = COLORED_WOOL_IDS[e.woolColorIdx || 0]; player.spawnDrop(e.pos, woolId, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'ZOMBIE') { player.spawnDrop(e.pos, BLOCKS.ROTTEN_FLESH, 1); if(Math.random() < 0.025) player.spawnDrop(e.pos, BLOCKS.POTATO, 1); if(Math.random() < 0.025) player.spawnDrop(e.pos, BLOCKS.CARROT, 1); }
                            if(e.type === 'SKELETON') { player.spawnDrop(e.pos, BLOCKS.BONE, 1); player.spawnDrop(e.pos, BLOCKS.ARROW, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'CREEPER' && e.fuse < 3.0) player.spawnDrop(e.pos, BLOCKS.GUNPOWDER, 1);
                            if(e.type === 'SPIDER') { player.spawnDrop(e.pos, BLOCKS.STRING, 1 + Math.floor(Math.random()*2)); if(Math.random() < 0.1) player.spawnDrop(e.pos, BLOCKS.SPIDER_EYE, 1); }
                            if(e.type === 'ENDERMAN') { player.spawnDrop(e.pos, BLOCKS.ENDER_PEARL, 1); }
                            if(e.type === 'WITCH') { player.spawnDrop(e.pos, BLOCKS.GUNPOWDER, 1 + Math.floor(Math.random()*2)); player.spawnDrop(e.pos, BLOCKS.SPIDER_EYE, 1); }
                            if(e.type === 'SLIME') { player.spawnDrop(e.pos, BLOCKS.SLIME_BALL, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'HORSE') { player.spawnDrop(e.pos, BLOCKS.LEATHER, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'RABBIT') { player.spawnDrop(e.pos, BLOCKS.FEATHER, 1); }
                            // ネザーMOBのドロップ
                            if(e.type === 'ZOMBIE_PIGMAN') { player.spawnDrop(e.pos, BLOCKS.ROTTEN_FLESH, 1); if(Math.random()<0.25) player.spawnDrop(e.pos, BLOCKS.GOLD_INGOT, 1); }
                            if(e.type === 'GHAST') { player.spawnDrop(e.pos, BLOCKS.GUNPOWDER, 1 + Math.floor(Math.random()*2)); if(Math.random()<0.5) player.spawnDrop(e.pos, BLOCKS.GLOWSTONE, 1); }
                            if(e.type === 'BLAZE') { player.spawnDrop(e.pos, BLOCKS.COAL, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'WITHER_SKELETON') { player.spawnDrop(e.pos, BLOCKS.COAL, 1); if(Math.random()<0.025) player.spawnDrop(e.pos, BLOCKS.BONE, 1); }
                            if(e.type === 'MAGMA_CUBE') { player.spawnDrop(e.pos, BLOCKS.SLIME_BALL, Math.floor(Math.random()*2)); }
                            // 新追加MOBのドロップ
                            if(e.type === 'STRIDER') { player.spawnDrop(e.pos, BLOCKS.STRING, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'HOGLIN') { player.spawnDrop(e.pos, BLOCKS.RAW_PORK, 2 + Math.floor(Math.random()*3)); if(Math.random()<0.1) player.spawnDrop(e.pos, BLOCKS.LEATHER, 1); }
                            if(e.type === 'PIGLIN') { if(Math.random()<0.08) player.spawnDrop(e.pos, BLOCKS.GOLD_INGOT, 1); if(Math.random()<0.05) player.spawnDrop(e.pos, BLOCKS.ARROW, 1); }
                            if(e.type === 'PHANTOM') { player.spawnDrop(e.pos, BLOCKS.FEATHER, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'ENDERMITE') { /* ドロップなし */ }
                            // v4 新MOBのドロップ
                            if(e.type === 'DROWNED') { player.spawnDrop(e.pos, BLOCKS.ROTTEN_FLESH, 1); if(Math.random()<0.1) player.spawnDrop(e.pos, BLOCKS.COPPER_INGOT, 1); }
                            if(e.type === 'HUSK') { player.spawnDrop(e.pos, BLOCKS.ROTTEN_FLESH, 1); if(Math.random()<0.05) player.spawnDrop(e.pos, BLOCKS.SAND, 1 + Math.floor(Math.random()*3)); }
                            if(e.type === 'CAVE_SPIDER') { player.spawnDrop(e.pos, BLOCKS.STRING, 1 + Math.floor(Math.random()*2)); if(Math.random()<0.33) player.spawnDrop(e.pos, BLOCKS.SPIDER_EYE, 1); }
                            if(e.type === 'BEE') { if(Math.random()<0.5) player.spawnDrop(e.pos, BLOCKS.HONEYCOMB, 1); }
                            if(e.type === 'FOX') { player.spawnDrop(e.pos, BLOCKS.FEATHER, 1 + Math.floor(Math.random()*2)); }
                            if(e.type === 'POLAR_BEAR') { player.spawnDrop(e.pos, BLOCKS.SNOW, 1 + Math.floor(Math.random()*3)); if(Math.random()<0.25) player.spawnDrop(e.pos, BLOCKS.ICE, 1); }
                            if(e.type === 'STRAY') { player.spawnDrop(e.pos, BLOCKS.BONE, 1); player.spawnDrop(e.pos, BLOCKS.ARROW, 1 + Math.floor(Math.random()*2)); if(Math.random()<0.25) player.spawnDrop(e.pos, BLOCKS.ICE, 1); }
                        }

                        this.entities.splice(i, 1);
                    }
                }
            }

            _trySpawnAroundPlayer(player) {
                const isNether = app.dimension === 'nether';
                const isNight = app.timeOfDay > 0.5;
                const playerPos = player.camera.position;

                const hostileCount = this.entities.filter(e => e.isHostile).length;
                const farmCount = this.entities.filter(e => ['PIG','COW','SHEEP','CHICKEN'].includes(e.type)).length;
                if (this.entities.length >= 50) return;
                if (hostileCount >= 20) return;
                if (!isNight && farmCount >= 15 && !isNether) return;

                const angle = Math.random() * Math.PI * 2;
                const dist = 24 + Math.random() * 64;
                const sx = Math.floor(playerPos.x + Math.cos(angle) * dist);
                const sz = Math.floor(playerPos.z + Math.sin(angle) * dist);
                
                const actualDist = Math.sqrt((sx-playerPos.x)**2 + (sz-playerPos.z)**2);
                if (actualDist > 128 || actualDist < 24) return;

                // ネザー専用スポーン（洞窟地形の床を探す）
                if (isNether) {
                    // 新地形: 洞窟の床（下が固体、上が空気）を y=90→33 で走査
                    const NETHER_SOLID = new Set([
                        BLOCKS.NETHER_RACK, BLOCKS.CRIMSON_NYLIUM, BLOCKS.WARPED_NYLIUM,
                        BLOCKS.BLACKSTONE, BLOCKS.BASALT, BLOCKS.NETHER_BRICK,
                        BLOCKS.SOUL_SAND, BLOCKS.MAGMA_BLOCK, BLOCKS.QUARTZ_BLOCK,
                        BLOCKS.ANCIENT_DEBRIS, BLOCKS.GLOWSTONE
                    ]);
                    let floorY = -1;
                    for (let sy2 = 70; sy2 >= 33; sy2--) {
                        const here  = this.world.getBlock(sx, sy2,     sz);
                        const above = this.world.getBlock(sx, sy2 + 1, sz);
                        const bM1   = this.world.getBlock(sx, sy2 - 1, sz);
                        const bM2   = this.world.getBlock(sx, sy2 - 2, sz);
                        if (here  === BLOCKS.AIR &&
                            above === BLOCKS.AIR &&
                            NETHER_SOLID.has(bM1) &&
                            NETHER_SOLID.has(bM2)) {   // 床2ブロック厚で薄い棚を除外
                            floorY = sy2;
                            break;
                        }
                    }
                    if (floorY < 0) return; // スポーン可能な床なし

                    // バイオームノイズで敵の種類を変える
                    const bioA = Math.sin(sx * 0.0045) * Math.cos(sz * 0.0045); // 簡易バイオーム
                    let types, weights;
                    if (bioA < -0.42) {
                        // ソウルサンド谷: ガスト・ウィザースケルトン多め
                        types   = ['WITHER_SKELETON','WITHER_SKELETON','GHAST','ZOMBIE_PIGMAN','MAGMA_CUBE'];
                        weights = [4, 4, 2, 3, 2];
                    } else if (bioA > 0.48) {
                        // バサルト台地: マグマキューブ多め
                        types   = ['MAGMA_CUBE','MAGMA_CUBE','ZOMBIE_PIGMAN','BLAZE','PIGLIN'];
                        weights = [5, 5, 3, 2, 2];
                    } else {
                        // 標準ネザー・クリムゾン/ワープド
                        types   = ['ZOMBIE_PIGMAN','ZOMBIE_PIGMAN','ZOMBIE_PIGMAN','BLAZE','WITHER_SKELETON','WITHER_SKELETON','MAGMA_CUBE','GHAST','STRIDER','HOGLIN','PIGLIN','PIGLIN'];
                        weights = [6, 6, 6, 2, 3, 3, 3, 1, 2, 2, 3, 3];
                    }
                    // ガストは高め（y≥60）でのみスポーン
                    const totalW = weights.reduce((a,b)=>a+b,0);
                    let r = Math.random() * totalW, chosen = types[0];
                    for (let wi = 0; wi < types.length; wi++) {
                        r -= weights[wi];
                        if (r <= 0) { chosen = types[wi]; break; }
                    }
                    if (chosen === 'GHAST' && floorY < 60) return;
                    if (chosen === 'STRIDER' && floorY > 33) return; // ストライダーは溶岩海沿岸のみ
                    this.spawn(chosen, sx, floorY, sz);
                    return;
                }

                const LEAF_IDS = new Set([BLOCKS.LEAVES, BLOCKS.BIRCH_LEAVES, BLOCKS.ACACIA_LEAVES, BLOCKS.JUNGLE_LEAVES]);
                let sy = 256;
                while (sy > 0 && (this.world.getBlock(sx, sy, sz) === BLOCKS.AIR || LEAF_IDS.has(this.world.getBlock(sx, sy, sz)))) sy--;
                
                if (sy > 0 && sy < 350) {
                    const blockBelow = this.world.getBlock(sx, sy, sz);
                    const spawnY = sy + 1;
                    const spawnBlock = this.world.getBlock(sx, spawnY, sz);
                    const spawnBlock2 = this.world.getBlock(sx, spawnY + 1, sz);
                    
                    if (spawnBlock !== BLOCKS.AIR || spawnBlock2 !== BLOCKS.AIR) return;
                    if (PROPS[blockBelow] && (PROPS[blockBelow].isStair || PROPS[blockBelow].isSlab)) return;
                    
                    const lightLevel = this.world.getLightLevel(sx, spawnY, sz);
                    
                    if (lightLevel <= 7) {
                        const types = isNight ? ['ZOMBIE', 'ZOMBIE', 'SKELETON', 'CREEPER', 'SPIDER', 'ENDERMAN', 'WITCH', 'SLIME', 'PHANTOM', 'ENDERMITE', 'CAVE_SPIDER', 'DROWNED'] : [];
                        if (types.length > 0) this.spawn(types[Math.floor(Math.random() * types.length)], sx, spawnY + 0.5, sz);
                    } else if (lightLevel >= 9 && blockBelow === BLOCKS.GRASS && isNight === false) {
                        const types = ['PIG', 'COW', 'CHICKEN', 'SHEEP', 'DOG', 'HORSE', 'RABBIT', 'BEE', 'FOX'];
                        const weights = [5, 5, 5, 5, 1, 2, 3, 2, 2];
                        const totalW = weights.reduce((a,b)=>a+b,0);
                        let r = Math.random() * totalW;
                        let chosenType = types[0];
                        for(let wi=0; wi<types.length; wi++) { r -= weights[wi]; if(r <= 0) { chosenType = types[wi]; break; } }
                        this.spawn(chosenType, sx, spawnY + 0.5, sz);
                    } else if (lightLevel >= 9 && (blockBelow === BLOCKS.SNOW || blockBelow === BLOCKS.ICE || blockBelow === BLOCKS.PACKED_ICE) && isNight === false) {
                        // 雪原バイオームでホッキョクグマをスポーン
                        if (Math.random() < 0.3) this.spawn('POLAR_BEAR', sx, spawnY + 0.5, sz);
                    } else if (lightLevel <= 7 && (blockBelow === BLOCKS.SAND) && isNight) {
                        // 砂漠の夜にハスクをスポーン
                        if (Math.random() < 0.4) this.spawn('HUSK', sx, spawnY + 0.5, sz);
                    }
                }
            }
            
            raycastAttack(raycaster, damage, playerPos, isMelee = true) {
                const maxDist = isMelee ? 4 : 64;
                for (let e of this.entities) {
                    const dist = e.pos.distanceTo(playerPos);
                    if (dist < maxDist) {
                        const box = new THREE.Box3().setFromObject(e.mesh);
                        box.expandByScalar(0.15);
                        if (raycaster.ray.intersectsBox(box)) {
                            const dir = new THREE.Vector3().subVectors(e.pos, playerPos).normalize();
                            e.takeDamage(damage, dir);
                            return true;
                        }
                    }
                }
                return false;
            }
        }

        class Player {
            constructor(camera, controls, world, ui) {
                this.camera = camera; this.controls = controls; this.world = world; this.ui = ui;
                this.mode = 'survival'; 
                this.vel = new THREE.Vector3();
                
                this.isFlying = false; this.isDashing = false; this.isGrounded = false; this.isSneaking = false;
                this.health = 20; this.maxHealth = 20;
                this.hunger = 20; this.maxHunger = 20; this.exhaustion = 0;
                this.breath = 20; this.maxBreath = 20;
                this.armor = 0;
                this.fallHighestY = 0;
                this.tickTimer = 0; this.hungerTickTimer = 0;
                this.combatCooldown = 0;
                this.eatTimer = 0;
                this._physY = 0;
                this._physX = 0;
                this._physZ = 0;
                this._lastHandStateKey = null;
                
                const crackTex = document.createElement('canvas'); 
                crackTex.width = 16; crackTex.height = 16; 
                this.crackCtx = crackTex.getContext('2d');
                this.crackCtx.imageSmoothingEnabled = false; 

                const crackCanvasTex = new THREE.CanvasTexture(crackTex);
                crackCanvasTex.magFilter = THREE.NearestFilter;

                const crackMat = new THREE.MeshBasicMaterial({ map: crackCanvasTex, transparent: true, depthTest: true, depthWrite: false });
                crackMat.polygonOffset = true; crackMat.polygonOffsetFactor = -1;
                this.crackMesh = new THREE.Mesh(new THREE.BoxGeometry(1.001, 1.001, 1.001), crackMat);
                this.crackMesh.visible = false;
                this.world.scene.add(this.crackMesh);

                const outlineGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.005, 1.005, 1.005));
                const outlineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 });
                this.outlineMesh = new THREE.LineSegments(outlineGeo, outlineMat);
                this.outlineMesh.visible = false;
                this.world.scene.add(this.outlineMesh);
                
                this.keys = {}; this.lastKeyUp = { w: 0, space: 0 };

                this.handGroup = new THREE.Group();
                this.handGroup.renderOrder = 999;
                this.camera.add(this.handGroup);

                this.offhandGroup = new THREE.Group();
                this.offhandGroup.renderOrder = 999;
                this.camera.add(this.offhandGroup);

                this._lastHandItemId = -1;
                this._lastOffhandItemId = -1;
                this.miningTime = 0; this.miningTarget = null;
                this.raycaster = new THREE.Raycaster();
                this.drops = [];
                // 手振りアニメーション
                this._swingProgress = 0;
                this._isSwinging = false;
                this._fishingBobber = null;
                this._fishingTimer = 0;
                this._isFishing = false;
                this._tntEntities = [];
                
                this._bindEvents();
            }

            _cropTexture(tex, sx, sy, sw, sh) {
                const src = tex.image;
                const c = document.createElement('canvas');
                c.width = sw; c.height = sh;
                const ctx = c.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(src, sx, sy, sw, sh, 0, 0, sw, sh);
                const t = new THREE.CanvasTexture(c);
                t.magFilter = THREE.NearestFilter;
                t.minFilter = THREE.NearestFilter;
                return t;
            }

            _buildHandGroup(group, id, isSneaking, isOffhand) {
                while (group.children.length) {
                    const m = group.children[0];
                    group.remove(m);
                    if (m.geometry) m.geometry.dispose();
                    if (m.material) { if (m.material.map) m.material.map.dispose(); m.material.dispose(); }
                }

                if (!id || id <= 0 || !PROPS[id]) { group.visible = false; return; }
                group.visible = true;

                const prop = PROPS[id];
                const tex = getTexture(id);
                const mkMat = (t) => new THREE.MeshLambertMaterial({
                    map: t, transparent: true, alphaTest: 0.05,
                    side: THREE.DoubleSide, depthWrite: false
                });

                const S = isOffhand ? 0.88 : 1.0; 
                const sneakY = isSneaking ? -0.06 : 0;
                const sign = isOffhand ? -1 : 1;

                if (prop.isItem) {
                    const isTool = !!prop.tool;
                    const geo = new THREE.PlaneGeometry(0.44 * S, 0.44 * S);
                    const mesh = new THREE.Mesh(geo, mkMat(tex));
                    mesh.renderOrder = 999;

                    if (isTool) {
                        if (prop.tool === 'sword') {
                            mesh.position.set(sign * 0.28, -0.22 + sneakY, -0.5);
                            mesh.rotation.set(0.1, sign * -0.4, sign * -0.6);
                            mesh.scale.set(1.0, 1.3, 1.0);
                        } else if (prop.tool === 'shield') {
                            const sgeo = new THREE.BoxGeometry(0.08 * S, 0.52 * S, 0.24 * S);
                            const smesh = new THREE.Mesh(sgeo, mkMat(tex));
                            smesh.renderOrder = 999;
                            if (isSneaking) {
                                smesh.position.set(sign * -0.2, -0.18 + sneakY, -0.62);
                                smesh.rotation.set(0.05, sign * 0.25, 0.05);
                            } else {
                                smesh.position.set(sign * -0.35, -0.3 + sneakY, -0.58);
