            buildCreativePanel() {
                const list = document.getElementById('creative-list'); list.innerHTML = '';
                const HIDDEN_IDS = new Set([BLOCKS.OAK_STAIR]);
                Object.keys(BLOCKS).forEach(k => {
                    const id = BLOCKS[k]; if (id === 0) return;
                    if (HIDDEN_IDS.has(id)) return;
                    if (PROPS[id] && PROPS[id]._hidden) return;
                    const d = document.createElement('div'); d.className = 'slot'; d.dataset.cid = id;
                    d.innerHTML = `<img src="${getTexture(id).image.toDataURL()}">`;
                    d.addEventListener('mousedown', e => this.handleSlotClick(e, 'creative', id));
                    list.appendChild(d);
                });
            }

            buildRecipeBook() {
                const list = document.getElementById('recipe-list'); list.innerHTML = '';

                // --- レシピ一覧ヘッダーのみ（全アイテム一覧は削除） ---
                const recTitle = document.createElement('div');
                recTitle.style.cssText = 'font-size:12px;font-weight:bold;color:#333;margin-bottom:6px;border-bottom:2px solid #888;padding-bottom:4px;';
                recTitle.textContent = LANG === 'ja' ? '🔨 クラフトレシピ' : '🔨 Recipes';
                list.appendChild(recTitle);

                const playerItems = {};
                for(let i=0; i<36; i++) {
                    if(this.inv[i]) {
                        playerItems[this.inv[i].id] = (playerItems[this.inv[i].id] || 0) + this.inv[i].count;
                    }
                }

                RECIPES.forEach((recipe, idx) => {
                    const reqs = {};
                    let maxCols = 0;
                    recipe.shape.forEach(row => {
                        maxCols = Math.max(maxCols, row.length);
                        row.forEach(id => {
                            if(id !== null) reqs[id] = (reqs[id] || 0) + 1;
                        });
                    });
                    const sizeReq = Math.max(recipe.shape.length, maxCols);

                    if(sizeReq > 2 && !this.isCraftTable) return;

                    let canCraft = true;
                    let totalPlanks = 0, totalLogs = 0;
                    for(let id in playerItems) {
                        if (this.isPlank(parseInt(id))) totalPlanks += playerItems[id];
                        if (this.isLog(parseInt(id))) totalLogs += playerItems[id];
                    }

                    for(let reqId in reqs) {
                        if (reqId === 'ANY_PLANK') {
                            if (totalPlanks < reqs[reqId]) canCraft = false;
                        } else if (reqId === 'ANY_LOG') {
                            if (totalLogs < reqs[reqId]) canCraft = false;
                        } else {
                            if(!playerItems[reqId] || playerItems[reqId] < reqs[reqId]) canCraft = false;
                        }
                    }

                    const d = document.createElement('div');
                    d.className = 'recipe-item' + (canCraft ? '' : ' recipe-missing');
                    d.innerHTML = `<img src="${getTexture(recipe.out).image.toDataURL()}"><span class="recipe-name">${PROPS[recipe.out][LANG]}</span>`;
                    d.addEventListener('mousedown', () => {
                        this.fillRecipe(recipe);
                    });
                    list.appendChild(d);
                });
            }

            fillRecipe(recipe) {
                const start = this.isCraftTable ? 40 : 36;
                const size = this.isCraftTable ? 3 : 2;
                
                for(let i=start; i<start+size*size; i++) {
                    if(this.inv[i] && !this.inv[i].ghost) {
                        if (!this.addItem(this.inv[i].id, this.inv[i].count, this.inv[i])) {
                            app.player.spawnDrop(app.player.camera.position.clone(), this.inv[i].id, this.inv[i].count, true);
                        }
                    }
                    this.inv[i] = null;
                }

                let success = true;
                const tempInv = JSON.parse(JSON.stringify(this.inv));
                const getDefaultId = (reqId) => reqId === 'ANY_PLANK' ? BLOCKS.PLANK : (reqId === 'ANY_LOG' ? BLOCKS.WOOD : reqId);

                for(let r=0; r<recipe.shape.length; r++) {
                    for(let c=0; c<recipe.shape[r].length; c++) {
                        const reqIdRaw = recipe.shape[r][c];
                        if(reqIdRaw !== null) {
                            let found = false;
                            for(let i=0; i<36; i++) {
                                const actId = tempInv[i]?.id;
                                const checkMatch = tempInv[i] && (
                                    (reqIdRaw === 'ANY_PLANK' && this.isPlank(actId)) ||
                                    (reqIdRaw === 'ANY_LOG' && this.isLog(actId)) ||
                                    (actId === reqIdRaw)
                                );
                                if(checkMatch) {
                                    tempInv[i].count--;
                                    if(tempInv[i].count <= 0) tempInv[i] = null;
                                    tempInv[start + r*size + c] = { id: actId, count: 1 };
                                    found = true; break;
                                }
                            }
                            if(!found) { success = false; break; }
                        }
                    }
                }

                if(success) {
                    this.inv = tempInv;
                } else {
                    for(let r=0; r<recipe.shape.length; r++) {
                        for(let c=0; c<recipe.shape[r].length; c++) {
                            const reqIdRaw = recipe.shape[r][c];
                            if(reqIdRaw !== null) {
                                const dId = getDefaultId(reqIdRaw);
                                this.inv[start + r*size + c] = { id: dId, count: 1, ghost: true };
                            }
                        }
                    }
                }
                this.finalizeAction();
            }

            initTooltip() {
                document.addEventListener('mousemove', e => {
                    if (this.tooltip.style.display === 'block') {
                        this.tooltip.style.left = e.clientX + 15 + 'px'; this.tooltip.style.top = e.clientY + 15 + 'px';
                    }
                });
                document.body.addEventListener('mouseover', e => {
                    const slot = e.target.closest('.slot');
                    if(slot && (this.isOpen || slot.parentElement.id === 'hotbar') && !this.cursorItem) {
                        let name = '';
                        if (slot.dataset.idx !== undefined && this.inv[slot.dataset.idx]) name = PROPS[this.inv[slot.dataset.idx].id][LANG];
                        else if (slot.dataset.cid !== undefined) name = PROPS[slot.dataset.cid][LANG];
                        
                        if (name) {
                            this.tooltip.innerText = name; this.tooltip.style.display = 'block';
                        }
                    }
                });
                document.body.addEventListener('mouseout', e => { if(e.target.closest('.slot')) this.tooltip.style.display = 'none'; });
            }

            handleSlotClick(e, type, val) {
                if(e.button !== 0 && e.button !== 2) return; 
                
                if (type === 'inv' && !this.isOpen && val >= 0 && val < 9) return; 
                
                if (type === 'creative') {
                    const isTool = PROPS[val] && (PROPS[val].maxDur !== undefined || PROPS[val].tool !== undefined);
                    const creativeCount = (e.button === 2 || isTool) ? 1 : 64;
                    if(!this.cursorItem) this.cursorItem = { id: val, count: creativeCount };
                } else if (type === 'inv') {
                    const idx = val; 
                    let sItem = this.inv[idx];

                    if (sItem && sItem.ghost) {
                        this.inv[idx] = null;
                        sItem = null;
                    }
                    
                    if (idx === 52 && e.button !== 2 && this.cursorItem && (!sItem || this.cursorItem.id !== sItem.id)) return;
                    
                    if (idx >= 80 && idx <= 83 && this.cursorItem) {
                        const prop = PROPS[this.cursorItem.id];
                        if(!prop || !prop.armor) return;
                        if(idx === 80 && prop.slot !== 'head') return;
                        if(idx === 81 && prop.slot !== 'chest') return;
                        if(idx === 82 && prop.slot !== 'legs') return;
                        if(idx === 83 && prop.slot !== 'feet') return;
                    }

                    if (e.shiftKey && sItem && !this.cursorItem) {
                        this.shiftTransferItem(idx, sItem);
                        return;
                    }

                    if(e.button === 0) {
                        if(!this.cursorItem && sItem) { this.cursorItem = sItem; this.inv[idx] = null; }
                        else if(this.cursorItem && !sItem) { this.inv[idx] = this.cursorItem; this.cursorItem = null; }
                        else if(this.cursorItem && sItem) {
                            const maxStack = (PROPS[sItem.id] && PROPS[sItem.id].maxDur !== undefined) ? 1 : 64;
                            if(this.cursorItem.id === sItem.id && sItem.count < maxStack) {
                                const space = maxStack - sItem.count;
                                if(this.cursorItem.count <= space) { sItem.count += this.cursorItem.count; this.cursorItem = null; }
                                else { sItem.count = maxStack; this.cursorItem.count -= space; }
                            } else {
                                const temp = this.inv[idx]; this.inv[idx] = this.cursorItem; this.cursorItem = temp;
                            }
                        }
                    } else if (e.button === 2) { 
                        const maxStackS = sItem ? ((PROPS[sItem.id] && PROPS[sItem.id].maxDur !== undefined) ? 1 : 64) : 64;
                        if(!this.cursorItem && sItem) { 
                            const p = PROPS[sItem.id];
                            if (p && p.maxDur !== undefined) {
                                this.cursorItem = this.inv[idx]; this.inv[idx] = null;
                            } else {
                                this.cursorItem = { id: sItem.id, count: 1 };
                                sItem.count--; if(sItem.count <= 0) this.inv[idx] = null;
                            }
                        } else if(this.cursorItem && !sItem) {
                            const p = PROPS[this.cursorItem.id];
                            if (p && p.maxDur !== undefined) {
                                this.inv[idx] = this.cursorItem; this.cursorItem = null;
                            } else {
                                this.inv[idx] = { id: this.cursorItem.id, count: 1 };
                                this.cursorItem.count--; if(this.cursorItem.count <= 0) this.cursorItem = null;
                            }
                        } else if(this.cursorItem && sItem && this.cursorItem.id === sItem.id && sItem.count < maxStackS) { 
                            sItem.count++; this.cursorItem.count--; if(this.cursorItem.count <= 0) this.cursorItem = null;
                        } else if(this.cursorItem && sItem && this.cursorItem.id !== sItem.id) { 
                            const temp = this.inv[idx]; this.inv[idx] = this.cursorItem; this.cursorItem = temp;
                        }
                    }
                }

                if (this.isFurnace && (val === 50 || val === 51 || val === 52)) {
                    const ent = this.worldObj.blockEntities.get(this.furnacePos);
                    if (ent) { ent.input = this.inv[50]; ent.fuelSlot = this.inv[51]; ent.output = this.inv[52]; }
                }

                this.finalizeAction();
            }

            shiftTransferItem(idx, item) {
                let targetStart = 0, targetEnd = 36;
                if (idx >= 0 && idx < 9) { 
                    targetStart = 9; targetEnd = 36;
                } else if (idx >= 9 && idx < 36) { 
                    targetStart = 0; targetEnd = 9;
                } else if (idx >= 53 && idx < 80) {
                    targetStart = 9; targetEnd = 36;
                } else if (idx >= 80 && idx <= 83) {
                    targetStart = 9; targetEnd = 36;
                } else { 
                    targetStart = 9; targetEnd = 36;
                }

                if(idx < 36 && PROPS[item.id] && PROPS[item.id].armor) {
                    let aIdx = -1;
                    if(PROPS[item.id].slot === 'head') aIdx = 80;
                    if(PROPS[item.id].slot === 'chest') aIdx = 81;
                    if(PROPS[item.id].slot === 'legs') aIdx = 82;
                    if(PROPS[item.id].slot === 'feet') aIdx = 83;
                    if(aIdx !== -1 && !this.inv[aIdx]) {
                        this.inv[aIdx] = item; this.inv[idx] = null; this.finalizeAction(); return;
                    }
                }

                for(let i = targetStart; i < targetEnd; i++) {
                    const maxSt = (PROPS[item.id] && PROPS[item.id].maxDur !== undefined) ? 1 : 64;
                    if (this.inv[i] && this.inv[i].id === item.id && this.inv[i].count < maxSt) {
                        const space = maxSt - this.inv[i].count;
                        if (item.count <= space) { this.inv[i].count += item.count; this.inv[idx] = null; this.finalizeAction(); return; }
                        else { this.inv[i].count = maxSt; item.count -= space; }
                    }
                }
                for(let i = targetStart; i < targetEnd; i++) {
                    if (!this.inv[i]) { this.inv[i] = item; this.inv[idx] = null; this.finalizeAction(); return; }
                }
            }

            finalizeAction() {
                this.checkCrafting(); 
                if(app && app.player) app.player.calculateArmor();
                this.save(); this.render(); this.renderCursor();
                if(this.mode === 'survival' && this.isOpen) this.buildRecipeBook();
            }

            handleTrash(e) {
                if(e.button === 0) { this.cursorItem = null; } 
                else if(e.button === 2 && this.cursorItem) { 
                    this.cursorItem.count--; if(this.cursorItem.count <= 0) this.cursorItem = null;
                }
                this.renderCursor();
            }

            extractGrid(start, size) {
                const grid = [];
                for(let r=0; r<size; r++) { const row = []; for(let c=0; c<size; c++) row.push(this.inv[start + r*size + c] ? this.inv[start + r*size + c].id : null); grid.push(row); }
                return grid;
            }

            trimGrid(grid) {
                let minR = grid.length, maxR = -1, minC = grid[0].length, maxC = -1;
                for(let r=0; r<grid.length; r++) {
                    for(let c=0; c<grid[r].length; c++) {
                        if(grid[r][c] !== null) {
                            if(r < minR) minR = r; if(r > maxR) maxR = r;
                            if(c < minC) minC = c; if(c > maxC) maxC = c;
                        }
                    }
                }
                if (maxR === -1) return [];
                const trimmed = [];
                for(let r=minR; r<=maxR; r++) trimmed.push(grid[r].slice(minC, maxC + 1));
                return trimmed;
            }

            checkCrafting() {
                const size = this.isCraftTable ? 3 : 2;
                const start = this.isCraftTable ? 40 : 36;
                const rawGrid = this.extractGrid(start, size);
                
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        const item = this.inv[start + r*size + c];
                        if(item && item.ghost) {
                            this.inv[49] = null;
                            return; 
                        }
                    }
                }

                const activeShape = this.trimGrid(rawGrid);
                let result = null;
                if (activeShape.length > 0) {
                    for(const r of RECIPES) {
                        if(activeShape.length === r.shape.length && activeShape[0].length === r.shape[0].length) {
                            let match = true;
                            for(let rr=0; rr<activeShape.length; rr++) {
                                for(let cc=0; cc<activeShape[rr].length; cc++) {
                                    const actId = activeShape[rr][cc];
                                    const reqId = r.shape[rr][cc];
                                    if(reqId === 'ANY_PLANK') {
                                        if(!this.isPlank(actId)) match = false;
                                    } else if(reqId === 'ANY_LOG') {
                                        if(!this.isLog(actId)) match = false;
                                    } else if(actId !== reqId) {
                                        match = false;
                                    }
                                }
                            }
                            if(match) { result = { id: r.out, count: r.count }; break; }
                        }
                    }
                }
                this.inv[49] = result;
            }

            takeCraftingResult(e) {
                const res = this.inv[49];
                if(!res) return;
                
                let taken = false;
                if (e.shiftKey) { 
                    taken = true;
                    while (this.inv[49] && this.inv[49].id === res.id) {
                        if (this.addItem(res.id, res.count)) {
                            const start = this.isCraftTable ? 40 : 36, end = this.isCraftTable ? 49 : 40;
                            for(let i=start; i<end; i++) { if(this.inv[i] && !this.inv[i].ghost) { this.inv[i].count--; if(this.inv[i].count <= 0) this.inv[i] = null; } }
                            this.checkCrafting();
                        } else break;
                    }
                } else {
                    if(!this.cursorItem) { this.cursorItem = {id: res.id, count: res.count}; taken = true; }
                    else if (this.cursorItem.id === res.id && this.cursorItem.count + res.count <= 64) {
                        this.cursorItem.count += res.count; taken = true;
                    }
                    if(taken) {
                        const start = this.isCraftTable ? 40 : 36, end = this.isCraftTable ? 49 : 40;
                        for(let i=start; i<end; i++) { if(this.inv[i] && !this.inv[i].ghost) { this.inv[i].count--; if(this.inv[i].count <= 0) this.inv[i] = null; } }
                    }
                }

                if(taken) { SoundManager.playCraft(); this.finalizeAction(); }
            }

            addItem(id, count, meta = null) {
                const p = PROPS[id];
                const isTool = p && p.maxDur !== undefined;
                const maxStack = isTool ? 1 : 64;

                if (!isTool) {
                    const stack = this.inv.slice(0,36).find(i => i && i.id === id && i.count <= maxStack - count && !i.ghost);
                    if(stack) { stack.count += count; this.save(); this.render(); return true; }
                }

                const empty = this.inv.slice(0,36).findIndex(i => !i || i.ghost);
                if(empty !== -1) { 
                    this.inv[empty] = { id, count: isTool ? 1 : count }; 
                    if(isTool) this.inv[empty].dur = meta ? meta.dur : p.maxDur;
                    this.save(); this.render(); return true; 
                }
                return false;
            }

            consumeActiveItem() {
                const item = this.inv[this.hotbarIdx];
                if(item && !item.ghost) {
                    item.count--; if(item.count <= 0) this.inv[this.hotbarIdx] = null;
                    this.save(); this.render();
                }
            }

            setHotbar(idx) { 
                this.hotbarIdx = idx; 
                if (window.app && app.player) app.player._lastHandStateKey = null;
                this.render(); 
            }

            openCraftingTable() { this.isCraftTable = true; this.toggleInv(true); }

            toggleInv(forceOpen = null) {
                if(app.player.health <= 0) return;
                this.isOpen = forceOpen !== null ? forceOpen : !this.isOpen;
                
                if (!this.isOpen) {
                    if(this.isCraftTable) {
                        this.recoverItems(40, 49);
                        this.isCraftTable = false;
                    }
                    this.recoverItems(36, 40); 
                    if(this.isFurnace) this.closeFurnace();
                    if(this.isChest) this.closeChest();
                    
                    if(this.cursorItem) { 
                        app.player.spawnDrop(app.player.camera.position.clone(), this.cursorItem.id, this.cursorItem.count, true);
                        this.cursorItem = null; this.renderCursor();
                    }
                }

                document.getElementById('inventory-screen').style.display = this.isOpen ? 'flex' : 'none';
                this.renderOffhand();
                document.getElementById('crosshair').style.display = this.isOpen ? 'none' : 'block';
                
                document.getElementById('craft-area').style.display = this.isFurnace ? 'none' : 'flex';
                document.getElementById('furnace-area').style.display = this.isFurnace ? 'flex' : 'none';
                
                document.getElementById('craft-grid-2x2').style.display = this.isCraftTable ? 'none' : 'grid';
                document.getElementById('craft-grid-3x3').style.display = this.isCraftTable ? 'grid' : 'none';
                document.getElementById('craft-title').innerText = this.isFurnace ? (LANG==='ja'?'かまど':'Furnace') : (this.isCraftTable ? (LANG==='ja'?'作業台 (3x3)':'Crafting Table') : (LANG==='ja'?'クラフト':'Crafting'));
                document.getElementById('text-items').innerText = LANG==='ja'?'アイテム':'Items';
                document.getElementById('text-inv').innerText = LANG==='ja'?'インベントリ (Shift+Clickで移動)':'Inventory (Shift+Click to Move)';

                if(this.isOpen) {
                    this.controls.unlock();
                    if(this.mode === 'survival') this.buildRecipeBook();
                } else {
                    this.controls.lock();
                }
                
                this.tooltip.style.display = 'none';
                this.checkCrafting(); this.render();
            }

            save() { 
                if(this.worldObj.worldId) {
                    const saveData = this.inv.slice(0, 84).map(item => item && item.ghost ? null : item);
                    saveData[52] = this.inv[52] && this.inv[52].ghost ? null : this.inv[52]; 
                    localStorage.setItem(`voxel_world_${this.worldObj.worldId}_inv`, JSON.stringify(saveData));
                    const off = this.inv[79];
                    localStorage.setItem(`voxel_world_${this.worldObj.worldId}_offhand`, JSON.stringify((off && off.ghost) ? null : off));
                }
            }

            renderCursor() {
                if(this.cursorItem) {
                    this.cursorUI.style.display = 'flex';
                    this.cursorUI.innerHTML = `<img src="${getTexture(this.cursorItem.id).image.toDataURL()}"><div class="count" style="position:absolute; bottom:2px; right:4px; color:white; text-shadow:1px 1px 0 #000; font-weight:bold;">${this.cursorItem.count > 1 ? this.cursorItem.count : ''}</div>`;
                    this.tooltip.style.display = 'none';
                } else {
                    this.cursorUI.style.display = 'none';
                }
            }

            renderOffhand() {
                const el = document.getElementById('offhand-slot');
                if (!el) return;
                const item = this.inv[79];
                if (!item || item.ghost) { el.innerHTML = ''; return; }
                el.innerHTML = `<img src="${getTexture(item.id).image.toDataURL()}"><div class="count">${item.count > 1 ? item.count : ''}</div>`;
            }

            renderFurnaceProgress(prog, fuel, maxFuel) {
                const bar = document.getElementById('furnace-progress-bar');
                if (bar) bar.style.width = Math.min(100, prog) + '%';
                const fuelBar = document.getElementById('furnace-fuel-bar');
                if (fuelBar && maxFuel > 0) fuelBar.style.height = Math.min(100, (fuel / maxFuel) * 100) + '%';
            }

            render() {
                const drawSlot = (el, item) => {
                    if(!item) el.innerHTML = '';
                    else {
                        if (item.ghost) {
                            el.innerHTML = `<img src="${getTexture(item.id).image.toDataURL()}" style="opacity: 0.3; filter: grayscale(100%);">`;
                        } else {
                            let html = `<img src="${getTexture(item.id).image.toDataURL()}"><div class="count">${item.count > 1 ? item.count : ''}</div>`;
                            if (item.dur !== undefined) {
                                const p = PROPS[item.id];
                                if (p && p.maxDur) {
                                    const pct = Math.max(0, item.dur / p.maxDur) * 100;
                                    const color = pct > 50 ? '#0f0' : (pct > 20 ? '#ff0' : '#f00');
                                    html += `<div style="position:absolute; bottom:2px; left:2px; width:36px; height:4px; background:#000; padding:1px;"><div style="width:${pct}%; height:100%; background:${color};"></div></div>`;
                                }
                            }
                            el.innerHTML = html;
                        }
                    }
                };
                const sync = (selector, start) => {
                    const els = document.querySelectorAll(`${selector} .slot`);
                    for(let i=0; i<els.length; i++) drawSlot(els[i], this.inv[start + i]);
                };
                sync('#hotbar', 0); sync('#hotbar-inv', 0); sync('#main-inv', 9); 
                sync('#craft-grid-2x2', 36); sync('#craft-grid-3x3', 40);
                drawSlot(document.getElementById('craft-out'), this.inv[49]);
                
                if (document.getElementById('furnace-in-container').firstChild) {
                    drawSlot(document.getElementById('furnace-in-container').firstChild, this.inv[50]);
                    drawSlot(document.getElementById('furnace-fuel-container').firstChild, this.inv[51]);
                    drawSlot(document.getElementById('furnace-out-container').firstChild, this.inv[52]);
                }
                
                sync('#chest-inv', 53);

                drawSlot(document.getElementById('armor-head'), this.inv[80]);
                drawSlot(document.getElementById('armor-chest'), this.inv[81]);
                drawSlot(document.getElementById('armor-legs'), this.inv[82]);
                drawSlot(document.getElementById('armor-feet'), this.inv[83]);

                document.querySelectorAll('#hotbar .slot').forEach((el, i) => el.className = `slot ${i === this.hotbarIdx ? 'active' : ''}`);
                this.renderOffhand();
                
                if(app && app.player) app.player.calculateArmor();
            }
        }

        class App {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87CEEB);
                this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.018);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.scene.add(this.camera); 
                this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(this.renderer.domElement);

                this.ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.dirLight = new THREE.DirectionalLight(0xfffff0, 0.8);
                this.scene.add(this.ambientLight, this.dirLight);
                // ネザー用: 溶岩海からの赤橙色の下からの光
                this.netherLavaLight = new THREE.PointLight(0xff4400, 0, 80);
                this.netherLavaLight.position.set(0, 31, 0); // 溶岩海面
                this.scene.add(this.netherLavaLight);
                this.timeOfDay = 0;

                this.controls = new PointerLockControls(this.camera, document.body);
                
                this.controls.addEventListener('unlock', () => {
                    if (this.player) this.player.keys = {};
                    if(!this.ui.isOpen && document.getElementById('menu').style.display === 'none' && this.player.health > 0) {
                        document.getElementById('pause-menu').style.display = 'flex';
                        document.getElementById('pause-title').innerText = "PAUSED";
                        document.getElementById('pause-title').style.color = "#ffffff";
                        document.getElementById('resume-btn').style.display = 'block';
                        document.getElementById('respawn-btn').style.display = 'none';
                    }
                });

                this.world = new World(this.scene);
                this.ui = new UI(this.controls, this.world);
                this.player = new Player(this.camera, this.controls, this.world, this.ui);
                this.entityManager = new EntityManager(this.world, this.scene);
                this.dimension = 'overworld'; // 'overworld' | 'nether'

                this.globalTicks = 0;

                this.clock = new THREE.Clock();
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('lang-toggle').addEventListener('change', e => {
                    LANG = e.target.value;
                    this.renderWorldList();
                });
                window.app = this;

                this.renderWorldList();
            }

            renderWorldList() {
                const worlds = JSON.parse(localStorage.getItem('voxel_worlds') || '[]');
                const container = document.getElementById('world-list');
                container.innerHTML = '';
                
                if (worlds.length === 0) {
                    container.innerHTML = `<p style="text-align:center; color:#ccc;">${LANG === 'ja' ? 'ワールドがありません' : 'No worlds found.'}</p>`;
                } else {
                    worlds.forEach(w => {
                        const div = document.createElement('div');
                        div.className = 'world-item';
                        const modeStr = w.mode === 'survival' ? (LANG === 'ja' ? 'サバイバル' : 'Survival') : (LANG === 'ja' ? 'クリエイティブ' : 'Creative');
                        const dateStr = new Date(w.lastPlayed).toLocaleString(LANG === 'ja' ? 'ja-JP' : 'en-US');
                        div.innerHTML = `
                            <div>
                                <h3>${w.name}</h3>
                                <p>${modeStr} - ${dateStr}</p>
                            </div>
                        `;
                        div.onclick = () => this.startGame(w.id);
                        container.appendChild(div);
                    });
                }
            }

            showNewWorldForm() {
                document.getElementById('world-selection').style.display = 'none';
                document.getElementById('new-world-form').style.display = 'flex';
            }

            hideNewWorldForm() {
                document.getElementById('new-world-form').style.display = 'none';
                document.getElementById('world-selection').style.display = 'flex';
            }

            createNewWorld() {
                const nameInput = document.getElementById('nw-name').value.trim();
                const mode = document.getElementById('nw-mode').value;
                const name = nameInput || (LANG === 'ja' ? '新しいワールド' : 'New World');
                
                const worlds = JSON.parse(localStorage.getItem('voxel_worlds') || '[]');
                const newId = 'world_' + Date.now();
                const seed = Math.floor(Math.random() * 1000000000); 
                
                worlds.push({ id: newId, name: name, mode: mode, seed: seed, lastPlayed: Date.now() });
                localStorage.setItem('voxel_worlds', JSON.stringify(worlds));
                
                this.startGame(newId);
            }

            startGame(worldId) {
                const worlds = JSON.parse(localStorage.getItem('voxel_worlds') || '[]');
                const worldData = worlds.find(w => w.id === worldId);
                if (!worldData) return;
                
                worldData.lastPlayed = Date.now();
                localStorage.setItem('voxel_worlds', JSON.stringify(worlds));

                this.player.mode = worldData.mode;
                document.getElementById('world-selection').style.display = 'none';
                document.getElementById('new-world-form').style.display = 'none';
                document.getElementById('loading-msg').style.display = 'block';

                this.controls.lock(); 

                setTimeout(() => {
                    this.world.initWorld(worldData.id, worldData.seed);
                    this.ui.loadInv(worldData.id, worldData.mode);
                    this.player.loadStats(worldData.id);
                    this.world.updateChunks(this.player); 
                    this.lastChunkCoords = { x: Math.floor(this.camera.position.x / CHUNK_SIZE), z: Math.floor(this.camera.position.z / CHUNK_SIZE) };
                    this.lastChunkDir = this.camera.getWorldDirection(new THREE.Vector3()); 
                    
                    document.getElementById('menu').style.display = 'none';
                    
                    this.animate();
                    
                    const isNightStart = this.timeOfDay > 0.5;
                    if (isNightStart) {
                        this.entityManager.spawn('ZOMBIE', this.player.camera.position.x - 5, this.player.camera.position.y, this.player.camera.position.z);
                    } else {
                        this.entityManager.spawn('PIG', this.player.camera.position.x + 5, this.player.camera.position.y, this.player.camera.position.z);
                        this.entityManager.spawn('COW', this.player.camera.position.x - 5, this.player.camera.position.y, this.player.camera.position.z);
                    }
                }, 100);
            }

            saveAndQuit() {
                this.player.saveStats();
                this.world.saveMods();
                this.ui.save();
                location.reload();
            }

            resetAllData() {
                if(confirm(LANG === 'ja' ? "すべてのワールドデータを削除しますか？" : "Delete all world data?")) {
                    localStorage.clear();
                    location.reload();
                }
            }

            resumeGame() {
                document.getElementById('pause-menu').style.display = 'none';
                this.controls.lock();
            }
            
            respawn() {
                this.player.spawn(false);
                this.controls.lock();
            }

            switchDimension() {
                const isNether = this.dimension === 'nether';
                // ネザー世界ジェネレータを切り替え
                this.world.isNether = !isNether;
                this._teleportThroughPortal(this.player);
                // ネザーMOBをスポーン
                if (!isNether) {
                    setTimeout(() => {
                        const px = this.player.camera.position.x, pz = this.player.camera.position.z;
                        // ネザー入場時は_netherLandNeededが着地Y確定後にスポーン
                        // 暫定Y(75)ではなく地面スキャンで安全な高さを使う
                        const safeY = (() => {
                            const SOLID = new Set([BLOCKS.NETHER_RACK, BLOCKS.CRIMSON_NYLIUM, BLOCKS.WARPED_NYLIUM,
                                BLOCKS.BLACKSTONE, BLOCKS.BASALT, BLOCKS.SOUL_SAND, BLOCKS.MAGMA_BLOCK,
                                BLOCKS.NETHER_BRICK, BLOCKS.GLOWSTONE, BLOCKS.QUARTZ_BLOCK]);
                            for (let sy = 70; sy >= 5; sy--) {
                                if (this.world.getBlock(Math.floor(px), sy, Math.floor(pz)) === BLOCKS.AIR &&
                                    this.world.getBlock(Math.floor(px), sy + 1, Math.floor(pz)) === BLOCKS.AIR &&
                                    SOLID.has(this.world.getBlock(Math.floor(px), sy - 1, Math.floor(pz)))) {
                                    return sy;
                                }
                            }
                            return 40; // フォールバック
                        })();
                        this.entityManager.spawn('ZOMBIE_PIGMAN', px + 4, safeY, pz);
                        this.entityManager.spawn('ZOMBIE_PIGMAN', px - 4, safeY, pz);
                        this.entityManager.spawn('BLAZE', px + 8, safeY + 6, pz);
                    }, 600);
                }
            }

            _teleportThroughPortal(player) {
                const isNether = this.dimension === 'nether';
                this.dimension = isNether ? 'overworld' : 'nether';

                // 座標変換（ネザー1:8）
                const cx = player.camera.position.x;
                const cz = player.camera.position.z;
                if (!isNether) {
                    // オーバーワールド → ネザー
                    this._overworldPos = {
                        x: cx,
                        blockY: Math.floor(player.camera.position.y - 1.7),
                        z: cz
                    };
                    // 仮置き：チャンク生成前なのでとりあえず中間高度へ（重力OFF）
                    player.camera.position.set(cx / 8, 75, cz / 8);
                }
                player.vel.set(0, 0, 0);
                if (!isNether) player._noGravity = true; // ネザー行き時のみ: 着地スキャンまで重力OFF
                // テレポート後クールダウン（ポータルチェック側でリセット済み）

                // ========== チャンク再構築 ==========
                for (const chunk of this.world.chunks.values()) {
                    for (const m of Object.values(chunk.meshes)) {
                        this.scene.remove(m);
                        if (m.geometry) m.geometry.dispose();
                    }
                    chunk.meshes = {};
                }
                this.world.chunks.clear();
                this.world.updateChunks(player);
                this.entityManager.entities.forEach(e => { this.scene.remove(e.mesh); });
                this.entityManager.entities = [];

                // ========== 到着地点にポータルフレームを建設するヘルパー ==========
                const buildPortalFrame = (wx, groundY, wz) => {
                    // groundY = 足元の固体ブロックのY
                    const gy = groundY + 1; // プレイヤーが立つY
                    // 足場3ブロック（フレーム下）
                    for (let dx = -1; dx <= 2; dx++) {
                        this.world.setBlock(wx + dx, gy - 1, wz, BLOCKS.OBSIDIAN);
                    }
                    // 4×5フレーム（内部 2×3）
                    for (let fx = -1; fx <= 2; fx++) {
                        for (let fy = 0; fy <= 4; fy++) {
                            const isFrame = (fx === -1 || fx === 2 || fy === 0 || fy === 4);
                            this.world.setBlock(wx + fx, gy + fy, wz,
                                isFrame ? BLOCKS.OBSIDIAN : BLOCKS.NETHER_PORTAL);
                        }
                    }
                    // プレイヤーをフレーム内側中央に配置
                    return { x: wx + 0.5, y: gy + 1.62, z: wz };
                };

                if (!isNether) {
                    // ===== オーバーワールド → ネザー =====
                    // _netherLandNeeded でフロアスキャン。buildPortalFrame は使わない。
                    // 代わりに到着後フレームをフロアに建てる（_netherLandNeeded が確定後）
                    this._netherLandNeeded = true;
                    this._netherLandTicks  = 0;
                    this._netherBuildPortal = true; // 着地後にポータルフレームを建てるフラグ
                } else {
                    // ===== ネザー → オーバーワールド =====
                    // 元の座標へ戻す。チャンク生成後に地面スキャン。
                    this._overworldReturnNeeded = true;
                    this._overworldReturnTicks  = 0;
                    this._overworldReturnPos    = {
                        x: this._overworldPos ? this._overworldPos.x : cx * 8,
                        z: this._overworldPos ? this._overworldPos.z : cz * 8
                    };
                    // 仮位置（チャンク生成のため）
                    const rx = this._overworldReturnPos.x;
                    const rz = this._overworldReturnPos.z;
                    player.camera.position.set(rx, 160, rz);
                    this.world.updateChunks(player);
                }
            }

            animate() {
                if (this._animating) return;
                this._animating = true;
                const loop = () => {
                requestAnimationFrame(loop);
                const delta = Math.min(this.clock.getDelta(), 0.1);
                
                this.globalTicks += delta * 20; 

                this.timeOfDay += delta * 0.0025; 
                if (this.timeOfDay > 1) this.timeOfDay = 0;

                const angle = this.timeOfDay * Math.PI * 2;
                this.dirLight.position.set(Math.cos(angle) * 50, Math.sin(angle) * 50, 0);

                const lightIntensity = Math.max(0, Math.sin(angle));
                this.dirLight.intensity = lightIntensity * 0.8;
                this.ambientLight.intensity = 0.2 + lightIntensity * 0.4;

                if (this.dimension === 'nether') {
                    // 公式ネザー: 暗い赤黒い空、ほぼ視界ゼロの霧
                    this.scene.background.set(0x330000);
                    this.scene.fog.color.set(0x2d0800);
                    this.ambientLight.intensity = 0.90;
                    this.dirLight.intensity = 0;
                    // 溶岩光源をプレイヤーの真下（y=31）に追従
                    if (this.netherLavaLight) {
                        const py = this.player.camera.position.y;
                        this.netherLavaLight.position.set(
                            this.player.camera.position.x,
                            31,
                            this.player.camera.position.z
                        );
                        // プレイヤーが溶岩面に近いほど強く
                        const dist = Math.max(1, py - 31);
                        this.netherLavaLight.intensity = Math.max(0, 2.5 - dist * 0.04);
                    }
                    const ni = document.getElementById('nether-indicator');
                    if (ni) ni.style.display = 'block';
                    const ph = document.getElementById('portal-hint');
                    if (ph) ph.style.display = 'none';
                    // ネザー入場時の着地補正
                    if (this._netherLandNeeded) {
                        this._netherLandTicks = (this._netherLandTicks || 0) + 1;
                        if (this._netherLandTicks >= 10) {
                            const px = Math.floor(this.player.camera.position.x);
                            const pz = Math.floor(this.player.camera.position.z);
                            const NETHER_SOLID_SET = new Set([
                                BLOCKS.NETHER_RACK, BLOCKS.CRIMSON_NYLIUM, BLOCKS.WARPED_NYLIUM,
                                BLOCKS.BLACKSTONE, BLOCKS.BASALT, BLOCKS.SOUL_SAND,
                                BLOCKS.MAGMA_BLOCK, BLOCKS.NETHER_BRICK, BLOCKS.GLOWSTONE,
                                BLOCKS.QUARTZ_BLOCK, BLOCKS.ANCIENT_DEBRIS, BLOCKS.BEDROCK
                            ]);
                            // 洞窟の床を探す（床3ブロック厚）y=54→5（屋根Y=56以上にスポーンしない）
                            const SPAWN_MAX_Y = 54; // camera = 54+1.62 = 55.62 < 56
                            let landY = -1;
                            for (let sy = SPAWN_MAX_Y; sy >= 5; sy--) {
                                if (this.world.getBlock(px, sy,     pz) === BLOCKS.AIR &&
                                    this.world.getBlock(px, sy + 1, pz) === BLOCKS.AIR &&
                                    NETHER_SOLID_SET.has(this.world.getBlock(px, sy - 1, pz)) &&
                                    NETHER_SOLID_SET.has(this.world.getBlock(px, sy - 2, pz)) &&
                                    NETHER_SOLID_SET.has(this.world.getBlock(px, sy - 3, pz))) {
                                    landY = sy; break;
                                }
                            }
                            // 緩い条件（床1ブロック厚）
                            if (landY < 0) {
                                for (let sy = SPAWN_MAX_Y; sy >= 5; sy--) {
                                    if (this.world.getBlock(px, sy,     pz) === BLOCKS.AIR &&
                                        this.world.getBlock(px, sy + 1, pz) === BLOCKS.AIR &&
                                        NETHER_SOLID_SET.has(this.world.getBlock(px, sy - 1, pz))) {
                                        landY = sy; break;
                                    }
                                }
                            }
                            // それでも見つからない場合は安全なフォールバック（上限54）
                            if (landY < 0) landY = 40;
                            if (landY >= 5) {
                                // ポータルフレームを着地点に建設してプレイヤーを配置
                                if (this._netherBuildPortal) {
                                    const groundY = landY - 1; // 固体ブロックのY
                                    const gy = groundY + 1;
                                    for (let dx = -1; dx <= 2; dx++) {
                                        this.world.setBlock(px + dx, gy - 1, pz, BLOCKS.OBSIDIAN);
                                    }
                                    for (let fx = -1; fx <= 2; fx++) {
                                        for (let fy = 0; fy <= 4; fy++) {
                                            const isFrame = (fx === -1 || fx === 2 || fy === 0 || fy === 4);
                                            this.world.setBlock(px + fx, gy + fy, pz,
                                                isFrame ? BLOCKS.OBSIDIAN : BLOCKS.NETHER_PORTAL);
                                        }
                                    }
                                    this.player.camera.position.set(px + 0.5, gy + 1.62, pz);
                                    this._netherBuildPortal = false;
                                } else {
                                    this.player.camera.position.y = landY + 1.62;
                                }
                                this.player.vel.set(0, 0, 0);
                                this.player._noGravity = false; // 重力を再開
                                this.world.updateChunks(this.player);
                            }
                            this._netherLandNeeded = false;
                        }
                    }

                    // オーバーワールド帰還処理はoverworldブロック内で処理
                } else {
                    const dayColor = new THREE.Color(0x87CEEB);
                    const nightColor = new THREE.Color(0x050510);
                    this.scene.background.lerpColors(nightColor, dayColor, lightIntensity);
                    this.scene.fog.color.copy(this.scene.background);
                    // 溶岩光源をOFF
                    if (this.netherLavaLight) this.netherLavaLight.intensity = 0;
                    const ni = document.getElementById('nether-indicator');
                    if (ni) ni.style.display = 'none';
                    // 火打石と打ち金を持っている時にポータルヒントを表示
                    const ph = document.getElementById('portal-hint');
                    if (ph) {
                        const heldItem = this.player && this.ui && this.ui.inv[this.ui.hotbarIdx];
                        const showHint = heldItem && PROPS[heldItem.id] && PROPS[heldItem.id].tool === 'flint_steel';
                        ph.style.display = showHint ? 'block' : 'none';
                    }
                    // オーバーワールド帰還処理
                    if (this._overworldReturnNeeded) {
                        this._overworldReturnTicks = (this._overworldReturnTicks || 0) + 1;
                        if (this._overworldReturnTicks >= 10) {
                            const rx = Math.floor(this._overworldReturnPos.x);
                            const rz = Math.floor(this._overworldReturnPos.z);
                            let groundY = -1;
                            for (let sy = 200; sy >= 1; sy--) {
                                const b  = this.world.getBlock(rx, sy,     rz);
                                const b1 = this.world.getBlock(rx, sy + 1, rz);
                                const bm = this.world.getBlock(rx, sy - 1, rz);
                                const SOLID = (id) => id && id !== BLOCKS.AIR && id !== BLOCKS.WATER &&
                                    id !== BLOCKS.NETHER_PORTAL && PROPS[id] && PROPS[id].isSolid !== false;
                                if (b === BLOCKS.AIR && b1 === BLOCKS.AIR && SOLID(bm)) {
                                    groundY = sy; break;
                                }
                            }
                            if (groundY < 0) groundY = 70;
                            const gy = groundY;
                            for (let dx = -1; dx <= 2; dx++) {
                                this.world.setBlock(rx + dx, gy - 1, rz, BLOCKS.OBSIDIAN);
                            }
                            for (let fx = -1; fx <= 2; fx++) {
                                for (let fy = 0; fy <= 4; fy++) {
                                    const isFrame = (fx === -1 || fx === 2 || fy === 0 || fy === 4);
                                    this.world.setBlock(rx + fx, gy + fy, rz,
                                        isFrame ? BLOCKS.OBSIDIAN : BLOCKS.NETHER_PORTAL);
                                }
                            }
                            this.player.camera.position.set(rx + 0.5, gy + 1.62, rz);
                            this.player.vel.set(0, 0, 0);
                            this.player._noGravity = false;
                            this.world.updateChunks(this.player);
                            this._overworldReturnNeeded = false;
                        }
                    }
                }

                if(this.controls.isLocked) {
                    this.player.update(delta);
                    
                    const currentCX = Math.floor(this.camera.position.x / CHUNK_SIZE);
                    const currentCZ = Math.floor(this.camera.position.z / CHUNK_SIZE);
                    const currentDir = this.camera.getWorldDirection(new THREE.Vector3());
                    if (!this.lastChunkCoords || this.lastChunkCoords.x !== currentCX || this.lastChunkCoords.z !== currentCZ || (this.lastChunkDir && this.lastChunkDir.dot(currentDir) < 0.9)) {
                        this.world.updateChunks(this.player);
                        this.lastChunkCoords = { x: currentCX, z: currentCZ };
                        this.lastChunkDir = currentDir;
                    }

                    this.entityManager.update(delta, this.player, this.globalTicks, this.ui);

                    // --- プレイヤーモデル & HUD ---
                    const mode = this.cameraMode || 0;
                    if (!this._playerBodyMesh) this._initPlayerBodyMesh();
                    const bodyMesh = this._playerBodyMesh;

                    this.player.handGroup.visible    = (mode === 0);
                    this.player.offhandGroup.visible  = (mode === 0);

                    if (mode !== 0 && this.player._physX !== undefined) {
                        const px  = this.player._physX;
                        const pz  = this.player._physZ;
                        const pFeet = this.player._physY - 1.62;
                        bodyMesh.position.set(px, pFeet + 0.9, pz);
                        const yaw = this.controls.getObject().rotation.y;
                        bodyMesh.rotation.y = yaw + Math.PI;
                        bodyMesh.visible = true;

                        // 手足のアニメーション
                        if (this._playerLimbs) {
                            const limbs = this._playerLimbs;
                            const isMoving = this.player.isGrounded && (
                                this.player.keys['KeyW'] || this.player.keys['KeyS'] ||
                                this.player.keys['KeyA'] || this.player.keys['KeyD']
                            );
                            const t = performance.now() / 1000;
                            const walkSpeed = 6.5;
                            const walkAmp   = isMoving ? 0.55 : 0;
                            const swing = Math.sin(t * walkSpeed) * walkAmp;

                            limbs.lLeg.rotation.x =  swing;
                            limbs.rLeg.rotation.x = -swing;
                            limbs.lArm.rotation.x = -swing;
                            limbs.rArm.rotation.x =  swing;

                            // 頭はカメラのピッチ（見上げ・見下ろし）に追従
                            const pitchAngle = this.camera.rotation.x;
                            limbs.head.rotation.x = THREE.MathUtils.clamp(-pitchAngle, -0.6, 0.6); // 符号をマイナスに修正
                        }
                    } else {
                        bodyMesh.visible = false;
                    }

                    // HUD
                    let camHud = document.getElementById('cam-mode-hud');
                    if (!camHud) {
                        camHud = document.createElement('div');
                        camHud.id = 'cam-mode-hud';
                        camHud.style.cssText = 'position:fixed;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:#fff;font-size:12px;padding:3px 10px;border-radius:4px;pointer-events:none;font-family:monospace;z-index:100;';
                        document.body.appendChild(camHud);
                    }
                    const modeNames = ['一人称視点', '三人称視点（後）', '二人称視点（前）'];
                    camHud.textContent = `[Z] ${modeNames[mode]}`;
                    camHud.style.opacity = mode === 0 ? '0.5' : '1';
                } else if(this.ui.isOpen) {
                    this.player.updateDrops(delta); 
                }
                const qLen = this.world.chunkBuildQueue.length;
                this.world.processPendingChunks(qLen > 8 ? 3 : qLen > 3 ? 2 : 1);
                this.world.updateBlockEntities(delta);

                // 三人称/二人称では物理用quaternionを保存してカメラを移動させる
        const camMode = this.cameraMode || 0;
        let savedPos = null, savedQuat = null;
        if (camMode !== 0 && this.player._physX !== undefined) {
            savedPos  = this.camera.position.clone();
            savedQuat = this.camera.quaternion.clone();

            const maxDist = 4.5;
            let finalDist = maxDist;
            
            // 1. カメラをスライドさせる方向を計算（三人称なら後ろ向き、二人称なら前向き）
            const dir = new THREE.Vector3(0, 0, camMode === 1 ? 1 : -1);
            dir.applyQuaternion(this.camera.quaternion);

            // 2. 壁抜け防止（レイキャストで少しずつ後ろを確認）
            const steps = 15;
            for (let i = 1; i <= steps; i++) {
                const f = i / steps;
                const checkPos = savedPos.clone().addScaledVector(dir, maxDist * f);
                const blockId = this.world.getBlock(Math.floor(checkPos.x), Math.floor(checkPos.y), Math.floor(checkPos.z));
                
                // 空気・水・ガラスなど以外の「通り抜けられないブロック」にぶつかったら距離を縮める
                if (blockId !== 0 && PROPS[blockId] && PROPS[blockId].isSolid !== false && !PROPS[blockId].isLiquid) {
                    finalDist = maxDist * ((i - 1) / steps);
                    break;
                }
            }

            // 3. カメラを移動（lookAtは使わず、一人称の角度をそのまま保つ！）
            this.camera.position.addScaledVector(dir, finalDist);
            
            // 二人称（前から）の場合は、カメラを180度反転させてプレイヤーの顔を映す
            if (camMode === 2) {
                this.camera.rotateY(Math.PI);
            }
        }

        // ネザーポータルのゆらぎアニメーション
        if (this.world && this.world.chunks) {
            const t = (this.globalTicks || 0) * 0.05;
            for (const chunk of this.world.chunks.values()) {
                for (const key of ['188_0', '188_1', BLOCKS.NETHER_PORTAL]) {
                    const pm = chunk.meshes[key];
                    if (pm && pm.material) {
                        pm.material.opacity = 0.5 + Math.sin(t * 2.3) * 0.2;
                        if (pm.material.emissive) pm.material.emissive.setHSL(0.76 + Math.sin(t) * 0.04, 1.0, 0.1 + Math.sin(t * 1.9) * 0.05);
                    }
                }
            }
        }

        this.renderer.render(this.scene, this.camera);

                // 物理用quaternion/positionを復元（次フレームの移動計算用）
                if (savedQuat) {
                    this.camera.position.copy(savedPos);
                    this.camera.quaternion.copy(savedQuat);
                }
                }; // end of loop function
                loop();
            }

            _initPlayerBodyMesh() {
                const g = new THREE.Group();

                // マテリアル
                const skinMat  = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
                const shirtMat = new THREE.MeshLambertMaterial({ color: 0x3a7bd5 });
                const pantsMat = new THREE.MeshLambertMaterial({ color: 0x2c3e6b });
                const shoeMat  = new THREE.MeshLambertMaterial({ color: 0x4a2800 });
                const hairMat  = new THREE.MeshLambertMaterial({ color: 0x3b1f00 });
                const eyeMat   = new THREE.MeshLambertMaterial({ color: 0x111111 });
                const pupilMat = new THREE.MeshLambertMaterial({ color: 0x4466ff });

                // ── 頭（ピボットを首元に置く）──
                const headPivot = new THREE.Group();
                headPivot.position.set(0, 0.75, 0); // 胴体上端（首）
                g.add(headPivot);

                const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
                head.position.set(0, 0.25, 0); // ピボットから上へ
                headPivot.add(head);

                // 髪（頭頂部・横・前）
                const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.08, 0.52), hairMat);
                hairTop.position.set(0, 0.52, 0);
                headPivot.add(hairTop);

                const hairBack = new THREE.Mesh(new THREE.BoxGeometry(0.50, 0.38, 0.06), hairMat);
                hairBack.position.set(0, 0.30, -0.27);
                headPivot.add(hairBack);

                const hairL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.42, 0.42), hairMat);
                hairL.position.set(-0.27, 0.28, 0.02);
                headPivot.add(hairL);

                const hairR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.42, 0.42), hairMat);
                hairR.position.set(0.27, 0.28, 0.02);
                headPivot.add(hairR);

                const hairFront = new THREE.Mesh(new THREE.BoxGeometry(0.50, 0.10, 0.06), hairMat);
                hairFront.position.set(0, 0.45, 0.27);
                headPivot.add(hairFront);

                // 目（左右）
                const makeEye = (xOff) => {
                    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.10, 0.04), eyeMat);
                    eye.position.set(xOff, 0.27, 0.27);
                    headPivot.add(eye);
                    const pupil = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, 0.02), pupilMat);
                    pupil.position.set(xOff * 0.4, -0.01, 0.02);
                    eye.add(pupil);
                };
                makeEye(-0.12);
                makeEye( 0.12);

                // ── 胴体 ──
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), shirtMat);
                body.position.set(0, 0.375, 0);
                g.add(body);

                // ── 脚（ピボットを股関節に）──
                const makeLeg = (xOff) => {
                    const pivot = new THREE.Group();
                    pivot.position.set(xOff, 0, 0); // 股関節
                    g.add(pivot);
                    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.42, 0.22), pantsMat);
                    upper.position.set(0, -0.21, 0);
                    pivot.add(upper);
                    const lower = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.38, 0.20), pantsMat);
                    lower.position.set(0, -0.60, 0);
                    pivot.add(lower);
                    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.10, 0.28), shoeMat);
                    shoe.position.set(0, -0.82, 0.03);
                    pivot.add(shoe);
                    return pivot;
                };
                const lLegPivot = makeLeg(-0.14);
                const rLegPivot = makeLeg( 0.14);

                // ── 腕（ピボットを肩に）──
                const makeArm = (xOff) => {
                    const pivot = new THREE.Group();
                    pivot.position.set(xOff, 0.65, 0); // 肩の高さ
                    g.add(pivot);
                    const upper = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.38, 0.22), shirtMat);
                    upper.position.set(0, -0.19, 0);
                    pivot.add(upper);
                    const lower = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.34, 0.20), skinMat);
                    lower.position.set(0, -0.52, 0);
                    pivot.add(lower);
                    return pivot;
                };
                const lArmPivot = makeArm(-0.36);
                const rArmPivot = makeArm( 0.36);

                g.visible = false;
                this.scene.add(g);
                this._playerBodyMesh = g;
                this._playerLimbs = { lLeg: lLegPivot, rLeg: rLegPivot, lArm: lArmPivot, rArm: rArmPivot, head: headPivot };
            }
        }
        new App();
    </script>
</body>
</html>
