                        if (ent.isChest && ent.items) {
                            ent.items.forEach(item => { if (item) this.spawnDrop(pos, item.id, item.count); });
                        } else if (ent.fuel !== undefined) {
                            if (ent.input) this.spawnDrop(pos, ent.input.id, ent.input.count);
                            if (ent.fuelSlot) this.spawnDrop(pos, ent.fuelSlot.id, ent.fuelSlot.count);
                            if (ent.output) this.spawnDrop(pos, ent.output.id, ent.output.count);
                        }
                        this.world.blockEntities.delete(k);
                    }
                }

                if (id === BLOCKS.DOOR || id === BLOCKS.IRON_DOOR || id === BLOCKS.BIRCH_DOOR || id === BLOCKS.ACACIA_DOOR || id === BLOCKS.JUNGLE_DOOR || id === BLOCKS.DARK_OAK_DOOR) {
                    const fx = Math.floor(pos.x), fy = Math.floor(pos.y), fz = Math.floor(pos.z);
                    const bBelow = this.world.getBlock(fx, fy-1, fz);
                    const isDoorId = (b) => b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR || b === BLOCKS.DARK_OAK_DOOR;
                    const isTopHalf = isDoorId(bBelow);
                    const bottomY = isTopHalf ? fy-1 : fy;
                    const topY = bottomY + 1;
                    this.world.setBlock(fx, bottomY, fz, BLOCKS.AIR);
                    this.world.setBlock(fx, topY, fz, BLOCKS.AIR);
                    this.world.openDoors.delete(`${fx},${bottomY},${fz}`);
                    this.world.doorFacing.delete(`${fx},${bottomY},${fz}`);
                    if (this.mode === 'survival' && canDrop && PROPS[id] && PROPS[id].drop !== 0) {
                        this.spawnDrop(pos, PROPS[id].drop, 1);
                    }
                    this.world.saveMods();
                    return;
                }

                if (id === BLOCKS.BED || id === BLOCKS.BED_HEAD) {
                    const fx = Math.floor(pos.x), fy = Math.floor(pos.y), fz = Math.floor(pos.z);
                    this.world.setBlock(fx, fy, fz, BLOCKS.AIR);
                    for(let dx=-1; dx<=1; dx++) {
                        for(let dz=-1; dz<=1; dz++) {
                            if(dx===0 && dz===0) continue;
                            const nid = this.world.getBlock(fx+dx, fy, fz+dz);
                            if(nid === BLOCKS.BED || nid === BLOCKS.BED_HEAD) {
                                this.world.setBlock(fx+dx, fy, fz+dz, BLOCKS.AIR);
                                this.world.hideBlockInstance(fx+dx, fy, fz+dz, nid);
                            }
                        }
                    }
                    if (this.mode === 'survival' && canDrop) {
                        this.spawnDrop(pos, BLOCKS.BED, 1);
                    }
                    this.world.saveMods();
                    return;
                }

                const blockAbove = this.world.getBlock(Math.floor(pos.x), Math.floor(pos.y) + 1, Math.floor(pos.z));
                const replacement = (pos.y <= SEA_LEVEL && pos.y > 0 && (blockAbove === BLOCKS.WATER)) ? BLOCKS.WATER : BLOCKS.AIR;
                this.world.setBlock(pos.x, pos.y, pos.z, replacement);
                if (this.mode === 'survival' && canDrop && PROPS[id] && PROPS[id].drop !== 0) {
                    if (id === BLOCKS.LEAVES || id === BLOCKS.BIRCH_LEAVES || id === BLOCKS.ACACIA_LEAVES || id === BLOCKS.JUNGLE_LEAVES) {
                        if (Math.random() < 0.05) this.spawnDrop(pos, BLOCKS.SAPLING, 1);
                        if (id === BLOCKS.LEAVES && Math.random() < 0.02) this.spawnDrop(pos, BLOCKS.APPLE, 1);
                        return;
                    }
                    // ニンジン/ジャガイモ作物は複数ドロップ
                    if (id === BLOCKS.CARROT_CROP) {
                        this.spawnDrop(pos, BLOCKS.CARROT, 1 + Math.floor(Math.random() * 3));
                    } else if (id === BLOCKS.POTATO_CROP) {
                        this.spawnDrop(pos, BLOCKS.POTATO, 1 + Math.floor(Math.random() * 3));
                    } else if (id === BLOCKS.WHEAT_CROP) {
                        // 小麦: 小麦1個 + 種0〜3個をドロップ
                        this.spawnDrop(pos, BLOCKS.WHEAT, 1);
                        const seedCount = Math.floor(Math.random() * 4);
                        if (seedCount > 0) this.spawnDrop(pos, BLOCKS.WHEAT_SEEDS, seedCount);
                    } else {
                        this.spawnDrop(pos, PROPS[id].drop, 1);
                    }
                }
            }

            _updatePortal(delta) {
                if (!app) return;
                const px = Math.floor(this.camera.position.x);
                const pz = Math.floor(this.camera.position.z);
                // 足元・胸・頭の3点を検索（位置ズレで入れない問題を解消）
                const feetY  = Math.floor(this.camera.position.y - 1.62); // 足元
                const block =
                    this.world.getBlock(px, feetY + 1, pz) === BLOCKS.NETHER_PORTAL ? BLOCKS.NETHER_PORTAL :
                    this.world.getBlock(px, feetY + 2, pz) === BLOCKS.NETHER_PORTAL ? BLOCKS.NETHER_PORTAL :
                    this.world.getBlock(px, feetY,     pz) === BLOCKS.NETHER_PORTAL ? BLOCKS.NETHER_PORTAL :
                    this.world.getBlock(px, feetY + 3, pz);

                // ポータルから出たらタイマーリセット
                if (block !== BLOCKS.NETHER_PORTAL) {
                    if (this._portalTimer > 0) {
                        const ov = document.getElementById('damage-overlay');
                        if (ov) { ov.style.opacity = '0'; ov.style.transition = 'opacity 0.4s'; }
                    }
                    this._portalTimer = 0;
                    return;
                }

                // テレポート済みフラグ（到着後3秒間は再発火しない）
                if (this._portalCooldown > 0) {
                    this._portalCooldown -= delta;
                    return;
                }

                if (!this._portalTimer) this._portalTimer = 0;
                this._portalTimer += delta;
                SoundManager.playPortalAmbient();

                // 3秒かけて紫のビネット効果（徐々に濃く）
                const frac = Math.min(1.0, this._portalTimer / 3.0);
                const ov = document.getElementById('damage-overlay');
                if (ov) {
                    ov.style.background = `rgba(80,0,180,${frac * 0.75})`;
                    ov.style.opacity = '1';
                    ov.style.transition = 'none';
                }

                if (this._portalTimer >= 3.0) {
                    this._portalTimer = 0;
                    this._portalCooldown = 3.0; // 到着後3秒間は再発火しない
                    if (ov) { ov.style.opacity = '0'; ov.style.transition = 'opacity 0.6s'; }
                    app._teleportThroughPortal(this);
                }
            }

            _tryFillPortal(px, py, pz) {
                // 黒曜石フレームを探してネザーポータルを生成
                // 標準サイズ: 内部 2×3（外枠含め4×5）
                // 大サイズ:  内部 3×4（外枠含め5×6）まで対応

                const tryFrame = (axis) => {
                    // axis='x': XY平面のフレーム（Z一定）
                    // axis='z': ZY平面のフレーム（X一定）
                    for (let innerW = 2; innerW <= 3; innerW++) {
                        for (let innerH = 3; innerH <= 4; innerH++) {
                            // クリック位置周辺をスキャン
                            for (let startH = -innerH - 1; startH <= 1; startH++) {
                                for (let startW = -innerW - 1; startW <= 1; startW++) {
                                    // フレーム左下コーナー（外枠含む）
                                    const ox = axis === 'x' ? px + startW : px;
                                    const oy = py + startH;
                                    const oz = axis === 'z' ? pz + startW : pz;

                                    let valid = true;
                                    // 外枠チェック: 黒曜石、内部: AIR or NETHER_PORTAL
                                    for (let fw = 0; fw <= innerW + 1 && valid; fw++) {
                                        for (let fh = 0; fh <= innerH + 1 && valid; fh++) {
                                            const wx = axis === 'x' ? ox + fw : ox;
                                            const wz = axis === 'z' ? oz + fw : oz;
                                            const wy = oy + fh;
                                            const isFrame = (fw === 0 || fw === innerW + 1 || fh === 0 || fh === innerH + 1);
                                            const b = this.world.getBlock(wx, wy, wz);
                                            if (isFrame) {
                                                if (b !== BLOCKS.OBSIDIAN) { valid = false; }
                                            } else {
                                                // AIR・ネザーポータル・非固体/非液体ブロック（草・花等）を許容
                                                const bp = b ? PROPS[b] : null;
                                                const isValidInterior = b === BLOCKS.AIR || b === BLOCKS.NETHER_PORTAL ||
                                                    (bp && bp.isSolid === false && !bp.isLiquid);
                                                if (!isValidInterior) { valid = false; }
                                            }
                                        }
                                    }

                                    if (valid) {
                                        // 内部をネザーポータルで充填
                                        for (let fw = 1; fw <= innerW; fw++) {
                                            for (let fh = 1; fh <= innerH; fh++) {
                                                const wx = axis === 'x' ? ox + fw : ox;
                                                const wz = axis === 'z' ? oz + fw : oz;
                                                this.world.setBlock(wx, oy + fh, wz, BLOCKS.NETHER_PORTAL);
                                            }
                                        }
                                        return true;
                                    }
                                }
                            }
                        }
                    }
                    return false;
                };
                return tryFrame('x') || tryFrame('z');
            }

            _spawnFuseTNT(x, y, z) {
                const geo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
                const mat = new THREE.MeshLambertMaterial({ map: getTexture(BLOCKS.TNT) });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
                this.world.scene.add(mesh);
                SoundManager.playFlintSteel();
                this._tntEntities.push({ mesh, fuse: 4.0, vy: 0.08 });
            }

            _updateTNT(delta) {
                for (let i = this._tntEntities.length - 1; i >= 0; i--) {
                    const t = this._tntEntities[i];
                    t.fuse -= delta;
                    // 点滅（導火線時間が短くなるほど速く）
                    const blinkSpeed = 2 + (4 - Math.max(0, t.fuse)) * 3;
                    t.mesh.visible = (Math.floor(performance.now() * 0.001 * blinkSpeed) % 2 === 0) || t.fuse < 0.3;

                    // 重力適用
                    t.vy -= 0.025;
                    if (t.vy < -1.5) t.vy = -1.5;
                    t.mesh.position.y += t.vy;
                    t.mesh.rotation.y += delta * 3;

                    // 地面衝突：TNTの底辺でチェック
                    const tx = Math.floor(t.mesh.position.x);
                    const tz = Math.floor(t.mesh.position.z);
                    const bottomY = t.mesh.position.y - 0.45; // TNT底辺
                    const floorY = Math.floor(bottomY);
                    const below = this.world.getBlock(tx, floorY, tz);
                    const isSolidBelow = below && below !== BLOCKS.AIR && PROPS[below] && PROPS[below].isSolid !== false && !PROPS[below].isLiquid;
                    if (isSolidBelow && t.vy < 0) {
                        // 地面に押し付けず、地面の上に止める
                        t.mesh.position.y = floorY + 1 + 0.45;
                        t.vy = t.vy * -0.3; // 弱く弾む
                        if (Math.abs(t.vy) < 0.01) t.vy = 0;
                    }

                    if (t.fuse <= 0) {
                        this.world.scene.remove(t.mesh);
                        t.mesh.geometry.dispose();
                        if (Array.isArray(t.mesh.material)) t.mesh.material.forEach(m => m.dispose());
                        else t.mesh.material.dispose();
                        this._explodeTNT(
                            Math.round(t.mesh.position.x),
                            Math.round(t.mesh.position.y),
                            Math.round(t.mesh.position.z)
                        );
                        this._tntEntities.splice(i, 1);
                    }
                }
            }

            _explodeTNT(cx, cy, cz) {
                const BLAST_RADIUS = 4;
                // バッチ処理で爆発範囲のブロックをまとめて消去（チャンク再構築を最小化）
                const affectedChunks = new Set();
                for (let dx = -BLAST_RADIUS; dx <= BLAST_RADIUS; dx++) {
                    for (let dy = -BLAST_RADIUS; dy <= BLAST_RADIUS; dy++) {
                        for (let dz = -BLAST_RADIUS; dz <= BLAST_RADIUS; dz++) {
                            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                            if (dist > BLAST_RADIUS) continue;
                            const bx = Math.floor(cx + dx), by = Math.floor(cy + dy), bz = Math.floor(cz + dz);
                            const bid = this.world.getBlock(bx, by, bz);
                            if (bid && bid !== BLOCKS.AIR && PROPS[bid] && PROPS[bid].hard >= 0) {
                                // modsに直接書き込み（チャンク再構築をトリガーしない）
                                this.world.mods.set(`${bx},${by},${bz}`, BLOCKS.AIR);
                                const chunkX = Math.floor(bx / CHUNK_SIZE);
                                const chunkZ = Math.floor(bz / CHUNK_SIZE);
                                affectedChunks.add(`${chunkX},${chunkZ}`);
                            }
                        }
                    }
                }
                // 影響チャンクのみ一括再構築
                for (const key of affectedChunks) {
                    const chunk = this.world.chunks.get(key);
                    if (chunk) this.world.buildChunkMesh(chunk);
                }
                this.world.saveMods();
                // プレイヤーへのダメージ
                const distToPlayer = new THREE.Vector3(cx, cy, cz).distanceTo(this.camera.position);
                if (distToPlayer < BLAST_RADIUS + 2) {
                    const dmg = Math.floor(20 * (1 - distToPlayer / (BLAST_RADIUS + 2)));
                    if (dmg > 0) {
                        const dir = new THREE.Vector3().subVectors(this.camera.position, new THREE.Vector3(cx, cy, cz)).normalize();
                        this.takeDamage(Math.max(1, dmg), dir);
                        this.vel.add(dir.multiplyScalar(8));
                    }
                }
                // エンティティへのダメージ
                if (app.entityManager) {
                    for (const e of app.entityManager.entities) {
                        const d = e.pos.distanceTo(new THREE.Vector3(cx, cy, cz));
                        if (d < BLAST_RADIUS + 2) {
                            const ed = Math.floor(20 * (1 - d / (BLAST_RADIUS + 2)));
                            if (ed > 0) {
                                const dir = new THREE.Vector3().subVectors(e.pos, new THREE.Vector3(cx, cy, cz)).normalize();
                                e.takeDamage(Math.max(1, ed), dir);
                            }
                        }
                    }
                }
                // 爆発エフェクト
                SoundManager.playTNT();
                const ov = document.getElementById('damage-overlay');
                if (ov) { ov.style.background = 'rgba(255,200,0,0.7)'; ov.style.opacity = '1'; setTimeout(() => { ov.style.opacity = '0'; setTimeout(() => ov.style.background = 'rgba(255,0,0,0.4)', 300); }, 400); }
            }

            _spawnArrow() {
                const dir = new THREE.Vector3();
                this.camera.getWorldDirection(dir);
                const origin = this.camera.position.clone().addScaledVector(dir, 1.2);
                const arrowGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.5, 4);
                const arrowMat = new THREE.MeshLambertMaterial({ color: 0x886633 });
                const arrowMesh = new THREE.Mesh(arrowGeo, arrowMat);
                arrowMesh.position.copy(origin);
                arrowMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
                this.world.scene.add(arrowMesh);
                let life = 0;
                const vel = dir.clone().multiplyScalar(22);
                const world = this.world;
                const tick = () => {
                    life += 0.016;
                    vel.y -= 9.8 * 0.016 * 0.6;
                    const nextPos = arrowMesh.position.clone().addScaledVector(vel, 0.016);
                    // ブロック衝突チェック（矢はブロックを貫通しない）
                    const bx = Math.floor(nextPos.x), by = Math.floor(nextPos.y), bz = Math.floor(nextPos.z);
                    const bid = world.getBlock(bx, by, bz);
                    if (bid && bid !== BLOCKS.AIR && PROPS[bid] && PROPS[bid].isSolid !== false && !PROPS[bid].isLiquid) {
                        world.scene.remove(arrowMesh); arrowGeo.dispose(); arrowMat.dispose(); return;
                    }
                    arrowMesh.position.copy(nextPos);
                    if (vel.length() > 0.1) arrowMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), vel.clone().normalize());
                    if (life > 3.0) { world.scene.remove(arrowMesh); arrowGeo.dispose(); arrowMat.dispose(); return; }
                    requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            }

            _startFishing() {
                if (this._fishingBobber) {
                    // 2回目クリックで釣り上げ
                    const bobber = this._fishingBobber;
                    this._fishingBobber = null;
                    this._isFishing = false;
                    this.world.scene.remove(bobber.mesh);
                    bobber.mesh.geometry.dispose();
                    // 浮きが水面付近にある場合、魚をドロップ
                    const bx = Math.floor(bobber.mesh.position.x);
                    const by = Math.floor(bobber.mesh.position.y);
                    const bz = Math.floor(bobber.mesh.position.z);
                    const blockAtBobber = this.world.getBlock(bx, by, bz);
                    const blockBelow = this.world.getBlock(bx, by - 1, bz);
                    if ((blockAtBobber === BLOCKS.WATER || blockBelow === BLOCKS.WATER) && bobber.biting) {
                        SoundManager.playSplash();
                        this.ui.addItem(BLOCKS.RAW_FISH, 1);
                        this.ui.render();
                        // 釣り竿耐久値消費
                        const rodItem = this.ui.inv[this.ui.hotbarIdx];
                        if (rodItem && PROPS[rodItem.id].tool === 'fishing_rod') {
                            if (rodItem.dur === undefined) rodItem.dur = PROPS[rodItem.id].maxDur;
                            rodItem.dur--;
                            if (rodItem.dur <= 0) this.ui.inv[this.ui.hotbarIdx] = null;
                            this.ui.render();
                        }
                    }
                    if (bobber.line) { this.camera.remove(bobber.line); bobber.line.geometry.dispose(); }
                    return;
                }
                // 浮きを発射
                const dir = new THREE.Vector3();
                this.camera.getWorldDirection(dir);
                const bobberGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
                const bobberMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
                const bobberMesh = new THREE.Mesh(bobberGeo, bobberMat);
                bobberMesh.position.copy(this.camera.position).addScaledVector(dir, 1.2);
                this.world.scene.add(bobberMesh);
                const vel = dir.clone().multiplyScalar(10);
                vel.y += 2;
                const bobberObj = { mesh: bobberMesh, vel, settled: false, biting: false, biteTimer: 2 + Math.random() * 4, line: null };
                this._fishingBobber = bobberObj;
                this._isFishing = true;
                SoundManager.playFishCast();

                // 釣り糸（LineSegments）
                const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0.3,-0.25,-0.5), new THREE.Vector3(0,0,-1)]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xdddddd });
                const lineMesh = new THREE.Line(lineGeo, lineMat);
                lineMesh.renderOrder = 999;
                this.camera.add(lineMesh);
                bobberObj.line = lineMesh;
            }

            _updateFishing(delta) {
                if (!this._fishingBobber) return;
                const b = this._fishingBobber;
                if (!b.settled) {
                    b.vel.y -= 15 * delta;
                    b.mesh.position.addScaledVector(b.vel, delta);
                    // 水面に触れたら停止
                    const bx = Math.floor(b.mesh.position.x);
                    const by = Math.floor(b.mesh.position.y);
                    const bz = Math.floor(b.mesh.position.z);
                    const blockAt = this.world.getBlock(bx, by, bz);
                    const blockBelow = this.world.getBlock(bx, by - 1, bz);
                    if (blockAt === BLOCKS.WATER || blockBelow === BLOCKS.WATER) {
                        b.settled = true;
                        b.vel.set(0, 0, 0);
                        // 水面のY座標に合わせる
                        b.mesh.position.y = Math.floor(b.mesh.position.y) + 0.6;
                    } else if (b.mesh.position.y < this.camera.position.y - 20) {
                        // 落ちすぎたら削除
                        this.world.scene.remove(b.mesh);
                        b.mesh.geometry.dispose();
                        if (b.line) { this.camera.remove(b.line); b.line.geometry.dispose(); }
                        this._fishingBobber = null;
                        this._isFishing = false;
                        return;
                    }
                } else {
                    // 浮きが水中に定着
                    b.biteTimer -= delta;
                    // プカプカ揺れる
                    b.mesh.position.y += Math.sin(performance.now() * 0.003) * 0.002;
                    if (b.biteTimer <= 0 && !b.biting) {
                        b.biting = true;
                        SoundManager.playFishBite();
                        // 浮きを一瞬沈める
                        b.mesh.position.y -= 0.3;
                    }
                }
                // 釣り糸の終端を浮きに合わせる
                if (b.line) {
                    const worldPos = new THREE.Vector3();
                    b.mesh.getWorldPosition(worldPos);
                    // ローカル座標へ変換
                    const localPos = this.camera.worldToLocal(worldPos.clone());
                    const pts = [new THREE.Vector3(0.3, -0.25, -0.5), localPos];
                    b.line.geometry.setFromPoints(pts);
                }
            }

            spawnDrop(pos, id, count, hasVelocity = false) {
                for(let c=0; c<count; c++) {
                    const geo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
                    const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ 
                        map: getTexture(id), transparent: true, alphaTest: 0.1 
                    }));
                    mesh.position.copy(pos);
                    
                    let vel = new THREE.Vector3(0,0,0);
                    if(hasVelocity) {
                        vel = this.camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(8);
                        vel.y += 2 + Math.random()*2;
                        vel.x += (Math.random()-0.5)*2; vel.z += (Math.random()-0.5)*2;
                    }
                    this.world.scene.add(mesh);
                    this.drops.push({ mesh, id, vel, pickupDelay: hasVelocity ? 1.0 : 0, age: 0 });
                }
            }

            updateDrops(delta) {
                const playerBase = this.camera.position.clone();
                playerBase.y -= CAM_H - (PLAYER_H/2);

                for(let i = this.drops.length - 1; i >= 0; i--) {
                    const d = this.drops[i];
                    
                    d.age += delta;
                    if (d.age > 300) { 
                        this.world.scene.remove(d.mesh);
                        d.mesh.geometry.dispose(); d.mesh.material.dispose();
                        this.drops.splice(i, 1);
                        continue;
                    }

                    if(d.vel.lengthSq() > 0.001) {
                        d.vel.y -= GRAVITY * delta;
                        d.mesh.position.addScaledVector(d.vel, delta);
                        let blockY = Math.floor(d.mesh.position.y);
                        const bId = this.world.getBlock(d.mesh.position.x, blockY, d.mesh.position.z);
                        if(bId !== BLOCKS.AIR && !PROPS[bId].isLiquid) {
                            d.mesh.position.y = blockY + 1.15;
                            d.vel.set(0,0,0);
                        } else if (PROPS[bId].isLiquid) {
                            d.vel.y *= 0.5;
                        }
                    }

                    d.mesh.rotation.y += delta * 3;
                    if(d.pickupDelay > 0) d.pickupDelay -= delta;
                    
                    const dist = d.mesh.position.distanceTo(playerBase);
                    if(dist < 2.5 && d.pickupDelay <= 0 && this.health > 0) {
                        d.mesh.position.lerp(playerBase, 0.2); 
                        if (dist < 1.2) { 
                            if (this.ui.addItem(d.id, 1)) {
                                SoundManager.playPickup();
                                this.world.scene.remove(d.mesh);
                                d.mesh.geometry.dispose(); d.mesh.material.dispose();
                                this.drops.splice(i, 1);
                            }
                        }
                    }
                }
            }
        }

            isLog(id) { return [BLOCKS.WOOD, BLOCKS.BIRCH_LOG, BLOCKS.ACACIA_LOG, BLOCKS.JUNGLE_LOG].includes(id); }

            initStatusIcons() {
                const drawIcon = (color, inner) => {
                    const c = document.createElement('canvas'); c.width = 16; c.height = 16;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#000'; ctx.fillRect(1,2,14,12); ctx.fillRect(2,1,12,14);

                    if(inner) { ctx.fillStyle = inner; ctx.fillRect(4,4,4,4); }
                    return c.toDataURL();
                };
                this.heartTex = drawIcon('#ff0000', '#ff9999');
                this.heartEmptyTex = drawIcon('#333333');
                this.foodTex = drawIcon('#8b4513', '#d2691e');
                this.foodEmptyTex = drawIcon('#333333');
                this.bubbleTex = drawIcon('#33ccff', '#ccffff');
                this.bubbleEmptyTex = drawIcon('#114466');

                const c = document.createElement('canvas'); c.width = 16; c.height = 16;

                ctx.fillStyle = '#888'; ctx.fillRect(4,3,8,10);
                this.armorTex = c.toDataURL();
                ctx.fillStyle = '#333'; ctx.fillRect(4,3,8,10);
                this.armorEmptyTex = c.toDataURL();
            }

            loadInv(worldId, mode) {
                this.mode = mode;
                const saved = JSON.parse(localStorage.getItem(`voxel_world_${worldId}_inv`) || 'null');
                const savedOffhand = JSON.parse(localStorage.getItem(`voxel_world_${worldId}_offhand`) || 'null');
                const raw = saved || [];
                this.inv = Array(84).fill(null).map((v, i) => (raw[i] !== undefined ? raw[i] : null));
                if (savedOffhand) this.inv[79] = savedOffhand;
                
                document.getElementById('creative-panel').style.display = mode === 'creative' ? 'block' : 'none';
                document.getElementById('recipe-panel').style.display = mode === 'survival' ? 'block' : 'none';
                document.getElementById('status-bars').style.display = mode === 'creative' ? 'none' : 'flex';
                if(mode === 'creative') this.buildCreativePanel();
                
                this.isCraftTable = false;
                this.isFurnace = false;
                this.furnacePos = null;
                this.isChest = false;
                this.chestPos = null;
                document.getElementById('chest-panel').style.display = 'none';

                for(let i=40; i<49; i++) c3x3.appendChild(mkSlot(i));

            openFurnace(blockPos) {
                const [bx, by, bz] = blockPos.split(',').map(Number);
                const safePos = `${Math.floor(bx)},${Math.floor(by)},${Math.floor(bz)}`;
                this.isFurnace = true;
                this.furnacePos = safePos;
                let ent = this.worldObj.blockEntities.get(safePos);
                if (!ent) {
                    ent = { progress: 0, fuel: 0, maxFuel: 0, input: null, output: null, fuelSlot: null };
                    this.worldObj.blockEntities.set(safePos, ent);
                }
                this.inv[50] = ent.input;
                this.inv[51] = ent.fuelSlot;
                this.inv[52] = ent.output;
                this.toggleInv(true);
            }

            closeFurnace() {
                const ent = this.worldObj.blockEntities.get(this.furnacePos);
                if (ent) {
                    ent.input = this.inv[50];
                    ent.fuelSlot = this.inv[51];
                    ent.output = this.inv[52];
                    this.worldObj.saveMods();
                }
                this.isFurnace = false;
                this.furnacePos = null;
                this.inv[50] = this.inv[51] = this.inv[52] = null;
            }

            openChest(blockPos) {
                const [bx, by, bz] = blockPos.split(',').map(Number);
                const safePos = `${Math.floor(bx)},${Math.floor(by)},${Math.floor(bz)}`;
                this.isChest = true;
                this.chestPos = safePos;
                let ent = this.worldObj.blockEntities.get(safePos);
                if (!ent || !ent.isChest) {
                    ent = { isChest: true, items: Array(27).fill(null) };
                    this.worldObj.blockEntities.set(safePos, ent);

                for(let i=0; i<27; i++) this.inv[53+i] = ent.items[i] || null;

                if (ent) {
                    for(let i=0; i<27; i++) ent.items[i] = this.inv[53+i] || null;
                    this.worldObj.saveMods();

                    if(this.inv[i] && !this.inv[i].ghost) {
                        if (!this.addItem(this.inv[i].id, this.inv[i].count, this.inv[i])) {
                            app.player.spawnDrop(app.player.camera.position.clone(), this.inv[i].id, this.inv[i].count, true);
                        }

                    this.inv[i] = null;
                }
