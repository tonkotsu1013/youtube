<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Craft v3 - Advanced</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.9); font-size: 24px; text-shadow: 1px 1px 0 #000; }
        #debug-stats { position: absolute; top: 10px; left: 10px; color: white; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px black; background: rgba(0,0,0,0.5); padding: 10px; line-height: 1.5; }
        #biome-text { position: absolute; top: 10px; right: 10px; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 10; font-family: sans-serif; pointer-events: none; text-align: right; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; pointer-events: auto; }
        .btn { padding: 15px 40px; margin: 10px; background: #444; border: 3px solid #ccc; color: white; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.1s; }
        .btn:hover { background: #666; border-color: #fff; transform: scale(1.05); }
        
        #status-bars { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; max-width: 384px; padding: 0 10px; box-sizing: border-box; }
        .status-row { display: flex; justify-content: space-between; width: 100%; }
        .bar-container { display: flex; gap: 2px; }
        .status-icon { width: 16px; height: 16px; image-rendering: pixelated; }

        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(0,0,0,0.6); padding: 6px; border: 2px solid #222; pointer-events: auto; max-width: 95vw; overflow-x: auto; }
        .slot { width: 44px; height: 44px; background: #8b8b8b; border: 2px solid #373737; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: inset -2px -2px 0px rgba(0,0,0,0.3), inset 2px 2px 0px rgba(255,255,255,0.5); flex-shrink: 0; }
        .slot.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .slot img { width: 32px; height: 32px; image-rendering: pixelated; pointer-events: none; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 0 #000; pointer-events: none; }

        #inventory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-start; padding-top: 5vh; gap: 2vw; pointer-events: auto; z-index: 500; flex-wrap: wrap; overflow-y: auto;}
        .panel { background: #c6c6c6; border: 4px solid #555; padding: 20px; box-shadow: 10px 10px 0 rgba(0,0,0,0.5); position: relative; max-width: 95vw; }
        
        #creative-panel { display: none; width: 150px; max-height: 50vh; overflow-y: auto; background: #b0b0b0; border: 4px solid #555; padding: 10px; }
        .creative-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }

        #recipe-panel { display: none; width: 160px; max-height: 60vh; overflow-y: auto; background: #a0a0a0; border: 4px solid #555; padding: 10px; }
        .recipe-item { display: flex; align-items: center; gap: 10px; padding: 5px; cursor: pointer; border: 2px solid transparent; }
        .recipe-item:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
        .recipe-item img { width: 32px; height: 32px; image-rendering: pixelated; }
        .recipe-name { font-size: 12px; font-weight: bold; color: #333; }
        .recipe-missing { color: #a00 !important; }
        .recipe-missing img { filter: grayscale(100%) brightness(50%); }
        
        .inv-title { color: #333; margin-bottom: 10px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; }
        .grid-9x3 { display: grid; grid-template-columns: repeat(9, 48px); gap: 4px; margin-bottom: 15px; }
        .craft-area { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; padding: 15px; background: #a0a0a0; border: 2px inset #777; flex-wrap: wrap; }
        .grid-2x2 { display: grid; grid-template-columns: repeat(2, 48px); gap: 4px; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 48px); gap: 4px; display: none; }
        
        #trash-slot { background: #a65353; border-color: #552222; margin-left: auto; }
        #trash-slot::after { content: '🗑️'; font-size: 24px; position: absolute; }
        
        #progress-container { position: absolute; top: 55%; left: 50%; transform: translateX(-50%); width: 160px; height: 12px; background: rgba(0,0,0,0.6); border: 2px solid #fff; display: none; box-shadow: 0 0 5px #000; }
        #progress-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.05s linear; }
        
        #damage-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.4); z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        
        #tooltip { position: fixed; background: rgba(16, 16, 16, 0.95); color: #fff; padding: 6px 10px; font-family: sans-serif; font-size: 14px; font-weight: bold; border: 2px solid #4a148c; pointer-events: none; z-index: 9999; display: none; text-shadow: 1px 1px 0 #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        #cursor-item { position: fixed; pointer-events: none; z-index: 10000; display: none; width: 44px; height: 44px; justify-content: center; align-items: center; transform: translate(-50%, -50%); }
        #cursor-item img { width: 32px; height: 32px; image-rendering: pixelated; }
        
        .lang-select { padding: 10px; font-size: 18px; background: #222; color: #fff; border: 2px solid #aaa; cursor: pointer; }
        
        .world-item { width: 100%; background: rgba(255,255,255,0.1); border: 2px solid #ccc; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.1s; }
        .world-item:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
        .world-item h3 { margin: 0 0 5px 0; font-size: 24px; }
        .world-item p { margin: 0; color: #aaa; font-size: 14px; }

        @media (max-width: 600px) {
            .grid-9x3 { grid-template-columns: repeat(5, 48px); }
            .grid-9x3.hotbar-inv-row { grid-template-columns: repeat(9, 48px); overflow-x: auto; display: flex; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="damage-overlay"></div>
    <div id="shield-overlay" style="position:fixed;left:0;bottom:0;width:45%;height:52%;background:rgba(0,0,0,0.82);pointer-events:none;display:none;z-index:8;border-top-right-radius:8px;"></div>
    <div id="sleep-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;opacity:0;pointer-events:none;z-index:900;transition:opacity 1s;display:flex;flex-direction:column;justify-content:center;align-items:center;">
        <div id="sleep-text" style="color:#fff;font-size:48px;font-weight:bold;text-shadow:2px 2px 0 #333;opacity:0;transition:opacity 0.5s 0.8s;font-family:'Courier New',monospace;">おやすみなさい 💤</div>
    </div>
    <div id="ui-layer">
        <div id="crosshair">+</div>
        <div id="debug-stats">X: 0<br>Y: 0<br>Z: 0<br>FPS: 0</div>
        <div id="biome-text">PLAINS</div>
        
        <div id="status-bars">
            <div class="status-row" style="justify-content: space-between; margin-bottom: -15px;">
                <div id="armor-bar" class="bar-container"></div>
                <div id="breath-bar" class="bar-container"></div>
            </div>
            <div class="status-row">
                <div id="health-bar" class="bar-container"></div>
                <div id="hunger-bar" class="bar-container"></div>
            </div>
        </div>

        <div id="offhand-slot-container" style="position:absolute; bottom:20px; left:calc(50% - 260px); display:flex; align-items:center; gap:4px; background:rgba(0,0,0,0.6); padding:6px; border:2px solid #555;">
            <div style="color:white;font-size:9px;text-align:center;width:44px;margin-bottom:-2px;text-shadow:1px 1px 0 #000;">副手(F)</div>
            <div id="offhand-slot" class="slot" style="border-color:#888; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.3);"></div>
        </div>
        <div id="hotbar"></div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="nether-indicator" style="display:none;position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(100,0,0,0.85);color:#ff6633;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;padding:4px 14px;border:2px solid #ff3300;border-radius:4px;z-index:200;text-shadow:0 0 8px #ff2200;pointer-events:none;">🔥 THE NETHER 🔥</div>
        <div id="portal-hint" style="display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#aa88ff;font-family:'Courier New',monospace;font-size:11px;padding:5px 12px;border:1px solid #6600cc;border-radius:4px;z-index:200;pointer-events:none;text-align:center;">⬛ 黒曜石で4×5のフレームを作り（内部は空にする）、🔥 火打石と打ち金で起動</div>
    </div>
    
    <div id="tooltip"></div>
    <div id="cursor-item"><img src=""><div class="count"></div></div>

    <div id="menu" class="overlay">
        <h1 style="font-size: 56px; text-shadow: 4px 4px 0 #333; margin-bottom: 20px; text-align: center;">VOXEL CRAFT v3</h1>
        <div style="margin-bottom: 20px;">
            <select id="lang-toggle" class="lang-select">
                <option value="ja">日本語 (Japanese)</option>
                <option value="en">English</option>
            </select>
        </div>
        <p id="loading-msg" style="display:none; font-size: 24px; font-weight:bold; color:#ffd700;">Generating World...</p>
        
        <div id="world-selection" style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px;">
            <div id="world-list" style="width: 100%; max-height: 40vh; overflow-y: auto; margin-bottom: 20px; padding: 10px;"></div>
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <button class="btn" onclick="app.showNewWorldForm()">新規ワールド作成</button>
                <button class="btn" style="background:#822;" onclick="app.resetAllData()">全データ削除</button>
            </div>
        </div>

        <div id="new-world-form" style="display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; gap: 15px;">
            <h2>新規ワールド</h2>
            <input type="text" id="nw-name" placeholder="ワールド名を入力..." style="width: 100%; padding: 10px; font-size: 18px; border: 2px solid #ccc; background: #333; color: white;">
            <select id="nw-mode" style="width: 100%; padding: 10px; font-size: 18px; border: 2px solid #ccc; background: #333; color: white;">
                <option value="survival">サバイバルモード</option>
                <option value="creative">クリエイティブモード</option>
            </select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" onclick="app.createNewWorld()">作成して開始</button>
                <button class="btn" style="background: #666;" onclick="app.hideNewWorldForm()">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="pause-menu" class="overlay" style="display: none; background: rgba(0,0,0,0.6);">
        <h2 id="pause-title" style="font-size: 40px; margin-bottom: 30px;">PAUSED</h2>
        <button id="resume-btn" class="btn" onclick="app.resumeGame()">ゲームに戻る</button>
        <button id="respawn-btn" class="btn" style="display:none; background:#822;" onclick="app.respawn()">リスポーン</button>

                                <div id="furnace-fuel-container"></div>
                            </div>
                            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px;">

                    <div id="hotbar-inv" class="grid-9x3 hotbar-inv-row" style="grid-template-rows: 1fr;"></div>
                </div>
            </div>
        </div>
    </div>

                // ランダムなノイズを加えてテクスチャっぽく
                const baseR = parseInt(propColor.slice(1,3), 16);
                const baseG = parseInt(propColor.slice(3,5), 16);
                const baseB = parseInt(propColor.slice(5,7), 16);
                for (let py = 0; py < 16; py++) {
                    for (let px = 0; px < 16; px++) {
                        const n = (((px * 374761393 + py * 668265263) ^ (id * 1274126177)) & 0x7fffffff) % 40 - 20;
                        const r2 = Math.max(0, Math.min(255, baseR + n));
                        const g2 = Math.max(0, Math.min(255, baseG + n));
                        const b2 = Math.max(0, Math.min(255, baseB + n));
                        ctx.fillStyle = `rgb(${r2},${g2},${b2})`;
                        ctx.fillRect(px, py, 1, 1);
                    }
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            TEX_CACHE[id] = tex;
            return tex;
        }

        class World {
            constructor(scene) {
                this.scene = scene;
                this.chunks = new Map();
                this.materials = {};
                this.mods = new Map(); 
                this.blockEntities = new Map(); 
                this.worldId = null;
                this.seed = 0;
                this.chunkBuildQueue = []; 
                this.openDoors = new Set(); 
                this.doorFacing = new Map(); 
                this.stairFacing = new Map(); 
                
                Object.keys(PROPS).forEach(id => {
                    const iid = parseInt(id);
                    const p = PROPS[iid];
                    if (!p) return;
                    const isPlantable = iid === BLOCKS.WHEAT_SEEDS || iid === BLOCKS.CARROT || iid === BLOCKS.POTATO || iid === BLOCKS.SAPLING;
                    // アイテム専用（isItem=true かつ block IDとして配置不可）はスキップ
                    if (p.isItem && !isPlantable) return;
                    this.materials[iid] = getBlockMaterials(iid);
                });
            }
            
            updateBlockEntities(delta) {
                this.blockEntities.forEach((ent, pos) => {
                    if (ent.fuel !== undefined) { 
                        let isBurning = ent.fuel > 0;
                        if (isBurning) ent.fuel -= delta;

                        const resId = ent.input ? FURNACE_RECIPES[ent.input.id] : null;
                        const canSmelt = resId && (!ent.output || (ent.output.id === resId && ent.output.count < 64));

                        if (!isBurning && canSmelt && ent.fuelSlot && PROPS[ent.fuelSlot.id] && PROPS[ent.fuelSlot.id].fuelValue) {
                            ent.maxFuel = PROPS[ent.fuelSlot.id].fuelValue;
                            ent.fuel = ent.maxFuel;
                            ent.fuelSlot.count--;
                            if (ent.fuelSlot.count <= 0) ent.fuelSlot = null;
                            isBurning = true;
                        }

                        if (isBurning && canSmelt) {
                            ent.progress += delta * 10; 
                            if (ent.progress >= 100) {
                                ent.progress = 0;
                                ent.input.count--;
                                if (ent.input.count <= 0) ent.input = null;
                                if (ent.output) ent.output.count++;
                                else ent.output = { id: resId, count: 1 };
                            }
                        } else {
                            ent.progress = 0;
                        }
                        
                        if (window.app && app.ui.isOpen && app.ui.isFurnace && app.ui.furnacePos === pos) {
                            app.ui.inv[50] = ent.input;
                            app.ui.inv[51] = ent.fuelSlot;
                            app.ui.inv[52] = ent.output;
                            app.ui.renderFurnaceProgress(ent.progress, ent.fuel, ent.maxFuel);
                            app.ui.render();
                        }
                    }
                    if (ent.isCrop) {
                        const currentId = this.getBlock(ent.x, ent.y, ent.z);
                        // ブロックが作物でなくなっていたらエンティティを削除（TNT爆発等で消えた場合）
                        const validCropIds = new Set([
                            BLOCKS.WHEAT_SEEDS, BLOCKS.WHEAT_STAGE2, BLOCKS.WHEAT_STAGE3,
                            BLOCKS.CARROT_STAGE1, BLOCKS.CARROT_STAGE2,
                            BLOCKS.POTATO_STAGE1, BLOCKS.POTATO_STAGE2
                        ]);
                        if (!validCropIds.has(currentId)) {
                            this.blockEntities.delete(pos);
                            return;
                        }
                        ent.growth += delta;
                        // 小麦
                        if (ent.growth > 300 && currentId === BLOCKS.WHEAT_STAGE3) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.WHEAT_CROP);
                            this.blockEntities.delete(pos);
                        } else if (ent.growth > 200 && currentId === BLOCKS.WHEAT_STAGE2) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.WHEAT_STAGE3);
                            ent.growth = 200; // 段階リセット（次ステージのしきい値まで蓄積継続）
                        } else if (ent.growth > 100 && currentId === BLOCKS.WHEAT_SEEDS) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.WHEAT_STAGE2);
                            ent.growth = 100; // 段階リセット
                        }
                        // ニンジン
                        else if (ent.growth > 300 && currentId === BLOCKS.CARROT_STAGE2) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.CARROT_CROP);
                            this.blockEntities.delete(pos);
                        } else if (ent.growth > 150 && currentId === BLOCKS.CARROT_STAGE1) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.CARROT_STAGE2);
                            ent.growth = 150;
                        }
                        // ジャガイモ
                        else if (ent.growth > 300 && currentId === BLOCKS.POTATO_STAGE2) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.POTATO_CROP);
                            this.blockEntities.delete(pos);
                        } else if (ent.growth > 150 && currentId === BLOCKS.POTATO_STAGE1) {
                            this.setBlock(ent.x, ent.y, ent.z, BLOCKS.POTATO_STAGE2);
                            ent.growth = 150;
                        }
                    }
                });
            }

            initWorld(worldId, seed) {
                this.worldId = worldId;
                this.seed = seed;
                
                const prng = lcg(this.seed);
                this.noise = createNoise2D(prng);
                this.biomeNoise = createNoise2D(prng);
                this.oreNoise = createNoise2D(prng);
                this.oreNoise3D = createNoise3D(prng);
                this.caveNoise = createNoise3D(prng);
                this.hugeCaveNoise = createNoise3D(prng);

                const savedMods = JSON.parse(localStorage.getItem(`voxel_world_${this.worldId}_mods`) || '[]'); 
                this.mods = new Map(savedMods);
                
                const savedEntities = JSON.parse(localStorage.getItem(`voxel_world_${this.worldId}_entities`) || '[]');
                this.blockEntities = new Map(savedEntities);

                const savedOpenDoors = JSON.parse(localStorage.getItem(`voxel_world_${this.worldId}_openDoors`) || '[]');
                this.openDoors = new Set(savedOpenDoors);
                const savedDoorFacing = JSON.parse(localStorage.getItem(`voxel_world_${this.worldId}_doorFacing`) || '[]');
                this.doorFacing = new Map(savedDoorFacing);
                const savedStairFacing = JSON.parse(localStorage.getItem(`voxel_world_${this.worldId}_stairFacing`) || '[]');
                this.stairFacing = new Map(savedStairFacing);
                
                this.chunkBuildQueue = [];
                for (const [k, chunk] of this.chunks.entries()) {
                    Object.values(chunk.meshes).forEach(m => { this.scene.remove(m); m.geometry.dispose(); });
                }
                this.chunks.clear();
                
                if (savedMods.length === 0) {
                    setTimeout(() => this._placeVillageFurniture(), 500);
                }
            }

            saveMods() { 
                if(this.worldId) {
                    localStorage.setItem(`voxel_world_${this.worldId}_mods`, JSON.stringify(Array.from(this.mods.entries())));
                    localStorage.setItem(`voxel_world_${this.worldId}_entities`, JSON.stringify(Array.from(this.blockEntities.entries())));
                    localStorage.setItem(`voxel_world_${this.worldId}_openDoors`, JSON.stringify(Array.from(this.openDoors)));
                    localStorage.setItem(`voxel_world_${this.worldId}_doorFacing`, JSON.stringify(Array.from(this.doorFacing.entries())));
                    localStorage.setItem(`voxel_world_${this.worldId}_stairFacing`, JSON.stringify(Array.from(this.stairFacing.entries())));
                }
            }
            
            _placeVillageFurniture() {
                const vGrid = 180;
                for (let vgx = -1; vgx <= 1; vgx++) {
                    for (let vgz = -1; vgz <= 1; vgz++) {
                        const vx = vgx * vGrid + 90;
                        const vz = vgz * vGrid + 90;
                        const vNoiseVal = this.biomeNoise((vx + this.seed*12.345) * 0.03, (vz + this.seed*67.891) * 0.03);
                        if (vNoiseVal <= -0.7) continue;
                        
                        const vseed = (((vx * 374761393) ^ (vz * 668265263) ^ (this.seed | 0)) >>> 0);
                        const vlcg = lcg(vseed);
                        const vOffX = Math.floor((vlcg() - 0.5) * 30);
                        const vOffZ = Math.floor((vlcg() - 0.5) * 30);
                        const cvx = vx + vOffX;
                        const cvz = vz + vOffZ;
                        
                        const getSurface = (x, z) => this.getTerrainSurface(x, z);
                        const surf = getSurface(cvx, cvz);
                        if (surf < SEA_LEVEL) continue;
                        
                        const registerDoor = (x, y, z, facing = 'z') => {
                            const k = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
                            this.doorFacing.set(k, facing);
                        };
                        registerDoor(cvx - 10 + 4, surf + 1, cvz - 10 + 9); 
                        registerDoor(cvx + 4 + 5, surf + 1, cvz - 14 + 10); 
                        registerDoor(cvx - 14 + 3, surf + 1, cvz + 5 + 7);  
                        registerDoor(cvx + 6 + 4, surf + 1, cvz + 6);       
                        registerDoor(cvx - 5 + 4, surf + 1, cvz - 22 + 8);  
                        registerDoor(cvx + 18 + 4, surf + 1, cvz - 6 + 9);  
                        
                        const s1 = getSurface(cvx - 10 + 5, cvz - 10 + 5);
                        this._placeBed(cvx - 10 + 2, s1 + 1, cvz - 10 + 2);
                        this._placeChest(cvx - 10 + 7, s1 + 1, cvz - 10 + 2, 'house');
                        
                        const s2 = getSurface(cvx + 4 + 5, cvz - 14 + 5);
                        this._placeBed(cvx + 4 + 2, s2 + 1, cvz - 14 + 2);
                        this._placeBed(cvx + 4 + 8, s2 + 1, cvz - 14 + 2);
                        this._placeChest(cvx + 4 + 9, s2 + 1, cvz - 14 + 7, 'house');
                        
                        const s3 = getSurface(cvx - 14 + 3, cvz + 5 + 3);
                        this._placeBed(cvx - 14 + 1, s3 + 1, cvz + 5 + 2);
                        this._placeChest(cvx - 14 + 5, s3 + 1, cvz + 5 + 2, 'house');
                        
                        const s4 = getSurface(cvx + 6 + 5, cvz + 6 + 4);
                        this._placeBed(cvx + 6 + 2, s4 + 1, cvz + 6 + 2);
                        this._placeChest(cvx + 6 + 8, s4 + 1, cvz + 6 + 2, 'house');
                        
                        const s5 = getSurface(cvx - 5 + 5, cvz - 22 + 4);
                        this._placeBed(cvx - 5 + 2, s5 + 1, cvz - 22 + 2);
                        this._placeBed(cvx - 5 + 7, s5 + 1, cvz - 22 + 2);
                        this._placeChest(cvx - 5 + 8, s5 + 1, cvz - 22 + 6, 'house');
                        
                        const ssm = getSurface(cvx + 18 + 5, cvz - 6 + 4);
                        this.setBlock(cvx + 18 + 2, ssm + 1, cvz - 6 + 2, BLOCKS.FURNACE);
                        this.setBlock(cvx + 18 + 3, ssm + 1, cvz - 6 + 2, BLOCKS.FURNACE);
                        this._placeChest(cvx + 18 + 8, ssm + 1, cvz - 6 + 2, 'smith');
                        this._placeChest(cvx + 18 + 8, ssm + 1, cvz - 6 + 6, 'smith');

                        for(let i=0; i<3; i++) {
                            const hx = cvx - 16 + Math.floor(Math.random()*6);
                            const hz = cvz - 5 + Math.floor(Math.random()*6);
                            const hsy = getSurface(hx, hz);
                            this.setBlock(hx, hsy+1, hz, BLOCKS.HAY_BLOCK);
                        }
                        
                        if (window.app && app.entityManager) {
                            const positions = [
                                [cvx - 6, cvz - 6], [cvx + 8, cvz - 10], [cvx - 10, cvz + 8],
                                [cvx + 10, cvz + 9], [cvx - 2, cvz - 18]
                            ];
                            positions.forEach(([vvx, vvz]) => {
                                const svs = getSurface(Math.floor(vvx), Math.floor(vvz));
                                if (svs >= SEA_LEVEL) app.entityManager.spawn('VILLAGER', vvx, svs + 1.5, vvz);
                            });
                        }
                    }
                }
                this.saveMods();
            }
            
            _placeBed(x, y, z) {
                const fx = Math.floor(x), fy = Math.floor(y), fz = Math.floor(z);
                this.mods.set(`${fx},${fy},${fz}`, BLOCKS.BED);
                this.mods.set(`${fx},${fy},${fz+1}`, BLOCKS.BED_HEAD);
            }
            
            _placeChest(x, y, z, type) {
                const fx = Math.floor(x), fy = Math.floor(y), fz = Math.floor(z);
                const k = `${fx},${fy},${fz}`;
                this.mods.set(k, BLOCKS.CHEST);
                
                const items = Array(27).fill(null);
                if (type === 'house') {
                    items[0] = { id: BLOCKS.BREAD, count: 3 + Math.floor(Math.random()*5) };
                    items[1] = { id: BLOCKS.WHEAT, count: 5 + Math.floor(Math.random()*8) };
                    items[2] = { id: BLOCKS.CARROT, count: 3 + Math.floor(Math.random()*6) };
                    if (Math.random() > 0.5) items[3] = { id: BLOCKS.COAL, count: 2 + Math.floor(Math.random()*4) };
                    if (Math.random() > 0.7) items[4] = { id: BLOCKS.W_PICK, count: 1 };
                    if (Math.random() > 0.8) items[5] = { id: BLOCKS.IRON_INGOT, count: 1 + Math.floor(Math.random()*3) };
                } else { 
                    items[0] = { id: BLOCKS.IRON_INGOT, count: 3 + Math.floor(Math.random()*5) };
                    items[1] = { id: BLOCKS.IRON_ORE, count: 4 + Math.floor(Math.random()*6) };
                    items[2] = { id: BLOCKS.COAL, count: 5 + Math.floor(Math.random()*5) };
                    items[3] = { id: BLOCKS.GOLD_INGOT, count: 1 + Math.floor(Math.random()*2) };
                    if (Math.random() > 0.5) items[4] = { id: BLOCKS.I_SWORD, count: 1 };
                    if (Math.random() > 0.6) items[5] = { id: BLOCKS.I_PICK, count: 1 };
                    if (Math.random() > 0.7) items[6] = { id: BLOCKS.DIAMOND, count: Math.floor(Math.random()*2) + 1 };
                    items[7] = { id: BLOCKS.STONE_BRICK, count: 8 + Math.floor(Math.random()*8) };
                    items[8] = { id: BLOCKS.BREAD, count: 2 + Math.floor(Math.random()*3) };
                }
                this.blockEntities.set(k, { isChest: true, items });
            }
            
            getBiomeData(x, z) {
                const nx = x + this.seed * 12.345;
                const nz = z + this.seed * 67.891;
                
                const biomeVal  = this.biomeNoise(nx * 0.002, nz * 0.002);
                const biomeVal2 = this.biomeNoise(nx * 0.0015 + 500, nz * 0.0015 + 500);
                const mVal = this.noise(nx * 0.015, nz * 0.015);
                
                let bType = 'PLAINS';
                let baseAmp = 2;
                
                if (biomeVal < -0.45) {
                    bType = 'DESERT'; baseAmp = 8;
                } else if (biomeVal < -0.15) {
                    bType = 'SAVANNA'; baseAmp = 4;  
                } else if (biomeVal > 0.45) {
                    bType = 'JUNGLE'; baseAmp = 5;   
                } else if (biomeVal > 0.15) {
                    if (biomeVal2 > 0.2) {
                        bType = 'BIRCH_FOREST'; baseAmp = 3;
                    } else {
                        bType = 'FOREST'; baseAmp = 2;
                    }
                }
                
                let mBlend = 0;
                if (mVal > 0.4) {
                    bType = 'MOUNTAINS';
                    mBlend = Math.min(1, (mVal - 0.4) * 2.5);
                }
                
                const mAmpRand = Math.abs(Math.sin(nx * 0.0053 + nz * 0.0071));
                const mountainAmp = 10 + mAmpRand * 35;
                let amp = baseAmp * (1 - mBlend) + mountainAmp * mBlend;
                
                return { type: bType, amp, nx, nz, biomeVal };
            }

            _getNetherBlock(x, y, z) {
                // ========================================================
                //  公式Minecraftネザー生成ロジック（Java Edition準拠）
                // ========================================================
                // 構造:
                //   y=0     : ベドロック（常に固体）
                //   y=1-4   : ベドロック床（ランダムギザギザ）
                //   y=5-31  : ネザーラック＋洞窟（洞窟部分は溶岩で充填）
                //   y=31    : 溶岩海面（LAVA_SEA）
                //   y=32-120: 主要プレイエリア（3D密度ノイズで洞窟を刻む）
                //   y=121-127: ベドロック天井（ランダムギザギザ）
                //
                // バイオーム（2Dノイズで地域分割）:
                //   Nether Wastes   : 標準ネザーラック地形
                //   Crimson Forest  : クリムゾンニリウム表面
                //   Warped Forest   : ワープドニリウム表面
                //   Soul Sand Valley: ソウルサンド、バサルト柱
                //   Basalt Deltas   : 黒石・バサルト・マグマブロック

                const LAVA_SEA = 31;
                const NETHER_H = 128;
                const CEIL_START = 121;

                // ── ベドロック床 ──────────────────────────────
                if (y <= 0) return BLOCKS.BEDROCK;
                if (y <= 4) {
                    // ジャギーなベドロック床（公式と同様の確率分布）
                    const bN = (this.noise(x * 0.45 + 100, z * 0.45 + 100) + 1) * 0.5;
                    if (bN < 1.0 - (y * 0.22)) return BLOCKS.BEDROCK;
                }

                // ── ベドロック天井 ────────────────────────────
                if (y >= CEIL_START) {
                    if (y >= 127) return BLOCKS.BEDROCK;
                    const cN = (this.noise(x * 0.45 + 500, z * 0.45 + 500) + 1) * 0.5;
                    if (cN < (y - CEIL_START) * 0.22) return BLOCKS.BEDROCK;
                }

                // ── 3D密度関数（公式ネザーの核心）──────────────
                //
                // Minecraft公式は "density functions" チェーンを使う。
                // ここでは同等の効果を出す近似実装:
                //
                //   density = Σ(各オクターブの3Dノイズ) + verticalBias
                //
                // verticalBias:
                //   - y が低いほど（床付近）正方向→固体になりやすい
                //   - y が高いほど（天井付近）正方向→固体になりやすい
                //   - 中間は0に近い→洞窟が多く開く
                //
                // density > 0 → ネザーラック（固体）
                // density ≤ 0 → 洞窟/空洞（y≤31なら溶岩）
                
                const yNorm = y / NETHER_H;

                // 床・天井への引力（公式のsquash factor）
                // y=32以下と y=100以上で急激に固体化する
                const floorPull = Math.max(0, (32 - y) / 28.0) * 3.5;
                const ceilPull  = Math.max(0, (y - 100) / 22.0) * 3.5;
                const vertBias  = Math.max(floorPull, ceilPull);

                // オクターブ1: 大規模な洞窟形状（公式のmainNoise相当）
                const n1 = this.oreNoise3D(
                    x * 0.022, y * 0.022 * 0.75, z * 0.022
                );
                // オクターブ2: 中規模ディテール（公式のlimitNoise相当）
                const n2 = this.caveNoise(
                    x * 0.045 + 400, y * 0.045 * 0.75 + 400, z * 0.045 + 400
                ) * 0.45;
                // オクターブ3: 大スケール開口部（巨大洞窟・広間）
                const n3 = this.hugeCaveNoise(
                    x * 0.010 + 200, y * 0.010 * 0.6 + 200, z * 0.010 + 200
                );

                // 合計密度: 正→固体、負→空洞
                const density = n1 + n2 + n3 * 0.55 + vertBias - 0.15;

                // スパゲッティ洞窟（細長いトンネル状の空洞）
                // 公式の "noodle caves" / "spaghetti caves" に相当
                const spagN = this.hugeCaveNoise(
                    x * 0.038 + 100, y * 0.048 + 100, z * 0.038 + 100
                );
                const spagN2 = this.oreNoise3D(
                    x * 0.032 + 300, y * 0.040 + 300, z * 0.032 + 300
                );
                // スパゲッティ洞窟の半径: 0 付近のノイズ帯
                const spagRadius = 0.07;
                const inSpaghetti = (Math.abs(spagN) < spagRadius || Math.abs(spagN2) < spagRadius - 0.01)
                                 && y > 5 && y < CEIL_START - 3;

                // チーズ洞窟（大きな球形の空洞）
                // 公式の "cheese caves" に相当
                const cheeseN = this.hugeCaveNoise(
                    x * 0.015 + 650, y * 0.018 + 650, z * 0.015 + 650
                );
                const inCheese = cheeseN < -0.35 && y > LAVA_SEA && y < CEIL_START - 2;

                const isSolid = (density > 0) && !inSpaghetti && !inCheese;

                // 空洞 → 溶岩海以下は溶岩
                if (!isSolid) {
                    return (y <= LAVA_SEA) ? BLOCKS.LAVA : BLOCKS.AIR;
                }

                // ────────────────────────────────────────────────
                // 固体ブロック → バイオームと深度でブロック種を決定
                // ────────────────────────────────────────────────

                // 2Dバイオームノイズ（地域ごとのバイオームを決める）
                // 公式ネザーの5バイオームを2つのノイズ軸で近似
                const bioA = this.biomeNoise(x * 0.0045 + 300, z * 0.0045 + 300);  // -1〜1
                const bioB = this.noise(x * 0.0038 + 700, z * 0.0038 + 700);        // -1〜1

                // ── ソウルサンド谷バイオーム ──
                // bioA < -0.42: 開けた谷地形、ソウルサンド・バサルト柱
                if (bioA < -0.42) {
                    // バサルト柱（y=32〜100に垂直な柱）
                    const colN = this.noise(x * 0.18 + 800, z * 0.18 + 800);
                    if (colN > 0.7 && y >= LAVA_SEA + 1 && y <= 95) return BLOCKS.BASALT;

                    // ソウルサンド（表面と溶岩海沿岸）
                    if (y >= LAVA_SEA - 2 && y <= LAVA_SEA + 5) return BLOCKS.SOUL_SAND;

                    // グロウストーン（天井から垂れ下がる）
                    if (y >= 108 && y < CEIL_START) {
                        const glN = this.oreNoise3D(x * 0.13, y * 0.1, z * 0.13 + 350);
                        if (glN > 0.58) return BLOCKS.GLOWSTONE;
                    }
                    return BLOCKS.SOUL_SAND;
                }

                // ── バサルト台地バイオーム ──

                        const tHash = (((tx * 374761393) ^ (tz * 668265263) ^ ((this.seed * 1000003) | 0)) >>> 0) * 2.3283064365387e-10;
                        if (tHash < 0.75) {
                            const dx = Math.abs(ox - tx), dz = Math.abs(oz - tz);
                            const tH = 6 + Math.floor(tHash * 3); 
                            if (dx === 0 && dz === 0 && y > surface && y <= surface + tH) return BLOCKS.BIRCH_LOG;
                            if (y > surface + tH - 2 && y <= surface + tH + 1 && dx <= 1 && dz <= 1) {
                                if (!(dx === 1 && dz === 1 && y === surface + tH + 1)) {
                                    if (dx === 0 && dz === 0 && y <= surface + tH) return BLOCKS.BIRCH_LOG;
                                    return BLOCKS.BIRCH_LEAVES;
                                }
                            }
                        }
                    }

                    if (bType === 'JUNGLE' && surface >= SEA_LEVEL) {
                        // 竹林
                        const bambooHash = (((Math.floor(ox/2)*374761393) ^ (Math.floor(oz/2)*668265263) ^ ((this.seed*777) | 0)) >>> 0) * 2.3283064365387e-10;
                        if (bambooHash < 0.15 && ox % 2 === 0 && oz % 2 === 0) {
                            const bambooH = 4 + Math.floor(bambooHash * 6);
                            if (y > surface && y <= surface + bambooH) return BLOCKS.BAMBOO;
                        }
                        const treeGrid = 5;
                        const tx = Math.floor(ox / treeGrid) * treeGrid + Math.floor(treeGrid / 2);
                        const tz = Math.floor(oz / treeGrid) * treeGrid + Math.floor(treeGrid / 2);
                        const tHash = (((tx * 374761393) ^ (tz * 668265263) ^ ((this.seed * 1000003) | 0)) >>> 0) * 2.3283064365387e-10;
                        if (tHash < 0.8) {
                            const dx = Math.abs(ox - tx), dz = Math.abs(oz - tz);
                            const tH = 8 + Math.floor(tHash * 6); 
                            const inTrunk = (ox >= tx - 1 && ox <= tx && oz >= tz - 1 && oz <= tz);
                            if (inTrunk && y > surface && y <= surface + tH) return BLOCKS.JUNGLE_LOG;
                            const cx = ox - tx + 0.5, cz = oz - tz + 0.5;
                            const cyUp = y - (surface + tH);
                            const dr = cx*cx + cyUp*cyUp*0.5 + cz*cz;
                            if (dr < 9 && y > surface + tH - 3) {
                                if (!(inTrunk && y <= surface + tH)) return BLOCKS.JUNGLE_LEAVES;
                            }
                        }
                    }

                    if ((bType === 'FOREST' || bType === 'PLAINS') && surface >= SEA_LEVEL) {
                        const treeGrid = bType === 'FOREST' ? 6 : 14;
                        const tx = Math.floor(ox / treeGrid) * treeGrid + Math.floor(treeGrid / 2);
                        const tz = Math.floor(oz / treeGrid) * treeGrid + Math.floor(treeGrid / 2);
                        const treeHash = (((tx * 374761393) ^ (tz * 668265263) ^ ((this.seed * 1000003) | 0)) >>> 0) * 2.3283064365387e-10;
                        const treeThreshold = bType === 'FOREST' ? 0.65 : 0.25;
                        const hasTree = treeHash < treeThreshold;
                        if (hasTree) {
                            const dx = Math.abs(ox - tx);
                            const dz = Math.abs(oz - tz);
                            const tH = 4 + Math.floor(Math.abs(this.noise(tx, tz)) * 2);
                            if (dx === 0 && dz === 0 && y > surface && y <= surface + tH) return BLOCKS.WOOD;
                            if (y > surface + tH - 2 && y <= surface + tH + 1 && dx <= 1 && dz <= 1) {
                                if (!(dx === 1 && dz === 1 && y === surface + tH + 1)) {
                                    if (dx === 0 && dz === 0 && y <= surface + tH) return BLOCKS.WOOD;
                                    return BLOCKS.LEAVES;
                                }
                            }
                        }
                    }
                    return BLOCKS.AIR;
                }
                
                if (y === surface) {
                    if (surface < SEA_LEVEL) return BLOCKS.DIRT;
                    if (bType === 'DESERT') return BLOCKS.SAND;
                    if (bType === 'SAVANNA') return BLOCKS.GRASS; 
                    if (bType === 'MOUNTAINS' && y > SEA_LEVEL + 40) return BLOCKS.STONE;
                    return BLOCKS.GRASS;
                }

                if (y > 2 && y < surface - 1) {
                    // 超巨大洞窟
                    const hc = this.hugeCaveNoise(ox*0.015, y*0.02, oz*0.015);
                    if (hc > 0.65 && y < 60) return y < 10 ? BLOCKS.LAVA : BLOCKS.AIR;

                    const n1 = this.caveNoise(ox * 0.045, y * 0.045, oz * 0.045);
                    const n2 = this.caveNoise(ox * 0.045 + 123.4, y * 0.045 + 456.7, oz * 0.045 + 789.0);
                    const wormDist = n1 * n1 + n2 * n2;

                    const depth = surface - y;
                    const wormThresh = depth > 20 ? 0.09 : (depth > 10 ? 0.055 : 0.028);

                    if (wormDist < wormThresh) {
                        return (y < 10) ? BLOCKS.LAVA : BLOCKS.AIR;
                    }

                    const CAVE_SPACING = 40 * CHUNK_SIZE; 
                    const ecx = Math.round(ox / CAVE_SPACING) * CAVE_SPACING;
                    const ecz = Math.round(oz / CAVE_SPACING) * CAVE_SPACING;

                    const eh1 = (((ecx * 374761393) ^ (ecz * 668265263) ^ ((this.seed * 999983) | 0)) >>> 0) * 2.3283064365387e-10;
                    const eh2 = (((ecx * 668265263) ^ (ecz * 374761393) ^ ((this.seed * 1000033) | 0)) >>> 0) * 2.3283064365387e-10;

                    if (eh1 > 0.1) { 
                        const ex = ecx + Math.floor(eh1 * 30) - 15;
                        const ez = ecz + Math.floor(eh2 * 30) - 15;
                        const ddx = ox - ex, ddz = oz - ez;
                        const dist2D = ddx * ddx + ddz * ddz;

                if (dist2D < 4 && y > 6 && y < surface - 2) return BLOCKS.AIR;
                        if (dist2D < 9 && y >= surface - 5 && y < surface - 2) return BLOCKS.AIR;

                        // 地上への洞窟入り口（煙突）
                        if (dist2D < 4 && y >= surface - 2 && y <= surface) return BLOCKS.AIR;
                    }
                }

                // まれに地上に洞窟入り口を生成
                const ceGrid = 64;
                const cex = Math.floor(ox / ceGrid) * ceGrid + Math.floor(ceGrid / 2);
                const cez = Math.floor(oz / ceGrid) * ceGrid + Math.floor(ceGrid / 2);
                const ceHash = (((cex * 374761393) ^ (cez * 668265263) ^ ((this.seed * 777777) | 0)) >>> 0) * 2.3283064365387e-10;
                if (ceHash < 0.08 && bType !== 'DESERT') {
                    const dcx = ox - cex, dcz = oz - cez;
                    const ceDist = dcx * dcx + dcz * dcz;
                    if (ceDist < 5) {
                        // 地表から下に向かって穴を掘る（深さ8〜15）
                        const ceDepth = 8 + Math.floor(ceHash * 80);
                        if (y >= surface - ceDepth && y <= surface) return BLOCKS.AIR;
                    }
                }

                if (y > surface - 3) return (bType === 'DESERT') ? BLOCKS.SANDSTONE : BLOCKS.DIRT;
                
                const oreNoise = this.oreNoise3D(ox * 0.1, y * 0.1, oz * 0.1);
                
                if (y < 20 && oreNoise > 0.85) return BLOCKS.DIAMOND_ORE; 
                if (y < 40 && oreNoise < -0.80) return BLOCKS.GOLD_ORE;   
                if (y < SEA_LEVEL && Math.abs(oreNoise) < 0.05) return BLOCKS.IRON_ORE; 
                if (y < SEA_LEVEL + 20 && oreNoise > 0.60 && oreNoise <= 0.72) return BLOCKS.COPPER_ORE; 
                if (oreNoise > 0.85 && oreNoise <= 0.92) return BLOCKS.COAL_ORE; // バグ修正: 0.70-0.85→0.85-0.92に変更
                // v4 新鉱石・地層（アメジストはコールとかぶらない範囲）
                if (y < 16 && oreNoise > 0.72 && oreNoise < 0.78) return BLOCKS.AMETHYST_BLOCK;

                // 砂利パッチ（地下中層）
                const gravelNoise = this.oreNoise3D(ox * 0.08, y * 0.08, oz * 0.08 + 99);
                if (y > 40 && y < SEA_LEVEL + 10 && gravelNoise > 0.78) return BLOCKS.GRAVEL;

                // コケ石（洞窟壁面）
                const mossNoise = this.oreNoise3D(ox * 0.06, y * 0.06, oz * 0.06 + 55);
                if (y > 20 && y < SEA_LEVEL - 10 && mossNoise > 0.82) return BLOCKS.MOSSY_COBBLE;

                // タフ地層
                if (y > 20 && y < 40) {
                    const tuffNoise = this.noise(ox * 0.08 + 300, oz * 0.08 + 300);
                    if (tuffNoise > 0.75) return BLOCKS.TUFF;
                }

                // 粘土・泥（地表近くの地下）
                if (y > surface - 8 && y < surface - 2) {
                    const clayNoise = this.noise(ox * 0.1, oz * 0.1);
                    if (surface < SEA_LEVEL + 4 && clayNoise > 0.5) return BLOCKS.CLAY;
                    if (bType === 'PLAINS' && clayNoise > 0.7) return BLOCKS.MUD;
                }

                // 深層岩（y48未満の石をDeepslateに）
                if (y < 48) return BLOCKS.DEEPSLATE;
                
                return BLOCKS.STONE;
            }

            isDoorOpen(x, y, z) {
                const bBelow = this.getBlock(x, y-1, z);
                const isDoorBlock = (b) => b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR || b === BLOCKS.DARK_OAK_DOOR;
                const bottomY = isDoorBlock(bBelow) ? y-1 : y;
                return this.openDoors.has(`${x},${bottomY},${z}`);
            }

            getDoorFacing(x, y, z) {
                const bBelow = this.getBlock(x, y-1, z);
                const isDoorBlock = (b) => b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR || b === BLOCKS.DARK_OAK_DOOR;
                const bottomY = isDoorBlock(bBelow) ? y-1 : y;
                return this.doorFacing.get(`${x},${bottomY},${z}`) || 'z';
            }

            toggleDoor(x, y, z) {
                const bBelow = this.getBlock(x, y-1, z);
                const isDoorBlock = (b) => b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR || b === BLOCKS.DARK_OAK_DOOR;
                const bottomY = isDoorBlock(bBelow) ? y-1 : y;
                const k = `${x},${bottomY},${z}`;
                if (this.openDoors.has(k)) this.openDoors.delete(k);
                else this.openDoors.add(k);
                const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
                const chunk = this.chunks.get(`${cx},${cz}`);
                if (chunk) this.buildChunkMesh(chunk);
                this.saveMods();
            }

            getBlock(x, y, z) {
                const k = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
                if (this.mods.has(k)) return this.mods.get(k);
                const id = this.getBlockRaw(x, y, z);
                // 未定義のブロックIDはAIRとして扱う（クラッシュ防止）
                if (id === undefined || id === null) return BLOCKS.AIR;
                return id;
            }

            setBlock(x, y, z, id) {
                const k = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
                this.mods.set(k, id);
                
                if (id === BLOCKS.FURNACE || id === BLOCKS.SMOKER) {
                    this.blockEntities.set(k, { progress: 0, fuel: 0, maxFuel: 0, input: null, output: null, fuelSlot: null });
                } else if (id === BLOCKS.CHEST || id === BLOCKS.BARREL) {
                    if (!this.blockEntities.has(k)) {
                        this.blockEntities.set(k, { isChest: true, items: Array(27).fill(null) });
                    }
                } else if (id === BLOCKS.WHEAT_SEEDS) {
                    this.blockEntities.set(k, { isCrop: true, growth: 0, x, y, z });
                } else if (id === BLOCKS.WHEAT_STAGE2 || id === BLOCKS.WHEAT_STAGE3 ||
                           id === BLOCKS.CARROT_STAGE1 || id === BLOCKS.CARROT_STAGE2 ||
                           id === BLOCKS.POTATO_STAGE1 || id === BLOCKS.POTATO_STAGE2) {
                    // 作物成長中はblockEntityを保持（growth値を維持して成長を継続させる）
                    if (!this.blockEntities.has(k)) {
                        this.blockEntities.set(k, { isCrop: true, growth: 0, x, y, z });
                    }
                } else {
                    this.blockEntities.delete(k);
                }
                
                this.saveMods();
                
                const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
                const lx = Math.floor(x) - cx * CHUNK_SIZE;
                const lz = Math.floor(z) - cz * CHUNK_SIZE;
                const keys = [`${cx},${cz}`];
                if (lx === 0) keys.push(`${cx-1},${cz}`);
                if (lx === CHUNK_SIZE - 1) keys.push(`${cx+1},${cz}`);
                if (lz === 0) keys.push(`${cx},${cz-1}`);
                if (lz === CHUNK_SIZE - 1) keys.push(`${cx},${cz+1}`);
                keys.forEach(key => { if(this.chunks.has(key)) this.buildChunkMesh(this.chunks.get(key)); });
            }
            
            checkCollisionForEntity(px, py, pz, w, h, d) {
                const minX = Math.floor(px - w/2), maxX = Math.floor(px + w/2);
                const minY = Math.floor(py), maxY = Math.floor(py + h);
                const minZ = Math.floor(pz - d/2), maxZ = Math.floor(pz + d/2);
                
                for(let y = minY; y <= maxY; y++) {
                    for(let x = minX; x <= maxX; x++) {
                        for(let z = minZ; z <= maxZ; z++) {
                            const b = this.getBlock(x, y, z);
                            if (b && b !== BLOCKS.AIR && PROPS[b] && !PROPS[b].isLiquid && PROPS[b].isSolid !== false) {
                                if ((b === BLOCKS.DOOR || b === BLOCKS.IRON_DOOR || b === BLOCKS.BIRCH_DOOR || b === BLOCKS.ACACIA_DOOR || b === BLOCKS.JUNGLE_DOOR) && this.isDoorOpen(x, y, z)) continue;
                                if (b === BLOCKS.TORCH) continue;
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            updateChunks(player) {
                if (!player || !player.camera) return;

                const px = player.camera.position.x;
                const pz = player.camera.position.z;
                const cx = Math.floor(px / CHUNK_SIZE);
                const cz = Math.floor(pz / CHUNK_SIZE);
                
                const dir = new THREE.Vector3();
        player.camera.getWorldDirection(dir);
        
        // 二人称（正面視点）の時は、背後の景色を描画するためにベクトルを反転させる
        if (window.app && window.app.cameraMode === 2) {
            dir.negate();
        }
                
                const needed = new Set();
                const searchDist = RENDER_DIST + 1;

                for(let x = -searchDist; x <= searchDist; x++) {
                    for(let z = -searchDist; z <= searchDist; z++) {
                        const targetCX = cx + x;
                        const targetCZ = cz + z;
                        const chunkCenterX = targetCX * CHUNK_SIZE + CHUNK_SIZE / 2;
                        const chunkCenterZ = targetCZ * CHUNK_SIZE + CHUNK_SIZE / 2;
                        
                        const toChunkX = chunkCenterX - px;
                        const toChunkZ = chunkCenterZ - pz;
                        const distSq = toChunkX * toChunkX + toChunkZ * toChunkZ;

                        if (distSq > (searchDist * CHUNK_SIZE) ** 2) continue;

                        const dot = (toChunkX * dir.x + toChunkZ * dir.z);
                        if (Math.abs(x) <= 1 && Math.abs(z) <= 1) {
                            needed.add(`${targetCX},${targetCZ}`);
                        } else if (dot > -CHUNK_SIZE) { 
                            needed.add(`${targetCX},${targetCZ}`);
                        }
                    }
                }
                
                for(let k of needed) {
                    if (!this.chunks.has(k) && !this.chunkBuildQueue.includes(k)) {
                        const [kx, kz] = k.split(',').map(Number);
                        const dx = kx - cx, dz = kz - cz;
                        const dist = dx*dx + dz*dz;
                        this.chunkBuildQueue.push({ key: k, kx, kz, dist });
                    }
                }
                this.chunkBuildQueue.sort((a, b) => a.dist - b.dist);
                
                for (const [k, chunk] of this.chunks.entries()) {
                    if (!needed.has(k)) {
                        Object.values(chunk.meshes).forEach(m => {
                            this.scene.remove(m);
                            m.geometry.dispose();
                        });
                        this.chunks.delete(k);
                        const qi = this.chunkBuildQueue.findIndex(q => q.key === k);
                        if (qi !== -1) this.chunkBuildQueue.splice(qi, 1);
                    }
                }
            }

            processPendingChunks(maxPerFrame = 2) {
                let built = 0;
                while (this.chunkBuildQueue.length > 0 && built < maxPerFrame) {
                    const entry = this.chunkBuildQueue.shift();
                    if (!this.chunks.has(entry.key)) {
                        const chunk = { cx: entry.kx, cz: entry.kz, meshes: {} };
                        this.chunks.set(entry.key, chunk);
                        this.buildChunkMesh(chunk);
                        built++;
                        // 村のチャンクには村人をスポーン
                        this._trySpawnVillagers(chunk);
                    }
                }
            }

            _trySpawnVillagers(chunk) {
                if (!app || !app.entityManager) return;
                const vGrid = 180;
                const cx = chunk.cx * CHUNK_SIZE + CHUNK_SIZE / 2;
                const cz = chunk.cz * CHUNK_SIZE + CHUNK_SIZE / 2;
                const vx = Math.floor(cx / vGrid) * vGrid + 90;
                const vz = Math.floor(cz / vGrid) * vGrid + 90;
                const vNoiseVal = this.biomeNoise((vx + this.seed*12.345) * 0.03, (vz + this.seed*67.891) * 0.03);
                const hasVillage = vNoiseVal > -0.7;
                const vSurf = this.getTerrainSurface(vx, vz);
                if (!hasVillage || vSurf < SEA_LEVEL + 2) return;

                // このチャンクが村の中心に近い場合のみスポーン
                const distToVillage = Math.sqrt((cx - vx) ** 2 + (cz - vz) ** 2);
                if (distToVillage > CHUNK_SIZE * 1.5) return;

                // すでに村人がいたらスポーンしない
                const alreadyHasVillager = app.entityManager.entities.some(e => {
                    return e.type === 'VILLAGER' && Math.abs(e.pos.x - vx) < 40 && Math.abs(e.pos.z - vz) < 40;
                });
                if (alreadyHasVillager) return;

                const vseed = (((vx * 374761393) ^ (vz * 668265263) ^ (this.seed | 0)) >>> 0);
                const vlcg = lcg(vseed);
                const vOffX = Math.floor((vlcg() - 0.5) * 30);
                const vOffZ = Math.floor((vlcg() - 0.5) * 30);
                const cvx = vx + vOffX;
                const cvz = vz + vOffZ;

                // 村人：屋根ブロックを避けてスポーン
                const isRoofBlock = (b) => b === BLOCKS.OAK_STAIR || b === BLOCKS.COBBLE_STAIR || b === BLOCKS.BIRCH_STAIR || b === BLOCKS.PLANK || b === BLOCKS.WOOD || b === BLOCKS.COBBLE || b === BLOCKS.STONE_BRICK;
                const count = 3 + Math.floor(Math.random() * 4);
                for (let i = 0; i < count; i++) {
                    const sx = cvx + Math.floor((Math.random() - 0.5) * 50);
                    const sz = cvz + Math.floor((Math.random() - 0.5) * 50);
                    let sy = vSurf + 20;
                    while (sy > 0 && this.getBlock(sx, sy, sz) === BLOCKS.AIR) sy--;
                    if (sy > 0 && !isRoofBlock(this.getBlock(sx, sy, sz)) && this.getBlock(sx, sy+1, sz) === BLOCKS.AIR && this.getBlock(sx, sy+2, sz) === BLOCKS.AIR) {
                        app.entityManager.spawn('VILLAGER', sx, sy + 1, sz);
                    }
                }

                // アイアンゴーレム：村の外周（radius 35〜42）にスポーン、絶対に村を離れない
                const alreadyHasGolem = app.entityManager.entities.some(e => e.type === 'IRON_GOLEM' && Math.abs(e.pos.x - cvx) < 55 && Math.abs(e.pos.z - cvz) < 55);
                if (!alreadyHasGolem) {
                    const golemAngle = Math.random() * Math.PI * 2;
                    const golemR = 35 + Math.floor(Math.random() * 7);
                    const gx = Math.floor(cvx + Math.cos(golemAngle) * golemR);
                    const gz = Math.floor(cvz + Math.sin(golemAngle) * golemR);
                    let gy = vSurf + 20;
                    while (gy > 0 && this.getBlock(gx, gy, gz) === BLOCKS.AIR) gy--;
                    if (gy > 0 && this.getBlock(gx, gy+1, gz) === BLOCKS.AIR) {
                        const golem = new Entity('IRON_GOLEM', gx, gy+1, gz);
                        golem._villageX = cvx; golem._villageZ = cvz;
                        app.entityManager.entities.push(golem);
                        app.scene.add(golem.mesh);
                    }
                }

                // 猫を1〜2体スポーン
                const alreadyHasCat = app.entityManager.entities.some(e => e.type === 'CAT' && Math.abs(e.pos.x - cvx) < 40 && Math.abs(e.pos.z - cvz) < 40);
                if (!alreadyHasCat) {
                    for (let ci = 0; ci < 1 + Math.floor(Math.random()*2); ci++) {
                        const cx2 = cvx + Math.floor((Math.random()-0.5)*16);
                        const cz2 = cvz + Math.floor((Math.random()-0.5)*16);
                        let cy = vSurf + 15;
                        while (cy > 0 && this.getBlock(cx2, cy, cz2) === BLOCKS.AIR) cy--;
                        if (cy > 0 && this.getBlock(cx2, cy+1, cz2) === BLOCKS.AIR) app.entityManager.spawn('CAT', cx2, cy + 1, cz2);
                    }
                }
            }

            buildChunkMesh(chunk) {
                for (const m of Object.values(chunk.meshes)) { this.scene.remove(m); if(m.geometry) m.geometry.dispose(); }
                chunk.meshes = {};
                const blocks = {};

                let scanMaxY = SEA_LEVEL + 15;
                // ネザー次元では天井まで確実にスキャン
                if (window.app && window.app.dimension === 'nether') {
                    scanMaxY = 130; // NETHER_H(128)+余裕
                } else {
                const corners = [[0,0],[CHUNK_SIZE-1,0],[0,CHUNK_SIZE-1],[CHUNK_SIZE-1,CHUNK_SIZE-1],[CHUNK_SIZE/2|0,CHUNK_SIZE/2|0]];
                for(const [cx2,cz2] of corners) {
                    const wx2 = chunk.cx * CHUNK_SIZE + cx2, wz2 = chunk.cz * CHUNK_SIZE + cz2;
                    const bd2 = this.getBiomeData(wx2, wz2);
                    const cn2 = this.noise(bd2.nx * 0.001, bd2.nz * 0.001);
                    const est = Math.ceil(SEA_LEVEL + 10 + cn2 * 16 + bd2.amp + 12);
                    if(est > scanMaxY) scanMaxY = est;
                }
                }
                scanMaxY = Math.min(CHUNK_HEIGHT - 1, scanMaxY);

                let minY = scanMaxY, maxY = 0;
                const chunkData = new Int32Array((CHUNK_SIZE + 2) * (scanMaxY + 2) * (CHUNK_SIZE + 2));
                const getIndex = (x, y, z) => y * (CHUNK_SIZE + 2) * (CHUNK_SIZE + 2) + z * (CHUNK_SIZE + 2) + x;

                for(let x=-1; x<=CHUNK_SIZE; x++) {
                    for(let z=-1; z<=CHUNK_SIZE; z++) {
                        for(let y=0; y<=scanMaxY; y++) {
                            const wx = chunk.cx * CHUNK_SIZE + x, wz = chunk.cz * CHUNK_SIZE + z;
                            const id = this.getBlock(wx, y, wz);
                            chunkData[getIndex(x+1, y, z+1)] = id;
                            if (id !== BLOCKS.AIR && x >= 0 && x < CHUNK_SIZE && z >= 0 && z < CHUNK_SIZE) {
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }
                }

                const isHiddenCache = (cx, cy, cz, currentId) => {
                    if (cy < 0 || cy > scanMaxY) return true;
                    const nId = chunkData[getIndex(cx+1, cy, cz+1)];
                    if (nId === BLOCKS.AIR || (PROPS[nId] && PROPS[nId].isSolid === false)) return false;
                    if (PROPS[nId] && PROPS[nId].trans && nId !== currentId) return false;
                    if (nId === BLOCKS.DOOR || nId === BLOCKS.IRON_DOOR || nId === BLOCKS.BIRCH_DOOR || nId === BLOCKS.ACACIA_DOOR || nId === BLOCKS.JUNGLE_DOOR || nId === BLOCKS.GLASS_PANE || nId === BLOCKS.BED || nId === BLOCKS.TORCH || nId === BLOCKS.FARMLAND || nId === BLOCKS.WHEAT_SEEDS || nId === BLOCKS.WHEAT_STAGE2 || nId === BLOCKS.WHEAT_STAGE3 || nId === BLOCKS.WHEAT_CROP) return false;
                    return true;
                };

                for(let x=0; x<CHUNK_SIZE; x++) {
                    for(let z=0; z<CHUNK_SIZE; z++) {
                        for(let y=minY; y<=maxY; y++) {
                            const wx = chunk.cx * CHUNK_SIZE + x, wz = chunk.cz * CHUNK_SIZE + z;
                            const id = chunkData[getIndex(x+1, y, z+1)];
                            if (id === BLOCKS.AIR) continue;
                            
                            const hidden = 
                                isHiddenCache(x+1, y, z, id) &&
                                isHiddenCache(x-1, y, z, id) &&
                                isHiddenCache(x, y+1, z, id) &&
                                isHiddenCache(x, y-1, z, id) &&
                                isHiddenCache(x, y, z+1, id) &&
                                isHiddenCache(x, y, z-1, id);
                                           
                            if (hidden) continue;

                            if(!blocks[id]) blocks[id] = [];
                            _mat.makeTranslation(wx, y, wz);
                            blocks[id].push(_mat.clone());
                        }
                    }
                }
                const geo = new THREE.BoxGeometry(1,1,1);
                const specialIds = new Set([BLOCKS.GLASS_PANE, BLOCKS.DOOR, BLOCKS.IRON_DOOR, BLOCKS.BIRCH_DOOR, BLOCKS.ACACIA_DOOR, BLOCKS.JUNGLE_DOOR, BLOCKS.BED, BLOCKS.BED_HEAD, BLOCKS.TORCH, BLOCKS.OAK_STAIR, BLOCKS.COBBLE_STAIR, BLOCKS.STAIR, BLOCKS.BIRCH_STAIR, BLOCKS.ACACIA_STAIR, BLOCKS.JUNGLE_STAIR, BLOCKS.TALL_GRASS, BLOCKS.RED_FLOWER, BLOCKS.YELLOW_FLOWER, BLOCKS.WHEAT_SEEDS, BLOCKS.WHEAT_STAGE2, BLOCKS.WHEAT_STAGE3, BLOCKS.WHEAT_CROP, BLOCKS.FENCE, BLOCKS.NETHER_BRICK_FENCE, BLOCKS.NETHER_PORTAL]);
                
                Object.keys(blocks).forEach(id => {
                    const iid = parseInt(id);
                    if (specialIds.has(iid)) return; 
                    
                    const count = blocks[id].length;
                    const mesh = new THREE.InstancedMesh(geo, this.materials[id], count + 50);
                    mesh.count = count; 
                    blocks[id].forEach((mat, i) => mesh.setMatrixAt(i, mat));
                    _mat.makeScale(0,0,0);
                    for(let i=count; i<count+50; i++) mesh.setMatrixAt(i, _mat);
                    mesh.instanceMatrix.needsUpdate = true;
                    mesh.computeBoundingSphere();
                    chunk.meshes[id] = mesh;
                    this.scene.add(mesh);
                });

                if (blocks[BLOCKS.GLASS_PANE]) {
                    const positions = blocks[BLOCKS.GLASS_PANE];
                    const count = positions.length;
                    const mesh = new THREE.InstancedMesh(geo, this.materials[BLOCKS.GLASS_PANE], count + 50);
                    mesh.count = count;
                    const tm = new THREE.Matrix4();
                    positions.forEach((m, i) => {
                        const p = new THREE.Vector3().setFromMatrixPosition(m);
                        tm.set(1,0,0,p.x, 0,1,0,p.y, 0,0,0.125,p.z, 0,0,0,1);
                        mesh.setMatrixAt(i, tm);
                    });
                    _mat.makeScale(0,0,0);
                    for(let i=count; i<count+50; i++) mesh.setMatrixAt(i, _mat);
                    mesh.instanceMatrix.needsUpdate = true;
                    mesh.computeBoundingSphere();
                    chunk.meshes[BLOCKS.GLASS_PANE] = mesh;
                    this.scene.add(mesh);
                }

                [BLOCKS.DOOR, BLOCKS.IRON_DOOR, BLOCKS.BIRCH_DOOR, BLOCKS.ACACIA_DOOR, BLOCKS.JUNGLE_DOOR].forEach(doorId => {
                    if (!blocks[doorId]) return;
                    const doorMats = [];
                    const dm = new THREE.Matrix4();

                        const isOpen = this.isDoorOpen(bx, by, bz);

                                dm.set(0.125,0,0,bx, 0,2,0,by+0.5, 0,0,1,bz, 0,0,0,1);

                                dm.set(0.125,0,0,bx, 0,2,0,by+0.5, 0,0,1,bz+0.4375, 0,0,0,1);
                            } else {
                                dm.set(1,0,0,bx+0.4375, 0,2,0,by+0.5, 0,0,0.125,bz, 0,0,0,1);

                        doorMats.push(dm.clone());
                    });
                    if (doorMats.length > 0) {

                [BLOCKS.BED, BLOCKS.BED_HEAD].forEach(id => {

                        positions.forEach((m, i) => {

                        _mat.makeScale(0,0,0);

                        this.scene.add(mesh);

                if (blocks[BLOCKS.TORCH]) {
                    const positions = blocks[BLOCKS.TORCH];

                    positions.forEach((m, i) => {
                        const p = new THREE.Vector3().setFromMatrixPosition(m);

                    chunk.meshes[BLOCKS.TORCH] = mesh;

                [BLOCKS.TALL_GRASS, BLOCKS.RED_FLOWER, BLOCKS.YELLOW_FLOWER, BLOCKS.WHEAT_SEEDS, BLOCKS.WHEAT_STAGE2, BLOCKS.WHEAT_STAGE3, BLOCKS.WHEAT_CROP].forEach(pid => {

                    const stepMeshes = {};
                    const stepPositions = { n:[], s:[], e:[], w:[] };
                    Object.keys(stepGeos).forEach(f => {
                        stepMeshes[f] = new THREE.InstancedMesh(stepGeos[f], mat, count + 20);
                    });

                    const sm1 = new THREE.Matrix4(), sm2 = new THREE.Matrix4();
                    positions.forEach((m, i) => {
                        const p = new THREE.Vector3().setFromMatrixPosition(m);

                        stepPositions[facing].push({ p, i });
                    });

                    const stepOffsets = {
                        'n': { x:0, z:-0.25 }, 's': { x:0, z:0.25 },
                        'e': { x:0.25, z:0 },  'w': { x:-0.25, z:0 }
                    };
                    Object.keys(stepPositions).forEach(facing => {
                        const mesh = stepMeshes[facing];
                        const off = stepOffsets[facing];
                        stepPositions[facing].forEach(({ p }, localIdx) => {
                            sm2.makeTranslation(p.x + off.x, p.y + 0.25, p.z + off.z);
                            mesh.setMatrixAt(localIdx, sm2);
                        });
                        mesh.count = stepPositions[facing].length;
                    });

                    _mat.makeScale(0,0,0);
                    for(let i=count; i<count+20; i++) { mesh1.setMatrixAt(i, _mat); }
                    Object.values(stepMeshes).forEach(m => {
                        for(let i=m.count; i<m.count+20; i++) { m.setMatrixAt(i, _mat); }
                        m.instanceMatrix.needsUpdate = true; m.computeBoundingSphere();
                    });
                    mesh1.instanceMatrix.needsUpdate = true; mesh1.computeBoundingSphere();
                    chunk.meshes[stairId] = mesh1;
                    this.scene.add(mesh1);
                    Object.keys(stepMeshes).forEach(f => {
                        stepMeshes[f].instanceMatrix.needsUpdate = true;
                        stepMeshes[f].computeBoundingSphere();
                        chunk.meshes[stairId + '_step_' + f] = stepMeshes[f];
                        if (stepMeshes[f].count > 0) this.scene.add(stepMeshes[f]);
                    });
                });

                // ハーフブロック（スラブ）のレンダリング
                [BLOCKS.STONE_SLAB, BLOCKS.PLANK_SLAB, BLOCKS.COBBLE_SLAB].forEach(slabId => {
                    if (!blocks[slabId]) return;
                    const positions = blocks[slabId];
                    const count = positions.length;
                    const slabGeo = new THREE.BoxGeometry(1, 0.5, 1);
                    const mat = this.materials[slabId];
                    const mesh = new THREE.InstancedMesh(slabGeo, mat, count + 10);
                    mesh.count = count;
                    const sm = new THREE.Matrix4();
                    positions.forEach((m, i) => {
                        const p = new THREE.Vector3().setFromMatrixPosition(m);
                        sm.makeTranslation(p.x, p.y - 0.25, p.z);
                        mesh.setMatrixAt(i, sm);
                    });
                    _mat.makeScale(0,0,0);
                    for (let i=count; i<count+10; i++) mesh.setMatrixAt(i, _mat);
                    mesh.instanceMatrix.needsUpdate = true;
                    mesh.computeBoundingSphere();
                    chunk.meshes[slabId] = mesh;
                    this.scene.add(mesh);
                });

                // ===== フェンスレンダリング（投稿 + 4本の腕） =====
                [BLOCKS.FENCE, BLOCKS.NETHER_BRICK_FENCE].forEach(fenceId => {
                    if (!blocks[fenceId]) return;
                    const positions = blocks[fenceId];
                    const fMat = this.materials[fenceId];
                    const postGeo = new THREE.BoxGeometry(0.25, 1.0, 0.25);
                    const barNS = new THREE.BoxGeometry(0.25, 0.1875, 0.5);
                    const barEW = new THREE.BoxGeometry(0.5, 0.1875, 0.25);
                    const buildFenceMesh = (geo, posList) => {
                        if (posList.length === 0) return;
                        const m = new THREE.InstancedMesh(geo, fMat, posList.length + 4);
                        m.count = posList.length;
                        const fm = new THREE.Matrix4();
                        posList.forEach(({ x, y, z }, i) => { fm.makeTranslation(x, y, z); m.setMatrixAt(i, fm); });
                        _mat.makeScale(0,0,0);
                        for(let i=posList.length;i<posList.length+4;i++) m.setMatrixAt(i, _mat);
                        m.instanceMatrix.needsUpdate = true; m.computeBoundingSphere();
                        return m;
                    };
                    const isFenceOrSolid = (bx, by, bz) => {
                        const b = this.getBlock(bx, by, bz);
                        if (b === fenceId || b === BLOCKS.FENCE || b === BLOCKS.NETHER_BRICK_FENCE) return true;
                        if (b && b !== BLOCKS.AIR && PROPS[b] && PROPS[b].isSolid !== false && !PROPS[b].isLiquid && !PROPS[b].isStair && !PROPS[b].isSlab) return true;
                        return false;
                    };
                    const postPos=[], nPos=[], sPos=[], ePos=[], wPos=[];
                    positions.forEach(m => {
                        const p = new THREE.Vector3().setFromMatrixPosition(m);
                        const bx=Math.round(p.x), by=Math.round(p.y), bz=Math.round(p.z);
                        postPos.push({x:bx,y:by,z:bz});
                        if(isFenceOrSolid(bx,by,bz-1)) nPos.push({x:bx,y:by+0.1875,z:bz-0.25});
                        if(isFenceOrSolid(bx,by,bz+1)) sPos.push({x:bx,y:by+0.1875,z:bz+0.25});
                        if(isFenceOrSolid(bx+1,by,bz)) ePos.push({x:bx+0.25,y:by+0.1875,z:bz});
                        if(isFenceOrSolid(bx-1,by,bz)) wPos.push({x:bx-0.25,y:by+0.1875,z:bz});
                        // 下段バー
                        if(isFenceOrSolid(bx,by,bz-1)) nPos.push({x:bx,y:by-0.125,z:bz-0.25});
                        if(isFenceOrSolid(bx,by,bz+1)) sPos.push({x:bx,y:by-0.125,z:bz+0.25});
                        if(isFenceOrSolid(bx+1,by,bz)) ePos.push({x:bx+0.25,y:by-0.125,z:bz});
                        if(isFenceOrSolid(bx-1,by,bz)) wPos.push({x:bx-0.25,y:by-0.125,z:bz});
                    });
                    const postMesh = buildFenceMesh(postGeo, postPos);
                    if(postMesh) { chunk.meshes[fenceId+'_post'] = postMesh; this.scene.add(postMesh); }
                    const nMesh = buildFenceMesh(barNS, nPos);

                    const sMesh = buildFenceMesh(barNS, sPos);
                    if(sMesh) { chunk.meshes[fenceId+'_s'] = sMesh; this.scene.add(sMesh); }
                    const eMesh = buildFenceMesh(barEW, ePos);
                    if(eMesh) { chunk.meshes[fenceId+'_e'] = eMesh; this.scene.add(eMesh); }
                    const wMesh = buildFenceMesh(barEW, wPos);

                });

                // ===== ネザーゲートレンダリング（薄い半透明板） =====

                    const count = positions.length;
                    const mat = this.materials[BLOCKS.NETHER_PORTAL];
                    // アニメーション用: 薄いZ方向の板
                    const mesh = new THREE.InstancedMesh(geo, mat, count + 4);
                    mesh.count = count;
                    const pm = new THREE.Matrix4();

                        const p = new THREE.Vector3().setFromMatrixPosition(m);
                        const rx = Math.round(p.x), ry = Math.round(p.y), rz = Math.round(p.z);
                        // X方向かZ方向か確認して向きを決める（隣の黒曜石 or ポータルブロックを確認）
                        const hasObsX = this.getBlock(rx+1, ry, rz) === BLOCKS.OBSIDIAN || 
                                        this.getBlock(rx-1, ry, rz) === BLOCKS.OBSIDIAN ||
                                        this.getBlock(rx+1, ry, rz) === BLOCKS.NETHER_PORTAL ||

                        const hasObsZ = this.getBlock(rx, ry, rz+1) === BLOCKS.OBSIDIAN || 
                                        this.getBlock(rx, ry, rz-1) === BLOCKS.OBSIDIAN;
                        // Z方向に黒曜石がある場合はZ軸ポータル（X方向に薄い）

                    });
                    _mat.makeScale(0,0,0);

            getLightLevel(x, y, z) {
                const bx = Math.floor(x), by = Math.floor(y), bz = Math.floor(z);
                let skyVisible = true;
                for (let sy = by + 1; sy < Math.min(by + 32, CHUNK_HEIGHT); sy++) {
                    const sb = this.getBlock(bx, sy, bz);
                    if (sb !== BLOCKS.AIR && sb !== BLOCKS.LEAVES && sb !== BLOCKS.WATER &&
                        sb !== BLOCKS.GLASS && sb !== BLOCKS.GLASS_PANE && sb !== BLOCKS.TORCH) {
                        skyVisible = false; break;
                    }
                }
                if (skyVisible) {
                    const sunAngle = app.timeOfDay * Math.PI * 2;
                    const sunHeight = Math.sin(sunAngle);
                    if (sunHeight > 0) return Math.floor(sunHeight * 15);
                }
                const TORCH_RANGE = 15;
                let maxLight = 0;
                for (let dx = -TORCH_RANGE; dx <= TORCH_RANGE; dx++) {
                    for (let dy = -4; dy <= 4; dy++) {
                        for (let dz = -TORCH_RANGE; dz <= TORCH_RANGE; dz++) {
                            if (this.getBlock(bx + dx, by + dy, bz + dz) === BLOCKS.TORCH || this.getBlock(bx + dx, by + dy, bz + dz) === BLOCKS.LAVA) {
                                const dist = Math.abs(dx) + Math.abs(dy) + Math.abs(dz);
                                const light = Math.max(0, 15 - dist);
                                if (light > maxLight) maxLight = light;
                            }
                        }
                    }
                }
                return maxLight;
            }

            hideBlockInstance(wx, wy, wz, id) {
                const cx = Math.floor(wx / CHUNK_SIZE), cz = Math.floor(wz / CHUNK_SIZE);
                const chunk = this.chunks.get(`${cx},${cz}`);
                if(!chunk) return;
                
                const prefixes = ['', '_1', '_2', '_3', '_4', '_step_n', '_step_s', '_step_e', '_step_w'];
                prefixes.forEach(pfx => {
                    const meshId = id + pfx;
                    if(chunk.meshes[meshId]) {
                        const mesh = chunk.meshes[meshId];
                        for(let i=0; i<mesh.count; i++) {
                            mesh.getMatrixAt(i, _mat);
                            _pos.setFromMatrixPosition(_mat);
                            if(Math.abs(_pos.x - wx) < 0.6 && Math.abs(_pos.y - wy) < 1.0 && Math.abs(_pos.z - wz) < 0.6) {
                                _mat.scale(_scaleZero); mesh.setMatrixAt(i, _mat);
                                mesh.instanceMatrix.needsUpdate = true;
                            }
                        }
                    }
                });
            }
